<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ID सत्यापन | उन्नति स्वयं सहायता समिति</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #071b34; color: white; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: rgba(255,255,255,.05); padding: 30px; border-radius: 20px; border: 1px solid #d4af37; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 30px; background: #d4af37; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; }
        .result { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; display: none; text-align: left; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #d4af37; color: #000; border-radius: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🪪 ID कार्ड सत्यापन</h2>
        <input type="text" id="idInput" placeholder="वॉलंटियर ID दर्ज करें">
        <button onclick="verifyID()">सत्यापित करें</button>
        <div id="resultBox" class="result"></div>
        <br><a href="index.html" class="btn-back">⬅ मुख्य पृष्ठ</a>
    </div>

    <script>
        // यहाँ आप अपना वॉलंटियर डेटाबेस जोड़ें
        const idDatabase = {
            "USS-2026-001": "✅ मान्य वॉलंटियर: राम कुमार",
            "USS-2026-002": "✅ मान्य वॉलंटियर: श्याम सिंह"
        };

        function verifyID() {
            let input = document.getElementById("idInput").value.trim();
            let res = document.getElementById("resultBox");
            
            res.style.display = "block";
            if(idDatabase[input]) {
                res.innerHTML = idDatabase[input];
            } else {
                res.innerHTML = "❌ आईडी कार्ड नंबर अमान्य है।";
            }
        }
    </script>
</body>
</html>
