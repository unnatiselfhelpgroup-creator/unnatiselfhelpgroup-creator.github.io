<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID कार्ड सत्यापन | उन्नति स्वयं सहायता समिति</title>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #071b34; color: white; text-align: center; padding: 20px; margin: 0; }
        .box { max-width: 650px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 2px solid #d4af37; box-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .logo { width: 90px; margin-bottom: 15px; }
        h2 { color: #d4af37; }
        input { width: 90%; padding: 14px; border-radius: 12px; border: none; margin-top: 20px; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 12px 35px; background: #d4af37; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #f2ce63; }
        .result { margin-top: 25px; padding: 20px; background: rgba(255,255,255,0.08); border-radius: 15px; display: none; text-align: left; line-height: 1.8; }
        a { color: #d4af37; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>

<body>

<div class="box">
    <img src="ngologo.png" class="logo" alt="NGO Logo">
    <h2>🪪 ID कार्ड सत्यापन</h2>
    <p>अपनी वॉलंटियर ID दर्ज करें।</p>

    <input type="text" id="idInput" placeholder="उदाहरण : USS-VOL-1001">
    <br>
    <button onclick="verifyID()">सत्यापित करें</button>

    <div id="resultBox" class="result"></div>

    <br>
    <a href="index.html">⬅ मुख्य पृष्ठ पर जाएँ</a>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="idcard-pdf.js"></script>
<script type="module" src="idverification.js"></script>

</body>
</html>
