<!DOCTYPE html>
<html>
<body>
    <h2 id="statusMsg">प्रक्रिया जारी है...</h2>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const status = urlParams.get('status');
        const type = urlParams.get('type'); // यह पहचानेगा कि यह Appointment है या ID Card

        async function processAction() {
            if (id && status) {
                try {
                    // अब यह status के साथ-साथ type को भी अपडेट करेगा
                    await updateDoc(doc(db, "StudentRegistrations", id), { 
                        status: status,
                        actionType: type || "General" 
                    });
                    
                    document.getElementById("statusMsg").innerText = 
                        "सफलतापूर्वक " + (type || "कार्य") + " को " + status + " कर दिया गया है!";
                } catch (e) {
                    document.getElementById("statusMsg").innerText = "त्रुटि हुई: " + e.message;
                }
            } else {
                document.getElementById("statusMsg").innerText = "गलत लिंक! कृपया सही लिंक का उपयोग करें।";
            }
        }
        processAction();
    </script>
</body>
</html>
