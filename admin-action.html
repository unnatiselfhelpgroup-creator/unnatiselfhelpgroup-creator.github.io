<!DOCTYPE html>
<html>
<body>
    <h2 id="statusMsg">प्रक्रिया जारी है...</h2>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const status = urlParams.get('status');

        async function processAction() {
            if (id && status) {
                await updateDoc(doc(db, "StudentRegistrations", id), { status: status });
                document.getElementById("statusMsg").innerText = "सफलतापूर्वक " + status + " कर दिया गया है!";
            } else {
                document.getElementById("statusMsg").innerText = "गलत लिंक!";
            }
        }
        processAction();
    </script>
</body>
</html>
