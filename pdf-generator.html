<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Generator | उन्नति स्वयं सहायता समिति</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#071b34;--gold:#d4af37;--gold2:#f2ce63;--gold3:#9a7d1a;
  --red:#4a0404;--red2:#8b1a1a;--green:#27ae60;--text:#e8e0cc;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);color:var(--text);min-height:100vh;padding:20px}

/* HEADER */
.header{text-align:center;padding:20px 0 28px;border-bottom:2px solid rgba(212,175,55,0.3);margin-bottom:28px}
.header h1{color:var(--gold);font-size:1.3rem;margin-bottom:4px}
.header p{color:#b8a87a;font-size:0.85rem}

/* TYPE SELECTOR */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.type-card{background:#0d2545;border:2px solid rgba(212,175,55,0.2);border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:all 0.15s}
.type-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.type-card.active{border-color:var(--gold);background:#122e55;box-shadow:0 0 20px rgba(212,175,55,0.2)}
.type-card .icon{font-size:2rem;margin-bottom:8px}
.type-card .label{font-size:0.85rem;font-weight:700;color:var(--gold)}
.type-card .sub{font-size:0.72rem;color:#b8a87a;margin-top:3px}

/* FORM */
.form-card{background:#0d2545;border:1px solid rgba(212,175,55,0.2);border-radius:14px;padding:24px;margin-bottom:20px}
.form-card h3{color:var(--gold);font-size:1rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:0.78rem;color:#b8a87a;font-weight:600;letter-spacing:0.3px}
.field input,.field select,.field textarea{
  background:#071b34;border:1.5px solid rgba(212,175,55,0.25);color:var(--text);
  padding:10px 13px;border-radius:8px;font-size:0.9rem;font-family:inherit;
  transition:border-color 0.2s;outline:none
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field select option{background:#071b34}
.field textarea{resize:vertical;min-height:70px}

/* PHOTO UPLOAD */
.photo-wrap{display:flex;align-items:center;gap:14px}
.photo-preview{width:80px;height:90px;border:2px dashed rgba(212,175,55,0.4);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:#071b34;overflow:hidden;flex-shrink:0}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-upload-btn{background:#122e55;border:1.5px solid rgba(212,175,55,0.3);color:var(--gold);
  padding:9px 16px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:600}

/* BUTTONS */
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.btn{padding:13px 28px;border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;
  position:relative;transition:all 0.08s;transform:translateY(-2px);
  box-shadow:0 5px 0 rgba(0,0,0,0.35),0 7px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn:active{box-shadow:0 1px 0 rgba(0,0,0,0.35)!important;transform:translateY(3px)!important}
.btn:hover{transform:translateY(-4px)!important;filter:brightness(1.1)}
.btn.primary{background:linear-gradient(145deg,var(--gold2),var(--gold));color:var(--navy);
  box-shadow:0 5px 0 var(--gold3),0 7px 12px rgba(212,175,55,0.35),inset 0 1px 0 rgba(255,255,255,0.4)}
.btn.secondary{background:linear-gradient(145deg,#1565c0,#0d47a1);color:#fff;
  box-shadow:0 5px 0 #062d6e,0 7px 12px rgba(13,71,161,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn.back{background:linear-gradient(145deg,var(--red2),var(--red));color:#fff;
  box-shadow:0 5px 0 #2a0000,0 7px 12px rgba(74,4,4,0.4),inset 0 1px 0 rgba(255,255,255,0.15)}

/* PREVIEW CARD */
.preview-wrap{background:#0d2545;border:1px solid rgba(212,175,55,0.2);border-radius:14px;padding:20px;margin-bottom:20px;display:none}
.preview-wrap.show{display:block}
.preview-wrap h3{color:var(--gold);margin-bottom:14px}

/* ID CARD PREVIEW */
.id-card{width:100%;max-width:340px;margin:0 auto;background:linear-gradient(135deg,#071b34,#0d2545);
  border:3px solid var(--gold);border-radius:14px;padding:18px;font-family:Arial,sans-serif;
  box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.id-card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(212,175,55,0.3)}
.id-card-logo{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold)}
.id-card-org{font-size:0.72rem;color:var(--gold);font-weight:700;line-height:1.3}
.id-card-body{display:flex;gap:12px;align-items:flex-start}
.id-card-photo{width:70px;height:80px;border:2px solid var(--gold);border-radius:6px;object-fit:cover;flex-shrink:0;background:#122e55;display:flex;align-items:center;justify-content:center;color:#b8a87a;font-size:1.5rem}
.id-card-info{flex:1}
.id-card-name{font-size:0.95rem;font-weight:700;color:#fff;margin-bottom:4px}
.id-card-post{font-size:0.75rem;color:var(--gold);margin-bottom:8px;font-weight:600}
.id-card-row{font-size:0.68rem;color:#b8a87a;margin-bottom:2px}
.id-card-row span{color:#e8e0cc}
.id-card-footer{margin-top:12px;padding-top:8px;border-top:1px solid rgba(212,175,55,0.3);
  display:flex;justify-content:space-between;align-items:flex-end}
.id-card-id{font-size:0.65rem;color:#b8a87a}
.id-card-sig{text-align:right;font-size:0.6rem;color:#b8a87a}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#0d2545;border:1px solid var(--gold3);
  color:var(--text);padding:12px 20px;border-radius:10px;font-size:0.88rem;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:#27ae60;background:#0d2b1a}
</style>
</head>
<body>

<div class="header">
  <h1>📄 Document Generator</h1>
  <p>उन्नति स्वयं सहायता समिति — ID Card | नियुक्ति पत्र | Certificate</p>
</div>

<!-- TYPE SELECTOR -->
<div class="type-grid">
  <div class="type-card active" onclick="setType('idcard',this)">
    <div class="icon">🪪</div>
    <div class="label">ID Card</div>
    <div class="sub">पहचान पत्र</div>
  </div>
  <div class="type-card" onclick="setType('appointment',this)">
    <div class="icon">📋</div>
    <div class="label">नियुक्ति पत्र</div>
    <div class="sub">Appointment Letter</div>
  </div>
  <div class="type-card" onclick="setType('certificate',this)">
    <div class="icon">🎓</div>
    <div class="label">Certificate</div>
    <div class="sub">प्रमाण पत्र</div>
  </div>
</div>

<!-- FORM: ID CARD -->
<div class="form-card" id="form-idcard">
  <h3>🪪 ID Card विवरण भरें</h3>
  <div class="form-grid">
    <div class="field"><label>पूरा नाम *</label><input id="ic-name" placeholder="जैसे: राम कुमार शर्मा"></div>
    <div class="field"><label>पद *</label>
      <select id="ic-post">
        <option value="">— पद चुनें —</option>
        <option>Volunteer (स्वयंसेवक)</option>
        <option>ग्राम गौ-संयोजक</option>
        <option>ब्लॉक गौ-प्रभारी</option>
        <option>जिला गौ-समन्वयक</option>
        <option>प्रदेश कार्यकारिणी सदस्य</option>
        <option>राष्ट्रीय गौ-पदाधिकारी</option>
        <option>जिला अध्यक्ष</option>
        <option>राज्य सचिव</option>
      </select>
    </div>
    <div class="field"><label>मोबाइल *</label><input id="ic-mobile" placeholder="10 अंक" maxlength="10" type="tel"></div>
    <div class="field"><label>जिला</label><input id="ic-district" placeholder="जिला/District"></div>
    <div class="field full"><label>पता</label><input id="ic-address" placeholder="पूरा पता"></div>
    <div class="field"><label>Blood Group</label>
      <select id="ic-blood">
        <option value="">— Blood Group —</option>
        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
      </select>
    </div>
    <div class="field"><label>Valid Till</label><input id="ic-valid" type="date"></div>
    <div class="field full">
      <label>फोटो Upload करें</label>
      <div class="photo-wrap">
        <div class="photo-preview" id="ic-photo-preview">👤</div>
        <div>
          <input type="file" id="ic-photo-input" accept="image/*" style="display:none" onchange="previewPhoto(this,'ic-photo-preview')">
          <button class="photo-upload-btn" onclick="document.getElementById('ic-photo-input').click()">📷 फोटो चुनें</button>
          <div style="font-size:0.72rem;color:#b8a87a;margin-top:6px">JPG/PNG, पासपोर्ट साइज़</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FORM: APPOINTMENT -->
<div class="form-card" id="form-appointment" style="display:none">
  <h3>📋 नियुक्ति पत्र विवरण</h3>
  <div class="form-grid">
    <div class="field"><label>पूरा नाम *</label><input id="ap-name" placeholder="आवेदक का नाम"></div>
    <div class="field"><label>पिता/पति का नाम</label><input id="ap-father" placeholder="पिता/पति का नाम"></div>
    <div class="field"><label>पद *</label>
      <select id="ap-post">
        <option value="">— पद चुनें —</option>
        <option>Volunteer (स्वयंसेवक)</option>
        <option>ग्राम गौ-संयोजक</option>
        <option>ब्लॉक गौ-प्रभारी</option>
        <option>जिला गौ-समन्वयक</option>
        <option>प्रदेश कार्यकारिणी सदस्य</option>
        <option>राष्ट्रीय गौ-पदाधिकारी</option>
        <option>जिला अध्यक्ष</option>
        <option>राज्य सचिव</option>
      </select>
    </div>
    <div class="field"><label>मोबाइल</label><input id="ap-mobile" placeholder="मोबाइल नंबर" type="tel"></div>
    <div class="field"><label>Email</label><input id="ap-email" placeholder="email@example.com" type="email"></div>
    <div class="field"><label>जिला/District</label><input id="ap-district" placeholder="जिला"></div>
    <div class="field"><label>सहयोग राशि</label>
      <select id="ap-fee">
        <option value="">— राशि चुनें —</option>
        <option>₹150</option><option>₹500</option><option>₹700</option>
        <option>₹1,100</option><option>₹2,500</option><option>₹5,100</option>
      </select>
    </div>
    <div class="field"><label>शैक्षिक योग्यता</label><input id="ap-edu" placeholder="जैसे: B.A., 12वीं"></div>
    <div class="field full"><label>पता</label><textarea id="ap-address" placeholder="पूरा पता"></textarea></div>
  </div>
</div>

<!-- FORM: CERTIFICATE -->
<div class="form-card" id="form-certificate" style="display:none">
  <h3>🎓 Certificate विवरण</h3>
  <div class="form-grid">
    <div class="field"><label>प्राप्तकर्ता का नाम *</label><input id="ct-name" placeholder="पूरा नाम"></div>
    <div class="field"><label>Certificate प्रकार *</label>
      <select id="ct-type">
        <option value="">— प्रकार चुनें —</option>
        <option>सेवा प्रमाण पत्र</option>
        <option>सक्रिय सदस्यता प्रमाण पत्र</option>
        <option>गौ सेवा प्रमाण पत्र</option>
        <option>स्वयंसेवक प्रमाण पत्र</option>
        <option>प्रशिक्षण प्रमाण पत्र</option>
        <option>सम्मान पत्र</option>
        <option>अनुभव प्रमाण पत्र</option>
      </select>
    </div>
    <div class="field"><label>पद/भूमिका</label><input id="ct-post" placeholder="जैसे: जिला गौ-समन्वयक"></div>
    <div class="field"><label>कार्यकाल (From)</label><input id="ct-from" type="date"></div>
    <div class="field"><label>कार्यकाल (To)</label><input id="ct-to" type="date"></div>
    <div class="field"><label>जिला/District</label><input id="ct-district" placeholder="जिला"></div>
    <div class="field full"><label>विशेष योगदान (Optional)</label><textarea id="ct-contrib" placeholder="जैसे: गौ संरक्षण एवं समाज सेवा में उल्लेखनीय योगदान..."></textarea></div>
  </div>
</div>

<!-- PREVIEW -->
<div class="preview-wrap" id="preview-wrap">
  <h3>👁 ID Card Preview</h3>
  <div id="preview-content"></div>
</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="btn primary" onclick="generatePDF()">📄 PDF Generate करें</button>
  <button class="btn secondary" id="preview-btn" onclick="showPreview()" style="display:none">👁 Preview देखें</button>
  <button class="btn back" onclick="if(window.history.length>1)history.back();else window.location.href='admin-dashboard.html'">← वापस</button>
</div>

<div class="toast" id="toast"></div>

<script>
const LOGO = "https://unnatiselfhelpgroup-creator.github.io/ngologo.png";
const SIGN = "https://unnatiselfhelpgroup-creator.github.io/signature.png";
let currentType = "idcard";
let photoDataURL = null;

function setType(type, el){
  currentType = type;
  document.querySelectorAll(".type-card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  ["idcard","appointment","certificate"].forEach(t=>{
    document.getElementById("form-"+t).style.display = t===type?"block":"none";
  });
  document.getElementById("preview-btn").style.display = type==="idcard"?"inline-flex":"none";
  document.getElementById("preview-wrap").classList.remove("show");
}

function previewPhoto(input, previewId){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoDataURL = e.target.result;
    const el = document.getElementById(previewId);
    el.innerHTML = `<img src="${photoDataURL}" style="width:100%;height:100%;object-fit:cover;border-radius:4px">`;
  };
  reader.readAsDataURL(file);
}

function showPreview(){
  const name   = document.getElementById("ic-name").value || "नाम";
  const post   = document.getElementById("ic-post").value || "पद";
  const mobile = document.getElementById("ic-mobile").value || "—";
  const district = document.getElementById("ic-district").value || "—";
  const blood  = document.getElementById("ic-blood").value || "—";
  const valid  = document.getElementById("ic-valid").value ? new Date(document.getElementById("ic-valid").value).toLocaleDateString("hi-IN") : "31-01-2031";
  const idNo   = "USS/" + String(Date.now()).slice(-8);
  const photoHTML = photoDataURL
    ? `<img src="${photoDataURL}" style="width:70px;height:80px;object-fit:cover;border:2px solid #d4af37;border-radius:6px">`
    : `<div style="width:70px;height:80px;border:2px dashed #d4af37;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#b8a87a">👤</div>`;

  document.getElementById("preview-content").innerHTML = `
    <div class="id-card">
      <div class="id-card-header">
        <img src="${LOGO}" class="id-card-logo" onerror="this.style.display='none'">
        <div class="id-card-org">उन्नति स्वयं सहायता समिति<br><span style="font-size:0.62rem;color:#b8a87a">IDENTITY CARD</span></div>
      </div>
      <div class="id-card-body">
        ${photoHTML}
        <div class="id-card-info">
          <div class="id-card-name">${name}</div>
          <div class="id-card-post">${post}</div>
          <div class="id-card-row">📱 <span>${mobile}</span></div>
          <div class="id-card-row">📍 <span>${district}</span></div>
          <div class="id-card-row">🩸 <span>${blood}</span></div>
        </div>
      </div>
      <div class="id-card-footer">
        <div class="id-card-id">ID: ${idNo}<br>Valid: ${valid}</div>
        <div class="id-card-sig">अधिकृत हस्ताक्षर<br>राष्ट्रीय सचिव</div>
      </div>
    </div>`;
  document.getElementById("preview-wrap").classList.add("show");
}

// ══ PDF GENERATION ══
function generatePDF(){
  if(currentType==="idcard")      genIDCardPDF();
  else if(currentType==="appointment") genAppointmentPDF();
  else                             genCertificatePDF();
}

// ── ID CARD PDF ──
function genIDCardPDF(){
  const name     = document.getElementById("ic-name").value;
  const post     = document.getElementById("ic-post").value;
  const mobile   = document.getElementById("ic-mobile").value;
  const district = document.getElementById("ic-district").value;
  const address  = document.getElementById("ic-address").value;
  const blood    = document.getElementById("ic-blood").value;
  const validRaw = document.getElementById("ic-valid").value;
  if(!name||!post){ showToast("❌ नाम और पद जरूरी हैं!",""); return; }

  const { jsPDF } = window.jspdf;
  // CR80 card size: 85.6 × 54mm (landscape)
  const doc = new jsPDF({orientation:"landscape",unit:"mm",format:[85.6,54]});

  // ── FRONT ──
  // Background gradient simulation
  doc.setFillColor(7,27,52);
  doc.rect(0,0,85.6,54,"F");
  doc.setFillColor(13,45,85);
  doc.rect(0,0,85.6,14,"F");

  // Gold border
  doc.setDrawColor(212,175,55);
  doc.setLineWidth(0.8);
  doc.rect(1,1,83.6,52,"S");

  // Logo area (left strip)
  doc.setFillColor(18,46,85);
  doc.rect(0,0,22,54,"F");
  doc.setDrawColor(212,175,55);
  doc.setLineWidth(0.3);
  doc.line(22,0,22,54);

  // Logo
  try {
    doc.addImage(LOGO,"PNG",3,2,16,16,undefined,"FAST");
  } catch(e){}

  // Org name in left strip (rotated)
  doc.setFontSize(4.5);
  doc.setTextColor(212,175,55);
  doc.setFont("helvetica","bold");
  doc.text("उन्नति स्वयं सहायता समिति",11,47,{angle:90,align:"center"});
  doc.setFontSize(3.5);
  doc.setTextColor(184,168,122);
  doc.text("NGO Darpan: UA/2016/0108273",11,26,{angle:90,align:"center"});

  // IDENTITY CARD header
  doc.setFillColor(212,175,55);
  doc.rect(22,0,63.6,7,"F");
  doc.setFontSize(7);
  doc.setTextColor(7,27,52);
  doc.setFont("helvetica","bold");
  doc.text("IDENTITY CARD / पहचान पत्र",54.8,4.8,{align:"center"});

  // Photo box
  const photoX=25, photoY=9, photoW=18, photoH=22;
  if(photoDataURL){
    try{ doc.addImage(photoDataURL,"JPEG",photoX,photoY,photoW,photoH); }catch(e){}
  }
  doc.setDrawColor(212,175,55);
  doc.setLineWidth(0.4);
  doc.rect(photoX,photoY,photoW,photoH,"S");

  // Name & Post
  doc.setFontSize(8.5);
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.text(name,46,13,{maxWidth:38});

  doc.setFontSize(6);
  doc.setTextColor(212,175,55);
  doc.text(post,46,18,{maxWidth:38});

  // Info rows
  const infoY = 23;
  const rows = [
    ["📱",mobile||"—"],
    ["📍",district||"—"],
    ["🩸",blood||"—"],
    ["🏠",(address||"—").substring(0,28)],
  ];
  doc.setFont("helvetica","normal");
  rows.forEach((r,i)=>{
    doc.setFontSize(5.2);
    doc.setTextColor(184,168,122);
    doc.text(r[0],46,infoY+i*4.5);
    doc.setTextColor(232,224,204);
    doc.text(r[1],50,infoY+i*4.5,{maxWidth:34});
  });

  // ID & Valid
  const idNo = "USS/"+String(Date.now()).slice(-8);
  const validStr = validRaw ? new Date(validRaw).toLocaleDateString("en-IN") : "31-01-2031";
  doc.setFontSize(4.5);
  doc.setTextColor(184,168,122);
  doc.text("ID: "+idNo,25,43);
  doc.text("Valid: "+validStr,25,46.5);

  // Signature line

function showToast(msg, type){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show "+(type||"");
  setTimeout(()=>t.classList.remove("show"),3500);
}
