<div class="daily-report">
    <h2>गौ रक्षक दैनिक सेवा रिपोर्ट</h2>
    <form id="dailyReportForm">
        <input type="text" name="name" placeholder="नाम" required>
        <input type="text" name="volunteer_id" placeholder="सदस्य आईडी" required>
        <input type="date" name="date" required>
        <textarea name="work_details" placeholder="आज किया गया कार्य" required></textarea>
        <input type="file" name="work_photo">
        <input type="text" name="hours" placeholder="कितने घंटे सेवा की" required>
        <button type="submit">रिपोर्ट सबमिट करें</button>
    </form>
</div>
<script type="module" src="firebase-script.js"></script>
