<!-- दैनिक कार्य रिपोर्ट -->
<div class="daily-report">
    <h2>गौ रक्षक दैनिक सेवा रिपोर्ट</h2>
    <form id="dailyReportForm">
        <input type="text" placeholder="नाम" required>
        <input type="text" placeholder="सदस्य आईडी" required>
        <input type="date" required>
        <textarea placeholder="आज किया गया कार्य"></textarea>
        <input type="file" placeholder="कार्य की फोटो अपलोड करें">
        <input type="text" placeholder="कितने घंटे सेवा की">
        <button type="submit">रिपोर्ट सबमिट करें</button>
    </form>
</div>
