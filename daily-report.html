<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="उन्नति स्वयं सहायता समिति के स्वयंसेवक यहाँ अपनी दैनिक सामाजिक सेवा रिपोर्ट जमा करें।">
<meta name="robots" content="index, follow">
<title>दैनिक सेवा रिपोर्ट | उन्नति स्वयं सहायता समिति</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div class="page-header">
  <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="Logo">
  <h1>🐄 गौ रक्षक दैनिक सेवा रिपोर्ट</h1>
  <p>युवा सामाजिक सारथी — गौ सेवा एवं राष्ट्र निर्माण इंटर्नशिप</p>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">📝 दैनिक सेवा रिपोर्ट फॉर्म</div>

    <form id="dailyReportForm" novalidate>

      <div class="form-group">
        <label>पूरा नाम <span class="required-star">*</span></label>
        <input type="text" id="name" placeholder="अपना पूरा नाम लिखें" required>
      </div>

      <div class="form-group">
        <label>पिता/पति का नाम <span class="required-star">*</span></label>
        <input type="text" id="fatherName" placeholder="पिता/पति का नाम" required>
      </div>

      <div class="form-group">
        <label>वॉलंटियर / सदस्य आईडी <span class="required-star">*</span></label>
        <input type="text" id="memberId" placeholder="जैसे: USHG-MEM-2024-001" style="text-transform:uppercase;" required>
      </div>

      <div class="form-group">
        <label>ईमेल आईडी <span class="required-star">*</span></label>
        <input type="email" id="email" placeholder="yourname@email.com" required>
      </div>

      <div class="form-group">
        <label>मोबाइल नंबर <span class="required-star">*</span></label>
        <input type="tel" id="mobile" placeholder="10 अंकों का मोबाइल नंबर" maxlength="10" required>
      </div>

      <div class="form-group">
        <label>दिनांक <span class="required-star">*</span></label>
        <input type="date" id="reportDate" required>
      </div>

      <div class="form-group">
        <label>आज आपने किस क्षेत्र में कार्य किया? <span class="required-star">*</span></label>
        <select id="workArea" required>
          <option value="">कार्य चुनें</option>
          <option value="गौ सेवा">गौ सेवा</option>
          <option value="वृक्षारोपण">वृक्षारोपण</option>
          <option value="स्वच्छता अभियान">स्वच्छता अभियान</option>
          <option value="रक्तदान जागरूकता">रक्तदान जागरूकता</option>
          <option value="शिक्षा जागरूकता">शिक्षा जागरूकता</option>
          <option value="स्वास्थ्य जागरूकता">स्वास्थ्य जागरूकता</option>
          <option value="घायल गोवंश सहायता">घायल गोवंश सहायता</option>
          <option value="पर्यावरण संरक्षण">पर्यावरण संरक्षण</option>
          <option value="अन्य सामाजिक सेवा">अन्य सामाजिक सेवा</option>
        </select>
      </div>

      <div class="form-group">
        <label>कार्य विवरण <span class="required-star">*</span></label>
        <textarea id="workDetail" placeholder="आज आपने क्या किया, कहाँ किया, कितने लोगों की मदद की — विस्तार से लिखें।" required style="min-height:100px;"></textarea>
      </div>

      <div class="form-group">
        <label>कितने घंटे सेवा की? <span class="required-star">*</span></label>
        <select id="hours" required>
          <option value="">घंटे चुनें</option>
          <option value="1 घंटा">1 घंटा</option>
          <option value="2 घंटे">2 घंटे</option>
          <option value="3 घंटे">3 घंटे</option>
          <option value="4 घंटे">4 घंटे</option>
          <option value="5 घंटे">5 घंटे</option>
          <option value="6+ घंटे">6+ घंटे (पूरा दिन)</option>
        </select>
      </div>

      <div class="form-group">
        <label>कार्य की फोटो (वैकल्पिक)</label>
        <input type="file" id="photo" accept="image/*">
        <p class="hint">फोटो को WhatsApp पर भी भेज सकते हैं: 9410332400</p>
      </div>

      <div class="check-wrap">
        <input type="checkbox" id="agree" required>
        <label for="agree">मैं घोषणा करता/करती हूँ कि दी गई जानकारी सत्य है और संस्था आवश्यकता पड़ने पर इसकी समीक्षा कर सकती है।</label>
      </div>

      <div class="msg-box msg-success" id="successMsg">
        ✅ आपकी दैनिक सेवा रिपोर्ट सफलतापूर्वक जमा हो गई! 🙏 आपकी सेवा को नमन।
      </div>
      <div class="msg-box msg-error" id="errorMsg"></div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top:14px;">
        📤 दैनिक रिपोर्ट सबमिट करें
      </button>
    </form>
  </div>
</div>

<div class="back-link">
  <a href="https://unnatiselfhelpgroup-creator.github.io/">⬅ मुख्य पृष्ठ पर जाएँ</a>
</div>

<script>
const FORMSPREE = "https://formspree.io/f/xdkgnpqv";
const WHATSAPP  = "919410332400";

// Set today's date by default
document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

document.getElementById('dailyReportForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const name       = document.getElementById('name').value.trim();
  const fatherName = document.getElementById('fatherName').value.trim();
  const memberId   = document.getElementById('memberId').value.trim().toUpperCase();
  const email      = document.getElementById('email').value.trim();
  const mobile     = document.getElementById('mobile').value.trim();
  const reportDate = document.getElementById('reportDate').value;
  const workArea   = document.getElementById('workArea').value;
  const workDetail = document.getElementById('workDetail').value.trim();
  const hours      = document.getElementById('hours').value;
  const agree      = document.getElementById('agree').checked;

  if (!name||!fatherName||!memberId||!email||!mobile||!reportDate||!workArea||!workDetail||!hours) {
    showMsg('error','❌ कृपया सभी आवश्यक फ़ील्ड भरें।'); return;
  }
  if (!/^[0-9]{10}$/.test(mobile)) {
    showMsg('error','❌ मोबाइल नंबर 10 अंकों का होना चाहिए।'); return;
  }
  if (!agree) { showMsg('error','❌ कृपया घोषणा बॉक्स चेक करें।'); return; }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span> जमा हो रहा है...';
  btn.disabled = true;

  const data = {
    form_type: 'दैनिक सेवा रिपोर्ट',
    नाम: name, 'पिता/पति': fatherName, 'सदस्य ID': memberId,
    ईमेल: email, मोबाइल: mobile, दिनांक: reportDate,
    'कार्य क्षेत्र': workArea, विवरण: workDetail, घंटे: hours,
    'जमा समय': new Date().toLocaleString('hi-IN')
  };

  try {
    const res = await fetch(FORMSPREE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      showMsg('success');
      document.getElementById('dailyReportForm').reset();
      document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
    } else { throw new Error('formspree'); }
  } catch(err) {
    // WhatsApp fallback
    const msg = encodeURIComponent(`📋 दैनिक सेवा रिपोर्ट\nनाम: ${name}\nID: ${memberId}\nदिनांक: ${reportDate}\nकार्य: ${workArea}\nघंटे: ${hours}\nविवरण: ${workDetail}`);
    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, '_blank');
    showMsg('success', '✅ रिपोर्ट WhatsApp पर भेजी गई! 🙏 आपकी सेवा को नमन।');
    document.getElementById('dailyReportForm').reset();
    document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
  }

  btn.innerHTML = '📤 दैनिक रिपोर्ट सबमिट करें';
  btn.disabled = false;
});

function showMsg(type, text) {
  const s = document.getElementById('successMsg');
  const e = document.getElementById('errorMsg');
  s.style.display = 'none'; e.style.display = 'none';
  if (type === 'success') {
    if (text) s.textContent = text;
    s.style.display = 'block'; s.scrollIntoView({ behavior: 'smooth' });
  } else {
    if (text) e.textContent = text;
    e.style.display = 'block'; e.scrollIntoView({ behavior: 'smooth' });
  }
}
</script>
</body>
</html>
