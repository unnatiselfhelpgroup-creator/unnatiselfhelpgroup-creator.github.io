<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दैनिक सेवा रिपोर्ट | उन्नति स्वयं सहायता समिति</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fa; padding: 20px; line-height: 1.6; }
        .daily-report { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #1b2430; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff8b00; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #e67e00; }
        .declaration-box { display: flex; align-items: flex-start; gap: 10px; margin: 15px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="daily-report">
    <h2>🐄 गौ रक्षक दैनिक सेवा रिपोर्ट</h2>
    <p style="text-align: center;">"युवा सामाजिक सारथी - गौ सेवा एवं राष्ट्र निर्माण इंटर्नशिप" के अंतर्गत अपने दैनिक सामाजिक कार्य की रिपोर्ट यहाँ जमा करें।</p>

    <form id="dailyReportForm" data-collection="DailyReports" data-form-label="दैनिक सेवा रिपोर्ट">
        <input type="text" name="name" placeholder="पूरा नाम" required>
        <input type="text" name="father_name" placeholder="पिता/पति का नाम" required>
        <input type="text" name="volunteer_id" placeholder="वॉलंटियर / सदस्य आईडी" required>
        <input type="email" name="email" placeholder="ईमेल आईडी" required>
        <input type="text" name="mobile" placeholder="मोबाइल नंबर" required>
        <input type="date" name="date" required>
        
        <label>आज आपने किस क्षेत्र में कार्य किया?</label>
        <select name="work_type" required>
            <option value="">कार्य चुनें</option>
            <option value="गौ सेवा">गौ सेवा</option>
            <option value="वृक्षारोपण">वृक्षारोपण</option>
            <option value="स्वच्छता अभियान">स्वच्छता अभियान</option>
            <option value="रक्तदान जागरूकता">रक्तदान जागरूकता</option>
            <option value="शिक्षा जागरूकता">शिक्षा जागरूकता</option>
            <option value="स्वास्थ्य जागरूकता">स्वास्थ्य जागरूकता</option>
            <option value="अन्य सामाजिक सेवा">अन्य सामाजिक सेवा</option>
        </select>

        <textarea name="work_details" rows="4" placeholder="आज किए गए सामाजिक कार्य का पूरा विवरण लिखें" required></textarea>
        <label>कार्य की फोटो अपलोड करें:</label>
        <input type="file" name="work_photo" accept="image/*">
        <input type="number" name="hours" placeholder="कितने घंटे सेवा की" min="1" required>

        <div class="declaration-box">
            <input type="checkbox" name="declaration" required>
            <label>मैं घोषणा करता/करती हूँ कि दी गई जानकारी सत्य है और संस्था आवश्यकता पड़ने पर इसकी समीक्षा कर सकती है।</label>
        </div>

        <button type="submit">📤 दैनिक रिपोर्ट सबमिट करें</button>
    </form>
</div>

<script type="module" src="firebase-script.js"></script>
</body>
</html>
