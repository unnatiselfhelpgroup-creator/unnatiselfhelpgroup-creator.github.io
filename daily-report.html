    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', Arial, sans-serif; background: #f4f7fa; padding: 24px 16px; line-height: 1.7; color: #1b2430; }
        .daily-report { max-width: 620px; margin: 20px auto; background: white; padding: 32px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.09); }
        h1 { color: #1b2430; text-align: center; font-size: 1.4rem; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 0.88rem; margin: 12px 0 4px; color: #333; }
        input, select, textarea {
            width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
            border-radius: 9px; font-size: 0.97rem; font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ff8b00; }
        textarea { resize: vertical; min-height: 80px; }
        .declaration { display: flex; align-items: flex-start; gap: 10px; margin: 16px 0; font-size: 0.88rem; cursor: pointer; }
        .declaration input { width: auto; margin-top: 3px; flex-shrink: 0; accent-color: #ff8b00; }
        button[type="submit"] {
            width: 100%; padding: 14px; background: #ff8b00; border: none;
            border-radius: 10px; color: white; font-weight: bold;
            cursor: pointer; font-size: 1rem; margin-top: 10px; transition: background 0.3s, transform 0.1s;
        }
        button[type="submit"]:hover { background: #e67e00; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { opacity: 0.65; cursor: not-allowed; }
    </style>
</head>
<body>
<main>
  <section class="daily-report" aria-label="दैनिक सेवा रिपोर्ट फॉर्म">
    <h1>🐄 गौ रक्षक दैनिक सेवा रिपोर्ट</h1>
    <p class="subtitle">युवा सामाजिक सारथी — गौ सेवा एवं राष्ट्र निर्माण इंटर्नशिप के अंतर्गत<br>अपने दैनिक सामाजिक कार्य की रिपोर्ट यहाँ जमा करें।</p>

    <form id="dailyReportForm" data-collection="DailyReports" novalidate>
        <label for="dr_name">पूरा नाम *</label>
        <input type="text" id="dr_name" name="name" placeholder="पूरा नाम" autocomplete="name" required>

        <label for="dr_father">पिता/पति का नाम *</label>
        <input type="text" id="dr_father" name="father_name" placeholder="पिता/पति का नाम" required>

        <label for="dr_vid">वॉलंटियर / सदस्य आईडी *</label>
        <input type="text" id="dr_vid" name="volunteer_id" placeholder="आपकी वॉलंटियर ID" required>

        <label for="dr_email">ईमेल आईडी *</label>
        <input type="email" id="dr_email" name="email" placeholder="yourname@email.com" autocomplete="email" required>

        <label for="dr_mobile">मोबाइल नंबर *</label>
        <input type="tel" id="dr_mobile" name="mobile" placeholder="10 अंकों का मोबाइल नंबर" pattern="[6-9][0-9]{9}" autocomplete="tel" required>

        <label for="dr_date">दिनांक *</label>
        <input type="date" id="dr_date" name="date" required>

        <label for="dr_worktype">आज आपने किस क्षेत्र में कार्य किया? *</label>
        <select id="dr_worktype" name="work_type" required>
            <option value="">कार्य चुनें</option>
            <option value="गौ सेवा">गौ सेवा</option>
            <option value="वृक्षारोपण">वृक्षारोपण</option>
            <option value="स्वच्छता अभियान">स्वच्छता अभियान</option>
            <option value="रक्तदान जागरूकता">रक्तदान जागरूकता</option>
            <option value="शिक्षा जागरूकता">शिक्षा जागरूकता</option>
            <option value="स्वास्थ्य जागरूकता">स्वास्थ्य जागरूकता</option>
            <option value="अन्य सामाजिक सेवा">अन्य सामाजिक सेवा</option>
        </select>

        <label for="dr_details">कार्य विवरण *</label>
        <textarea id="dr_details" name="work_details" rows="4" placeholder="आज किए गए सामाजिक कार्य का पूरा विवरण लिखें" required></textarea>

        <label for="dr_photo">कार्य की फोटो अपलोड करें</label>
        <input type="file" id="dr_photo" name="work_photo" accept="image/*">

        <label for="dr_hours">कितने घंटे सेवा की? *</label>
        <input type="number" id="dr_hours" name="hours" placeholder="घंटों की संख्या" min="1" max="24" required>

        <label class="declaration">
            <input type="checkbox" name="declaration" required>
            <span>मैं घोषणा करता/करती हूँ कि दी गई जानकारी सत्य है और संस्था आवश्यकता पड़ने पर इसकी समीक्षा कर सकती है।</span>
        </label>

        <button type="submit">📤 दैनिक रिपोर्ट सबमिट करें</button>
    </form>
  </section>
</main>
<script type="module" src="firebase-script.js"></script>
</body>
</html>
