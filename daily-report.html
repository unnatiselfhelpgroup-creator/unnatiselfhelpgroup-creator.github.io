<div class="daily-report">

<h2>🐄 गौ रक्षक दैनिक सेवा रिपोर्ट</h2>

<p>
"युवा सामाजिक सारथी - गौ सेवा एवं राष्ट्र निर्माण इंटर्नशिप"
के अंतर्गत अपने दैनिक सामाजिक कार्य की रिपोर्ट यहाँ जमा करें।
</p>

<form id="dailyReportForm">

    <input
        type="text"
        name="name"
        placeholder="पूरा नाम"
        required
    >

    <input
        type="text"
        name="father_name"
        placeholder="पिता/पति का नाम"
        required
    >

    <input
        type="text"
        name="volunteer_id"
        placeholder="वॉलंटियर / सदस्य आईडी"
        required
    >

    <input
        type="email"
        name="email"
        placeholder="ईमेल आईडी"
        required
    >

    <input
        type="text"
        name="mobile"
        placeholder="मोबाइल नंबर"
        required
    >

    <input
        type="date"
        name="date"
        required
    >

    <label>
        आज आपने किस क्षेत्र में कार्य किया?
    </label>

    <select
        name="work_type"
        required
    >
        <option value="">
            कार्य चुनें
        </option>

        <option value="गौ सेवा">
            गौ सेवा
        </option>

        <option value="वृक्षारोपण">
            वृक्षारोपण
        </option>

        <option value="स्वच्छता अभियान">
            स्वच्छता अभियान
        </option>

        <option value="रक्तदान जागरूकता">
            रक्तदान जागरूकता
        </option>

        <option value="शिक्षा जागरूकता">
            शिक्षा जागरूकता
        </option>

        <option value="स्वास्थ्य जागरूकता">
            स्वास्थ्य जागरूकता
        </option>

        <option value="अन्य सामाजिक सेवा">
            अन्य सामाजिक सेवा
        </option>
    </select>

    <textarea
        name="work_details"
        placeholder="आज किए गए सामाजिक कार्य का पूरा विवरण लिखें"
        required
    ></textarea>

    <input
        type="file"
        name="work_photo"
        accept="image/*"
    >

    <input
        type="number"
        name="hours"
        placeholder="कितने घंटे सेवा की"
        min="1"
        required
    >

    <label>

        <input
            type="checkbox"
            name="declaration"
            required
        >

        मैं घोषणा करता/करती हूँ कि दी गई जानकारी सत्य है और
        संस्था आवश्यकता पड़ने पर इसकी समीक्षा कर सकती है।

    </label>

    <br><br>

    <button type="submit">
        📤 दैनिक रिपोर्ट सबमिट करें
    </button>

</form>

</div>

<script type="module" src="firebase-script.js"></script>
