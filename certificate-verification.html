<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
प्रमाणपत्र सत्यापन | उन्नति स्वयं सहायता समिति
</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#071b34;
color:white;
text-align:center;
padding:20px;
margin:0;
}

.box{
max-width:650px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
border:2px solid #d4af37;
box-shadow:0 0 15px rgba(212,175,55,.4);
}

.logo{
width:90px;
margin-bottom:15px;
}

h2{
color:#d4af37;
}

input{
width:90%;
padding:14px;
border-radius:12px;
border:none;
margin-top:20px;
text-align:center;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 35px;
background:#d4af37;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

button:hover{
background:#f2ce63;
}

.result{
margin-top:25px;
padding:20px;
background:rgba(255,255,255,.08);
border-radius:15px;
display:none;
text-align:left;
line-height:1.8;
}

.valid{
border-left:5px solid #00ff7f;
}

.invalid{
border-left:5px solid red;
}

a{
color:#d4af37;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<img
src="ngologo.png"
class="logo"
alt="NGO Logo">

<h2>
📜 प्रमाणपत्र सत्यापन
</h2>

<p>
अपना प्रमाण पत्र नंबर दर्ज करें।
</p>

<input
type="text"
id="certInput"
placeholder="उदाहरण : CERT-1753194785">

<br>

<button onclick="checkCert()">
सत्यापित करें
</button>

<div
id="resultBox"
class="result">
</div>

<br><br>

<a href="index.html">
⬅ मुख्य पृष्ठ पर जाएँ
</a>

</div>

<script type="module">
    // Firebase Config इंपोर्ट
    import { db } from "./firebase-config.js";
</script>

<script
type="module"
src="certificate-check.js">
</script>

</body>
</html>
