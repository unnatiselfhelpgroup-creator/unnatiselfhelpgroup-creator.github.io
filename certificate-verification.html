<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>प्रमाणपत्र सत्यापन | उन्नति स्वयं सहायता समिति</title>

<style>
body{
font-family:Poppins,sans-serif;
background:#071b34;
color:white;
text-align:center;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
border:1px solid #d4af37;
}

input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin-top:20px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 30px;
background:#d4af37;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:20px;
padding:20px;
background:rgba(255,255,255,.08);
border-radius:15px;
display:none;
text-align:left;
}
</style>

</head>
<body>

<div class="box">

<h2>📜 प्रमाणपत्र सत्यापन</h2>

<input
type="text"
id="certInput"
placeholder="सर्टिफिकेट नंबर दर्ज करें">

<br>

<button onclick="checkCert()">
सत्यापित करें
</button>

<div id="resultBox" class="result"></div>

<br><br>

<a href="index.html" style="color:#d4af37;">
⬅ मुख्य पृष्ठ
</a>

</div>

<script type="module"
src="certificate-check.js">
</script>

</body>
</html>
