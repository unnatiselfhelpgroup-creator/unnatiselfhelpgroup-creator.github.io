.card a{

  font-size:30px;
}
</style>
</head>

<body>

<h1>🌸 NGO Admin Dashboard</h1>

<div class="grid">

  </div>

  <div class="card">

  </div>

  <div class="card">

    <a href="donation.html">💰 Donations</a>
  </div>

  <div class="card">

  </div>

</html>
