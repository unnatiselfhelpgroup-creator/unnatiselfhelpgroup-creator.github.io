<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | उन्नति स्वयं सहायता समिति</title>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #071b34; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #d4af37; }
        .card a { color: white; text-decoration: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; color: black; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 5px; }
        .approve { background: #00a651; color: white; }
        .reject { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
<h1 style="text-align:center;">🔐 Admin Dashboard</h1>
<div class="grid">
    <div class="card"><h3>स्वयंसेवक</h3><h2 id="totalVolunteers">0</h2></div>
    <div class="card"><h3>प्रमाण पत्र</h3><h2 id="totalCertificates">0</h2></div>
    <div class="card"><h3>ID कार्ड</h3><h2 id="totalIDCards">0</h2></div>
    <div class="card"><h3>रिपोर्ट</h3><h2 id="totalReports">0</h2></div>
    <div class="card"><a href="admin-appointment.html">📄 Appointment Requests</a></div>
    <div class="card"><a href="certificate.html">📜 Certificate Applications</a></div>
    <div class="card"><a href="id-card.html">🪪 ID Card Applications</a></div>
    <div class="card"><a href="daily-report.html">📊 Daily Reports</a></div>
    <div class="card"><a href="volunteer-management.html">👥 Volunteer Management</a></div>
</div>

<h2 style="text-align:center; margin-top:40px;">छात्र पंजीकरण (Internship)</h2>
<table id="studentTable">
    <thead>
        <tr>
            <th>नाम</th>
            <th>मोबाइल</th>
            <th>स्थिति</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentBody"></tbody>
</table>

<script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "admin-login.html"; });

    async function loadDashboard() {
        // लोड कार्ड्स
        const collections = [{id:"totalVolunteers", name:"Volunteers"}, {id:"totalCertificates", name:"Certificates"}, {id:"totalIDCards", name:"IDcard"}, {id:"totalReports", name:"DailyReports"}];
        for (const col of collections) {
            const snap = await getDocs(collection(db, col.name));
            document.getElementById(col.id).innerText = snap.size;
        }

        // लोड स्टूडेंट्स टेबल
        const studentSnap = await getDocs(collection(db, "StudentRegistrations"));
        const body = document.getElementById("studentBody");
        body.innerHTML = "";
        studentSnap.forEach((docSnap) => {
            const data = docSnap.data();
            const row = `<tr>
                <td>${data.name}</td>
                <td>${data.mobile}</td>
                <td>${data.status || 'Pending'}</td>
                <td>
                    <button class="btn approve" onclick="updateStatus('${docSnap.id}', 'Approved', '${data.name}', '${data.email}')">Approve</button>
                    <button class="btn reject" onclick="updateStatus('${docSnap.id}', 'Rejected', '${data.name}', '${data.email}')">Reject</button>
                </td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    // ग्लोबल फंक्शन अपडेट और ईमेल भेजने के लिए
    window.updateStatus = async (id, status, name, email) => {
        try {
            await updateDoc(doc(db, "StudentRegistrations", id), { status: status });
            
            // अगर अप्रूव हुआ, तो छात्र को ईमेल भेजें
            if (status === 'Approved') {
                await emailjs.send("service_63pefgf", "template_wvzbj7p", {
                    user_name: name,
                    user_email: email,
                    name: name,
                    mobile: "",
                    email: email,
                    designation: "छात्र पंजीकरण स्वीकृत",
                    doc_id: id,
                    type: "StudentRegistrations"
                });
            }
            
            alert("स्थिति अपडेट कर दी गई: " + status);
            location.reload();
        } catch (err) {
            console.error(err);
            alert("त्रुटि: " + err.message);
        }
    };

    loadDashboard();
</script>
</body>
</html>
