function esc(s){ if(!s) return ""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// किसी भी dataURL/blobURL को compress करने के लिए (applicant photo जैसे already-in-memory dataURL के लिए)
function compressDataUrl(srcUrl, maxW = 800, quality = 0.70) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        let b64 = canvas.toDataURL("image/jpeg", quality);
        if (b64.length * 0.75 > 900 * 1024) b64 = canvas.toDataURL("image/jpeg", 0.45);
        resolve(b64);
      } catch (e) {
        reject(new Error("Image process करने में त्रुटि: " + (e && e.message ? e.message : "अज्ञात त्रुटि")));
      }
    };
    img.onerror = () => reject(new Error("Image process error"));
    img.src = srcUrl;
  });
}

// paymentProof फ़ाइल को compress करने के लिए — पहले तेज़ Blob URL तरीका, फेल हो तो FileReader fallback
function fileToBase64(file, maxW = 800, quality = 0.70) {
  function viaFileReader() {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        compressDataUrl(e.target.result, maxW, quality).then(resolve).catch(() =>
          reject(new Error("यह फ़ाइल किसी भी तरीके से लोड नहीं हो पाई। कृपया कोई और फोटो/स्क्रीनशॉट आज़माएँ।"))
        );
      };
      reader.onerror = () => {
        const real = reader.error;
        reject(new Error("FileReader: " + (real && real.name ? real.name + " — " + (real.message || "") : "unknown")));
      };
      reader.readAsDataURL(file);
    });
  }

  function viaBlobUrl() {
    return new Promise((resolve, reject) => {
      const objectUrl = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          let b64 = canvas.toDataURL("image/jpeg", quality);
          if (b64.length * 0.75 > 900 * 1024) b64 = canvas.toDataURL("image/jpeg", 0.45);
          URL.revokeObjectURL(objectUrl);
          if (b64.length * 0.75 > 900 * 1024) reject(new Error("Image compress करने के बाद भी बहुत बड़ी है। कृपया कम रेज़ोल्यूशन वाला स्क्रीनशॉट इस्तेमाल करें।"));
          else resolve(b64);
        } catch (e) {
          URL.revokeObjectURL(objectUrl);
          reject(new Error("Image process करने में त्रुटि हुई: " + (e && e.message ? e.message : "अज्ञात त्रुटि")));
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(objectUrl);
        reject(new Error("blob url load failed"));
      };
      img.src = objectUrl;
    });
  }

  function viaRawBytes() {
    return new Promise((resolve, reject) => {
      if (file.size > 900 * 1024) {
        reject(new Error("फ़ाइल compress नहीं हो पाई और बिना compress किए भेजने के लिए भी बहुत बड़ी है।"));
        return;
      }
      file.arrayBuffer().then(buf => {
        try {
          const bytes = new Uint8Array(buf);
          let binary = "";
          const chunk = 0x8000;
          for (let i = 0; i < bytes.length; i += chunk) {
            binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
          }
          const b64 = "data:" + (file.type || "image/jpeg") + ";base64," + btoa(binary);
          resolve(b64);
        } catch (e) {
          reject(new Error("raw bytes convert failed: " + (e && e.message ? e.message : "")));
        }
      }).catch(e => reject(new Error("arrayBuffer failed: " + (e && e.message ? e.message : ""))));
    });
  }

  function oneAttempt() {
    let lastRealErr = null;
    return viaBlobUrl().catch(e1 => {
      lastRealErr = e1;
      return viaFileReader().catch(e2 => {
        lastRealErr = e2;
        return viaRawBytes().catch(e3 => {
          throw new Error((e3 && e3.message ? e3.message : "अज्ञात त्रुटि") +
            " [debug: blob=" + (e1 && e1.message) + "]");
        });
      });
    });
  }

  return new Promise((resolve, reject) => {
    if (!file || !file.type || !file.type.startsWith("image/")) {
      reject(new Error("कृपया एक वैध फोटो फ़ाइल चुनें (JPG/PNG)।"));
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      reject(new Error("फ़ाइल बहुत बड़ी है (20MB से ज़्यादा)। कृपया कम साइज़ का स्क्रीनशॉट/फोटो चुनें।"));
      return;
    }

    // ✅ फिक्स: फ़ाइल चुनते ही (change event में) पढ़ना शुरू कर देते हैं, इसलिए
    // देरी अब सिर्फ compress/retry में लगती है, "भुगतान कर दिया" बटन के इंतज़ार
    // जितनी लंबी नहीं — इससे OS द्वारा बीच में फ़ाइल का access छीने जाने का
    // खतरा बहुत कम हो जाता है।
    const delays = [0, 800, 2000, 4000];
    let lastErr = null;

    function tryAt(i) {
      if (i >= delays.length) {
        reject(lastErr || new Error("यह फ़ाइल किसी भी तरीके से पढ़ी नहीं जा सकी। कृपया कोई और फोटो/स्क्रीनशॉट आज़माएँ।"));
        return;
      }
      setTimeout(() => {
        oneAttempt().then(resolve).catch(err => {
          console.error("fileToBase64 attempt " + (i + 1) + " failed:", err);
          lastErr = new Error("यह फ़ाइल किसी भी तरीके से पढ़ी नहीं जा सकी। कृपया कोई और फोटो/स्क्रीनशॉट आज़माएँ।\n(" + (err && err.message ? err.message : "") + ")");
          tryAt(i + 1);
        });
      }, delays[i]);
    }
    tryAt(0);
  });
}

let selectedImageDataUrl = null;
let paymentProofBase64 = null;   // ✅ NEW: फ़ाइल चुनते ही तैयार किया गया base64, submit के वक्त सिर्फ यही इस्तेमाल होगा

    सुझाव: अगर स्क्रीनशॉट किसी क्लाउड/गैलरी ऐप से चुना है, तो पहले उसे एक बार गैलरी में खोलकर देख लें, फिर यहां चुनें — इससे अपलोड ज़्यादा भरोसेमंद तरीके से होता है।</p>
  `;

  const paidBtn = document.getElementById('paidBtn');
  const proofStatus = document.getElementById('proofStatus');

    }
    if (file.size > 20 * 1024 * 1024) {
      alert('⚠️ फ़ाइल बहुत बड़ी है (20MB से ज़्यादा)। कृपया कम साइज़ का स्क्रीनशॉट/फोटो चुनें।');
      this.value = '';

    }
    if (selectedImageDataUrl) URL.revokeObjectURL(selectedImageDataUrl);

    const img = document.getElementById('previewImg');
    img.src = selectedImageDataUrl; img.style.display = 'block';

    // ✅ मुख्य फिक्स: फ़ाइल चुनते ही तुरंत पढ़कर compress कर लें और मेमोरी में रख लें,
    // ताकि "भुगतान कर दिया है" बटन दबाने तक इंतज़ार करने से फ़ाइल स्टेल/अनरीडेबल न हो जाए

      }

      const data = {
        ...stored,
        photoBase64: applicantPhoto,
        paymentScreenshotBase64: payScreenshot,
        paymentStatus: 'Paid (Screenshot Uploaded)',
        status: 'Pending',
        type: 'IDcard',
        createdAt: serverTimestamp(),
        submittedAt: new Date().toISOString()
      };
      delete data.photoDataURL;

      const docRef = await addDoc(collection(db, 'IDcard'), data);
      setProgress(75, 'Email भेजी जा रही है...');

      // ── Applicant को email ──
      if(stored.email) {
        try {
          await emailjs.send('service_63pefgf', 'template_xq7uilj', {
            to_name: stored.name,
            to_email: stored.email,
            doc_type: 'ID Card आवेदन',
            status: 'प्राप्त हो गया, सत्यापन हेतु लंबित',
            post: stored.designation || '—',
            district: stored.address || '—',
            message: 'भुगतान प्राप्त हो गया है। सत्यापन के पश्चात ID Card जारी किया जाएगा।'
          });
        } catch(e){ console.warn('Applicant email failed:', e); }
      }

      // ── Admin को Notification ──
      try {
        await emailjs.send('service_63pefgf', 'template_wvzbj7p', {
          to_name: 'Admin',
          to_email: 'unnatiselfhelpgroup@gmail.com',
          name: stored.name || '—',
          mobile: stored.mobile || '—',
          email: stored.email || '—',
          designation: stored.designation || '—',
          district: stored.address || '—',
          fee: stored.fee || '—',
          doc_id: docRef.id,
          type: 'IDcard',
          title: 'ID Card आवेदन',
          message: `नया ID Card आवेदन आया है।\nनाम: ${stored.name}\nपद: ${stored.designation}\nमोबाइल: ${stored.mobile}`
        });
      } catch(e){ console.warn('Admin email failed:', e); }

      setProgress(100, 'सफल!');
      sessionStorage.removeItem('idCardApplicant');
      sessionStorage.removeItem('idCardPhoto');

      document.body.innerHTML = `
        <div class="tricolor-top"></div>
        <main style="padding-top:60px;max-width:460px;margin:0 auto;padding:60px 16px 48px">
          <div class="pay-card" style="text-align:center">
            <div style="font-size:60px">✅</div>
            <h3 style="color:var(--green);font-family:'Tiro Devanagari Hindi',serif;margin:12px 0">आवेदन सफलतापूर्वक जमा हो गया!</h3>
            <p style="color:#555;font-size:0.9rem;line-height:1.7">भुगतान स्क्रीनशॉट सुरक्षित रूप से सेव हुआ।<br>एडमिन जांच के बाद ईमेल पर सूचित किया जाएगा।</p>
            <p style="color:#888;font-size:0.75rem;margin-top:10px">ID: ${docRef.id}</p>
            <a href="index.html" class="btn btn-pay" style="margin-top:20px;display:inline-block;width:auto;padding:13px 28px">🏠 होम पेज</a>
          </div>
        </main>`;
    } catch(err) {
      console.error(err);
      if (err && err.code === 'already-exists') {
        setProgress(100, 'सफल!');
        sessionStorage.removeItem('idCardApplicant');
        sessionStorage.removeItem('idCardPhoto');
        document.body.innerHTML = `
          <div class="tricolor-top"></div>
          <main style="padding-top:60px;max-width:460px;margin:0 auto;padding:60px 16px 48px">
            <div class="pay-card" style="text-align:center">
              <div style="font-size:60px">✅</div>
              <h3 style="color:var(--green);font-family:'Tiro Devanagari Hindi',serif;margin:12px 0">आवेदन सफलतापूर्वक जमा हो गया!</h3>
              <p style="color:#555;font-size:0.9rem;line-height:1.7">भुगतान स्क्रीनशॉट सुरक्षित रूप से सेव हुआ।<br>एडमिन जांच के बाद ईमेल पर सूचित किया जाएगा।</p>
              <a href="index.html" class="btn btn-pay" style="margin-top:20px;display:inline-block;width:auto;padding:13px 28px">🏠 होम पेज</a>
            </div>
          </main>`;
        return;
      }
      alert('❌ त्रुटि: ' + (err && err.message ? err.message : 'दोबारा प्रयास करें। अगर समस्या बनी रहे तो कम रेज़ोल्यूशन वाला स्क्रीनशॉट इस्तेमाल करें।'));
      btn.disabled = false; btn.innerText = '✅ मैंने भुगतान कर दिया है';
      document.getElementById('progressWrap').style.display = 'none';
    }
  };
} else {
  infoDiv.innerHTML = '<p style="text-align:center;color:#c0392b;padding:20px">⚠️ जानकारी नहीं मिली। कृपया पहले ID Card आवेदन फॉर्म भरें।</p><a href="id-card.html" class="btn btn-pay" style="display:inline-block;width:auto;margin:10px auto;padding:12px 24px">← फॉर्म पर जाएँ</a>';
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').innerText = msg;
}
</script>
</body>
</html>
