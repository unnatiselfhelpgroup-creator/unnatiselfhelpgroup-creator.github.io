<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ID Card भुगतान | उन्नति स्वयं सहायता समिति</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">(function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();</script>
<style>
  :root{ --saffron:#FF6B00;--gold:#C8960C;--green:#138808;--maroon:#4a0404;--maroon2:#8B0000; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFF3E0,#F1F8E9);min-height:100vh;color:#222}
  .tricolor-top{height:5px;background:linear-gradient(90deg,var(--saffron) 33.3%,#fff 33.3%,#fff 66.6%,var(--green) 66.6%)}
  header{background:linear-gradient(135deg,var(--maroon),var(--maroon2),var(--maroon));color:#fff;text-align:center;padding:16px 12px 14px;position:relative;box-shadow:0 3px 12px rgba(0,0,0,0.3)}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--saffron),var(--gold),var(--green))}
  header img{height:52px;border-radius:50%;border:2px solid var(--gold);margin-bottom:6px}
  header h1{font-family:'Tiro Devanagari Hindi',serif;font-size:1.1rem}
  main{max-width:460px;margin:0 auto;padding:28px 16px 48px}
  .pay-card{background:#fff;padding:26px 22px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.1);position:relative;overflow:hidden;margin-bottom:16px}
  .pay-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--saffron),var(--gold),var(--green))}
  .pay-card h3{font-family:'Tiro Devanagari Hindi',serif;color:var(--maroon);font-size:1.1rem;text-align:center;margin-bottom:16px}
  .info-box{background:#fff8e7;border:1.5px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:16px}
  .info-row{display:flex;justify-content:space-between;gap:10px;font-size:0.85rem;padding:5px 0;border-bottom:1px dashed #e8d8ad}
  .info-row:last-child{border-bottom:none}
  .info-row .lbl{color:#888}
  .info-row .val{color:var(--maroon);font-weight:600;text-align:right}
  .pay-amount-wrap{text-align:center;margin:16px 0 6px}
  .pay-amount{font-size:2.1rem;font-weight:900;color:var(--maroon);margin-top:4px}
  .step{background:#f8f9fa;border-left:4px solid var(--saffron);padding:9px 12px;margin:14px 0 6px;border-radius:6px;font-size:0.85rem;color:#555}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;text-align:center;text-decoration:none;margin-top:10px}
  .btn-pay{background:linear-gradient(135deg,var(--green),#1a9e0a);color:#fff;box-shadow:0 4px 14px rgba(19,136,8,0.35)}
  .btn-submit{background:linear-gradient(135deg,var(--maroon),var(--maroon2));color:#fff;box-shadow:0 4px 14px rgba(74,4,4,0.35);display:none}
  .btn:disabled{background:#aaa;box-shadow:none;cursor:not-allowed}
  input[type="file"]{margin:8px 0 0;display:block;width:100%;padding:10px;border:2px dashed var(--gold);border-radius:8px;background:#fffde7;font-size:0.85rem}
  #previewImg{display:none;max-width:100%;max-height:160px;border:2px solid var(--gold);border-radius:10px;margin-top:10px;object-fit:contain}
  #progressWrap{display:none;margin-top:14px}
  #progressBar{width:100%;height:10px;background:#eee;border-radius:10px;overflow:hidden}
  #progressFill{height:100%;width:0%;background:var(--green);transition:width 0.3s;border-radius:10px}
  #progressText{font-size:0.78rem;color:#666;margin-top:5px;text-align:center}
  .note{font-size:0.75rem;color:#999;text-align:center;margin-top:14px;line-height:1.6}
  .back-link{display:block;text-align:center;margin-top:16px;color:var(--maroon);text-decoration:none;font-size:0.85rem;font-weight:600}
  footer{background:var(--maroon);color:rgba(255,255,255,0.75);text-align:center;padding:16px;font-size:0.72rem;line-height:1.8}
  footer strong{color:#FFD700}
</style>
</head>
<body>
<div class="tricolor-top"></div>
<header>
  <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="NGO Logo">
  <h1>उन्नति स्वयं सहायता समिति</h1>
</header>

<main>
  <div class="pay-card">
    <h3>💳 ID Card शुल्क भुगतान</h3>
    <div id="applicantInfo"></div>
  </div>
  <a href="id-card.html" class="back-link">⬅ फॉर्म पर वापस जाएँ</a>
</main>

<footer>
  <strong>उन्नति स्वयं सहायता समिति</strong><br>
  Lalkuan, Nainital, Uttarakhand — 263139<br>
  NGO Darpan: UA/2016/0108273 | PAN: AAATU7133Q
</footer>

<script>
function esc(s){ if(!s) return ""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function compressImage(dataUrl, maxW=800, quality=0.70) {
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w=img.width, h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      let b64 = canvas.toDataURL("image/jpeg", quality);
      if(b64.length*0.75 > 900*1024) b64 = canvas.toDataURL("image/jpeg", 0.45);
      res(b64);
    };
    img.onerror = ()=>rej(new Error("Image process error"));
    img.src = dataUrl;
  });
}

let selectedImageDataUrl = null;
const stored = JSON.parse(sessionStorage.getItem('idCardApplicant') || '{}');
const photoDataURL = sessionStorage.getItem('idCardPhoto') || null;
const infoDiv = document.getElementById('applicantInfo');

if (stored.name) {
  infoDiv.innerHTML = `
    <div class="info-box">
      <div class="info-row"><span class="lbl">आवेदक</span><span class="val">${esc(stored.name)}</span></div>
      <div class="info-row"><span class="lbl">पिता/पति</span><span class="val">${esc(stored.father_name)}</span></div>
      <div class="info-row"><span class="lbl">मोबाइल</span><span class="val">${esc(stored.mobile)}</span></div>
      <div class="info-row"><span class="lbl">पद</span><span class="val">${esc(stored.designation)}</span></div>
    </div>
    <div class="pay-amount-wrap">
      <div style="font-size:0.78rem;color:#888;text-transform:uppercase;letter-spacing:0.5px">कुल देय राशि</div>
      <div class="pay-amount">₹${esc(stored.fee || '—')}</div>
    </div>
    <div class="step">1️⃣ पहले भुगतान करें:</div>
    <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" target="_blank" class="btn btn-pay" id="payLink">💳 Razorpay से भुगतान करें</a>
    <div class="step">2️⃣ भुगतान का स्क्रीनशॉट अपलोड करें (अनिवार्य):</div>
    <input type="file" id="paymentProof" accept="image/*" required>
    <img id="previewImg" alt="Screenshot Preview">
    <div class="step">3️⃣ भुगतान पूर्ण होने के बाद यह बटन दबाएं:</div>
    <button class="btn btn-submit" id="paidBtn">✅ मैंने भुगतान कर दिया है</button>
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <p id="progressText">प्रक्रिया जारी है...</p>
    </div>
    <p class="note">भुगतान के बाद आपका ID Card संस्था द्वारा सत्यापन के पश्चात जारी किया जाएगा।</p>
  `;

  document.getElementById('paymentProof').addEventListener('change', function() {
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      selectedImageDataUrl = e.target.result;
      const img = document.getElementById('previewImg');
      img.src = e.target.result; img.style.display = 'block';
      document.getElementById('paidBtn').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('paidBtn').onclick = async () => {
    if(!selectedImageDataUrl){ alert('⚠️ कृपया भुगतान स्क्रीनशॉट अपलोड करें!'); return; }
    const btn = document.getElementById('paidBtn');
    btn.disabled = true; btn.innerText = 'प्रक्रिया जारी है...';
    document.getElementById('progressWrap').style.display = 'block';
    setProgress(20, 'Image compress हो रही है...');

    try {
      const [{db}, {collection, addDoc, serverTimestamp}] = await Promise.all([
        import('./firebase-config.js'),
        import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js')
      ]);

      // Compress payment screenshot
      const payScreenshot = await compressImage(selectedImageDataUrl);
      setProgress(50, 'Firestore में save हो रहा है...');

      // Compress applicant photo if available
      let applicantPhoto = null;
      if(photoDataURL) {
        try { applicantPhoto = await compressImage(photoDataURL, 400, 0.8); } catch(e){}
      }

      const data = {
        ...stored,
        photoBase64: applicantPhoto,
        paymentScreenshotBase64: payScreenshot,
        paymentStatus: 'Paid (Screenshot Uploaded)',
        status: 'Pending',
        type: 'IDcard',
        createdAt: serverTimestamp(),
        submittedAt: new Date().toISOString()
      };
      delete data.photoDataURL;

      const docRef = await addDoc(collection(db, 'IDcard'), data);
      setProgress(75, 'Email भेजी जा रही है...');

      // ── Applicant को email ──
      if(stored.email) {
        try {
          await emailjs.send('service_63pefgf', 'template_xq7uilj', {
            to_name: stored.name,
            to_email: stored.email,
            doc_type: 'ID Card आवेदन',
            status: 'प्राप्त हो गया, सत्यापन हेतु लंबित',
            post: stored.designation || '—',
            district: stored.address || '—',
            message: 'भुगतान प्राप्त हो गया है। सत्यापन के पश्चात ID Card जारी किया जाएगा।'
          });
        } catch(e){ console.warn('Applicant email failed:', e); }
      }

      // ── Admin को Notification ──
      try {
        await emailjs.send('service_63pefgf', 'template_wvzbj7p', {
          to_name: 'Admin',
          to_email: 'unnatiselfhelpgroup@gmail.com',
          name: stored.name || '—',
          mobile: stored.mobile || '—',
          email: stored.email || '—',
          designation: stored.designation || '—',
          district: stored.address || '—',
          fee: stored.fee || '—',
          doc_id: docRef.id,
          type: 'IDcard',
          title: 'ID Card आवेदन',
          message: `नया ID Card आवेदन आया है।\nनाम: ${stored.name}\nपद: ${stored.designation}\nमोबाइल: ${stored.mobile}`
        });
      } catch(e){ console.warn('Admin email failed:', e); }

      setProgress(100, 'सफल!');
      sessionStorage.removeItem('idCardApplicant');
      sessionStorage.removeItem('idCardPhoto');

      document.body.innerHTML = `
        <div class="tricolor-top"></div>
        <main style="padding-top:60px;max-width:460px;margin:0 auto;padding:60px 16px 48px">
          <div class="pay-card" style="text-align:center">
            <div style="font-size:60px">✅</div>
            <h3 style="color:var(--green);font-family:'Tiro Devanagari Hindi',serif;margin:12px 0">आवेदन सफलतापूर्वक जमा हो गया!</h3>
            <p style="color:#555;font-size:0.9rem;line-height:1.7">भुगतान स्क्रीनशॉट सुरक्षित रूप से सेव हुआ।<br>एडमिन जांच के बाद ईमेल पर सूचित किया जाएगा।</p>
            <p style="color:#888;font-size:0.75rem;margin-top:10px">ID: ${docRef.id}</p>
            <a href="index.html" class="btn btn-pay" style="margin-top:20px;display:inline-block;width:auto;padding:13px 28px">🏠 होम पेज</a>
          </div>
        </main>`;
    } catch(err) {
      console.error(err);
      alert('❌ त्रुटि: ' + (err.message || 'दोबारा प्रयास करें।'));
      btn.disabled = false; btn.innerText = '✅ मैंने भुगतान कर दिया है';
      document.getElementById('progressWrap').style.display = 'none';
    }
  };
} else {
  infoDiv.innerHTML = '<p style="text-align:center;color:#c0392b;padding:20px">⚠️ जानकारी नहीं मिली। कृपया पहले ID Card आवेदन फॉर्म भरें।</p><a href="id-card.html" class="btn btn-pay" style="display:inline-block;width:auto;margin:10px auto;padding:12px 24px">← फॉर्म पर जाएँ</a>';
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').innerText = msg;
}
</script>
</body>
</html>
