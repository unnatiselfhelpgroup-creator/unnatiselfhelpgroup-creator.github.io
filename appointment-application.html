    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', Arial, sans-serif; background: #f4f7fa; padding: 20px; line-height: 1.7; color: #1b2430; }
        .appoint-form { max-width: 600px; margin: 30px auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #1b2430; text-align: center; font-size: 1.6rem; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin: 12px 0 4px; font-size: 0.9rem; color: #333; }
        input, select {
            width: 100%; padding: 12px 15px; margin-bottom: 4px;
            border: 1.5px solid #ddd; border-radius: 10px; font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #d4af37; }
        input:invalid:not(:placeholder-shown) { border-color: #e74c3c; }
        .fee-box {
            background: #fff8e1; border: 1.5px solid #d4af37; border-radius: 10px;
            padding: 12px 15px; margin: 10px 0; font-weight: bold; display: none;
        }
        .agree-label { display: flex; align-items: flex-start; gap: 10px; margin: 18px 0; font-size: 0.9rem; cursor: pointer; }
        .agree-label input[type="checkbox"] { width: auto; margin-top: 3px; accent-color: #d4af37; flex-shrink: 0; }
        button[type="submit"] {
            width: 100%; padding: 15px; background: #d4af37; border: none;
            border-radius: 10px; color: #1b2430; font-weight: bold; cursor: pointer;
            font-size: 1rem; margin-top: 10px; transition: background 0.3s, transform 0.1s;
        }
        button[type="submit"]:hover { background: #c9a227; }
        button[type="submit"]:active { transform: scale(0.98); }
        .error-msg { color: #e74c3c; font-size: 0.82rem; margin-top: 2px; display: none; }
    </style>
</head>
<body>

<main>
  <section class="appoint-form" aria-label="नियुक्ति आवेदन फॉर्म">
    <h1>📄 नियुक्ति हेतु आवेदन</h1>
    <p class="subtitle">संस्था के सदस्य, पदाधिकारी अथवा सेवा सहयोगी बनने हेतु आवेदन करें।</p>

    <form id="appointmentForm" novalidate>
        <label for="name">पूरा नाम *</label>
        <input type="text" id="name" name="name" placeholder="पूरा नाम लिखें" autocomplete="name" required>

        <label for="father_name">पिता/पति का नाम *</label>
        <input type="text" id="father_name" name="father_name" placeholder="पिता/पति का नाम" required>

        <label for="mobile">मोबाइल नंबर *</label>
        <input type="tel" id="mobile" name="mobile" placeholder="10 अंकों का मोबाइल नंबर" pattern="[6-9][0-9]{9}" autocomplete="tel" required>
        <span class="error-msg" id="mobileErr">कृपया 10 अंकों का सही मोबाइल नंबर दर्ज करें।</span>

        <label for="email">ईमेल आईडी *</label>
        <input type="email" id="email" name="email" placeholder="yourname@email.com" autocomplete="email" required>

        <label for="address">पूरा पता *</label>
        <input type="text" id="address" name="address" placeholder="गांव/मोहल्ला, जिला, राज्य" autocomplete="street-address" required>

        <label for="designationSelect">पद (Designation) *</label>
        <select id="designationSelect" name="designation" required>
            <option value="">पद चुनें</option>
            <option value="ग्राम गौ-संयोजक">ग्राम गौ-संयोजक</option>
            <option value="ब्लॉक गौ-प्रभारी">ब्लॉक गौ-प्रभारी</option>
            <option value="जिला गौ-समन्वयक">जिला गौ-समन्वयक</option>
            <option value="प्रदेश कार्यकारिणी सदस्य">प्रदेश कार्यकारिणी सदस्य</option>
            <option value="राष्ट्रीय गौ-पदाधिकारी">राष्ट्रीय गौ-पदाधिकारी</option>
            <option value="Volunteer">Volunteer (स्वयंसेवक)</option>
        </select>

        <div class="fee-box" id="feeBox" role="status" aria-live="polite"></div>

        <label class="agree-label">
            <input type="checkbox" name="agree" id="agreeCheck" required>
            <span>मैं संस्था की नियम एवं शर्तों, शुल्क नीति तथा सदस्यता नियमों से सहमत हूँ।</span>
        </label>

        <button type="submit">आवेदन जमा करें एवं भुगतान हेतु आगे बढ़ें →</button>
    </form>
  </section>
</main>

<script>
    const FEE_BY_DESIGNATION = {
        "ग्राम गौ-संयोजक": "₹150",
        "ब्लॉक गौ-प्रभारी": "₹500",
        "जिला गौ-समन्वयक": "₹1100",
        "प्रदेश कार्यकारिणी सदस्य": "₹2500",
        "राष्ट्रीय गौ-पदाधिकारी": "₹5100 – ₹11000",
        "Volunteer": "₹700 (एकमुश्त)"
    };

    const select = document.getElementById("designationSelect");
    const feeBox = document.getElementById("feeBox");
    const mobileInput = document.getElementById("mobile");
    const mobileErr = document.getElementById("mobileErr");

    select.addEventListener("change", () => {
        const fee = FEE_BY_DESIGNATION[select.value];
        if (fee) {
            feeBox.style.display = "block";
            feeBox.innerText = "इस पद हेतु सहयोग राशि: " + fee + " (Non-Refundable)";
        } else {
            feeBox.style.display = "none";
        }
    });

    mobileInput.addEventListener("input", () => {
        mobileErr.style.display = mobileInput.validity.patternMismatch ? "block" : "none";
    });

    document.getElementById("appointmentForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const form = e.target;
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        const data = Object.fromEntries(new FormData(form).entries());
        data.fee = FEE_BY_DESIGNATION[data.designation] || "-";
        delete data.agree;
        sessionStorage.setItem("pendingAppointmentData", JSON.stringify(data));
        window.location.href = "appointment-payment.html";
    });
</script>

</body>
