<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="उन्नति स्वयं सहायता समिति में सदस्य, पदाधिकारी अथवा स्वयंसेवक बनने हेतु आवेदन करें।" />
  <link rel="canonical" href="https://unnatiselfhelpgroup-creator.github.io/appointment-application.html" />
  <title>नियुक्ति आवेदन | उन्नति स्वयं सहायता समिति</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f4ef; color: #222; }
    header { background: #4a0404; color: #fff; text-align: center; padding: 18px 12px 14px; }
    header img { height: 64px; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    .container { max-width: 600px; margin: 28px auto 48px; background: #fff; border-radius: 14px; box-shadow: 0 2px 20px rgba(0,0,0,0.10); padding: 28px 24px 32px; }
    label { display: block; font-size: 0.87rem; font-weight: 600; color: #444; margin-bottom: 4px; margin-top: 15px; }
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 0.93rem; background: #fafafa; }
    .btn { display: block; width: 100%; margin-top: 22px; padding: 14px; background: #4a0404; color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: 9px; cursor: pointer; }
    .fee-section { background: #fff8e1; border: 1.5px solid #f5c518; border-radius: 10px; padding: 16px 18px; margin-top: 24px; }
  </style>
</head>
<body>
<header>
  <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="Logo" />
  <h1>उन्नति स्वयं सहायता समिति</h1>
</header>
<div class="container">
  <h2>📄 नियुक्ति हेतु आवेदन</h2>
  <label>पूरा नाम <span style="color:red;">*</span></label>
  <input type="text" id="fullname" required />
  <label>मोबाइल नंबर <span style="color:red;">*</span></label>
  <input type="tel" id="mobile" maxlength="10" required />
  <label>सदस्य श्रेणी <span style="color:red;">*</span></label>
  <select id="category" onchange="onCategoryChange()" required>
    <option value="">श्रेणी चुनें</option>
    <option value="volunteer">Volunteer (स्वयंसेवक)</option>
    <option value="officer">पदाधिकारी</option>
  </select>
  <label>पद (Designation) <span style="color:red;">*</span></label>
  <select id="designation" required>
    <option value="">— पहले श्रेणी चुनें —</option>
  </select>
  <button class="btn" onclick="submitForm()">📤 आवेदन जमा करें एवं भुगतान हेतु आगे बढ़ें</button>
</div>
<script>
  const designationMap = {
    volunteer: [{ label: 'Volunteer (स्वयंसेवक)', fee: 151 }],
    officer: [{ label: 'ग्राम गौ-संयोजक', fee: 151 }, { label: 'ब्लॉक गौ-प्रभारी', fee: 351 }, { label: 'जिला गौ-समन्वयक', fee: 551 }]
  };
  function onCategoryChange() {
    const cat = document.getElementById('category').value;
    const sel = document.getElementById('designation');
    sel.innerHTML = '<option value="">पद चुनें</option>';
    if (designationMap[cat]) {
      designationMap[cat].forEach(d => {
        let opt = document.createElement('option');
        opt.value = d.label; opt.dataset.fee = d.fee;
        opt.textContent = `${d.label} — ₹${d.fee}`;
        sel.appendChild(opt);
      });
    }
  }
  function submitForm() {
    const fullname = document.getElementById('fullname').value.trim();
    const desig = document.getElementById('designation');
    if (!fullname || !desig.value) { alert('कृपया सभी जानकारी भरें।'); return; }
    
    // डेटा सेव करें
    const applicantData = {
        name: fullname,
        cat: desig.value,
        fee: desig.options[desig.selectedIndex].dataset.fee
    };
    sessionStorage.setItem('applicant', JSON.stringify(applicantData));
    window.location.href = 'appointment-payment.html';
  }
</script>
</body>
</html>
