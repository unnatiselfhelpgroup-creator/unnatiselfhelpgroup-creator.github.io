<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Appointment Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #001a33; margin: 0; padding: 20px; }
        h1 { text-align: center; color: white; }
        #list { max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card button { border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin: 5px; cursor: pointer; }
        .approve { background: #28a745; color: white; }
        .reject { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Appointment Applications</h1>
    <div id="list"></div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "admin-login.html";
            else loadData();
        });

        async function loadData() {
            const snap = await getDocs(collection(db, "Appointments"));
            const list = document.getElementById("list");
            snap.forEach(docItem => {
                const d = docItem.data();
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<p><b>नाम:</b> ${d.name}</p><p><b>पद:</b> ${d.designation}</p>
                    <button class="approve" onclick="updateStatus('${docItem.id}', 'Verified')">Approve</button>
                    <button class="reject" onclick="updateStatus('${docItem.id}', 'Rejected')">Reject</button>
                    <button onclick='generateAppointmentPDF(${JSON.stringify(d).replace(/"/g, "&quot;")})'>PDF</button>`;
                list.appendChild(card);
            });
        }

        window.updateStatus = async (id, status) => {
            await updateDoc(doc(db, "Appointments", id), { status: status });
            location.reload();
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="appointment-pdf.js"></script>
</body>
</html>
