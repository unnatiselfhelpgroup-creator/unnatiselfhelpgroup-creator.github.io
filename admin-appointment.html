    <style>

        body{font-family:'Segoe UI',Arial,sans-serif;background:#071b34;color:#fff;padding:20px;min-height:100vh}
        h1{text-align:center;color:#d4af37;margin-bottom:20px;font-size:1.3rem}

        table{width:100%;border-collapse:collapse;min-width:600px;font-size:0.85rem}
        th{background:#0f2d54;color:#d4af37;padding:10px 12px;text-align:left}
        td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.08);vertical-align:middle}
        tr:hover td{background:rgba(255,255,255,0.05)}
        .status{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:700}
        .status.pending{background:#ffa500;color:#000}
        .status.approved{background:#27ae60;color:#fff}
        .status.rejected{background:#c0392b;color:#fff}
        .btn{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:700;margin:2px}

        .btn.reject{background:#c0392b;color:#fff}

        .loading{text-align:center;padding:30px;color:#aaa}
        .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
        .filter-bar select,.filter-bar input{padding:7px 12px;border-radius:8px;border:1px solid #d4af37;background:#0f2d54;color:#fff;font-size:0.85rem}
        .count-badge{background:#d4af37;color:#071b34;padding:3px 10px;border-radius:20px;font-size:0.8rem;font-weight:700}
    
    /* ══ 3D BUTTONS ══ */
    .btn,button[type="submit"],.btn-submit,.pay-link,.tab,.logout-btn,.modal-close{
        position:relative;cursor:pointer;border:none;font-weight:700;letter-spacing:0.3px;
        transition:all 0.08s ease!important;user-select:none;-webkit-user-select:none;
        transform:translateY(-3px);
        box-shadow:0 6px 0 rgba(0,0,0,0.35),0 8px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.25)!important;
    }
    .btn:active,button[type="submit"]:active,.btn-submit:active,.pay-link:active{
        box-shadow:0 1px 0 rgba(0,0,0,0.35),inset 0 2px 4px rgba(0,0,0,0.2)!important;
        transform:translateY(4px)!important;
    }
    .btn:hover,button[type="submit"]:hover,.btn-submit:hover,.pay-link:hover{
        transform:translateY(-5px)!important;filter:brightness(1.08);
        box-shadow:0 9px 0 rgba(0,0,0,0.35),0 14px 22px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.3)!important;
    }
    .btn:disabled,button:disabled{transform:translateY(0)!important;box-shadow:0 2px 0 rgba(0,0,0,0.2)!important;filter:grayscale(0.5);cursor:not-allowed!important}
    .btn.approve{background:linear-gradient(145deg,#2ecc71,#27ae60)!important;box-shadow:0 6px 0 #1a7a43,0 8px 12px rgba(39,174,96,0.4),inset 0 1px 0 rgba(255,255,255,0.3)!important}
    .btn.approve:active{box-shadow:0 1px 0 #1a7a43,inset 0 2px 4px rgba(0,0,0,0.2)!important;transform:translateY(4px)!important}
    .btn.approve:hover{box-shadow:0 8px 0 #1a7a43,0 12px 20px rgba(39,174,96,0.5),inset 0 1px 0 rgba(255,255,255,0.35)!important}
    .btn.reject{background:linear-gradient(145deg,#e74c3c,#c0392b)!important;box-shadow:0 6px 0 #8c1a12,0 8px 12px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.25)!important}
    .btn.reject:active{box-shadow:0 1px 0 #8c1a12,inset 0 2px 4px rgba(0,0,0,0.2)!important;transform:translateY(4px)!important}
    .btn.reject:hover{box-shadow:0 8px 0 #8c1a12,0 12px 20px rgba(192,57,43,0.5),inset 0 1px 0 rgba(255,255,255,0.3)!important}
    .btn.pdf{background:linear-gradient(145deg,#f4d03f,#d4af37)!important;color:#071b34!important;box-shadow:0 6px 0 #9a7d1a,0 8px 12px rgba(212,175,55,0.4),inset 0 1px 0 rgba(255,255,255,0.4)!important}
    .btn.pdf:active{box-shadow:0 1px 0 #9a7d1a,inset 0 2px 4px rgba(0,0,0,0.15)!important;transform:translateY(4px)!important}
    .btn.pdf:hover{box-shadow:0 8px 0 #9a7d1a,0 12px 20px rgba(212,175,55,0.5),inset 0 1px 0 rgba(255,255,255,0.45)!important}
    .btn.idpdf{background:linear-gradient(145deg,#2980b9,#1565c0)!important;box-shadow:0 6px 0 #0a3d6b,0 8px 12px rgba(21,101,192,0.4),inset 0 1px 0 rgba(255,255,255,0.25)!important}
    .btn.idpdf:active{box-shadow:0 1px 0 #0a3d6b,inset 0 2px 4px rgba(0,0,0,0.2)!important;transform:translateY(4px)!important}
    .btn-submit,button[type="submit"]{
        background:linear-gradient(145deg,#8b1a1a,#4a0404)!important;color:#fff!important;
        box-shadow:0 7px 0 #2a0000,0 10px 16px rgba(74,4,4,0.45),inset 0 1px 0 rgba(255,255,255,0.15)!important;
    }
    .btn-submit:active,button[type="submit"]:active{box-shadow:0 2px 0 #2a0000,inset 0 3px 6px rgba(0,0,0,0.3)!important;transform:translateY(5px)!important}
    .pay-link{background:linear-gradient(145deg,#1976d2,#0d47a1)!important;box-shadow:0 7px 0 #062d6e,0 10px 16px rgba(13,71,161,0.45),inset 0 1px 0 rgba(255,255,255,0.2)!important}
    .tab{box-shadow:0 5px 0 rgba(0,0,0,0.3),0 6px 10px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.15)!important;transform:translateY(-2px)}
    .tab:active{box-shadow:0 1px 0 rgba(0,0,0,0.3)!important;transform:translateY(3px)!important}
    .tab.active{box-shadow:0 5px 0 #9a7d1a,0 8px 14px rgba(212,175,55,0.4),inset 0 1px 0 rgba(255,255,255,0.3)!important}
    .logout-btn{box-shadow:0 5px 0 #7a0000,0 8px 14px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.2)!important;transform:translateY(-2px)}

    .modal-close{box-shadow:0 4px 0 #8c1a12,0 6px 10px rgba(192,57,43,0.35),inset 0 1px 0 rgba(255,255,255,0.2)!important;transform:translateY(-2px)}
    .modal-close:active{box-shadow:0 1px 0 #8c1a12!important;transform:translateY(2px)!important}

    .back-link a:active{box-shadow:0 1px 0 #1a0000!important;transform:translateY(3px)!important}
    /* ══ END 3D BUTTONS ══ */

</style>

<body>
<a class="back" href="admin-dashboard.html">⬅ Dashboard पर जाएं</a>
<h1>📋 नियुक्ति आवेदन प्रबंधन</h1>

<div class="filter-bar">
    <select id="statusFilter">
        <option value="">सभी स्थिति</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
    </select>
    <input type="text" id="searchInput" placeholder="नाम / मोबाइल खोजें...">
    <span class="count-badge" id="countBadge">लोड...</span>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr><th>नाम</th><th>पद</th><th>मोबाइल</th><th>ईमेल</th><th>राशि</th><th>स्थिति</th><th>Action</th></tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="7" class="loading">डेटा लोड हो रहा है...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
import { db, auth } from "./firebase-config.js";
import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let allData = [];

function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function statusBadge(s){ const cls=s==="Approved"?"approved":s==="Rejected"?"rejected":"pending"; return `<span class="status ${cls}">${esc(s||"Pending")}</span>`; }

onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    loadData();
});

async function loadData() {
    const body = document.getElementById("tableBody");
    try {
        const snap = await getDocs(collection(db, "Appointments"));
        allData = [];
        snap.forEach(d => allData.push({ id: d.id, ...d.data() }));
        renderTable(allData);
    } catch(e) {
        body.innerHTML = `<tr><td colspan="7" class="loading">त्रुटि: ${esc(e.message)}</td></tr>`;
    }
}

function renderTable(data) {
    const body = document.getElementById("tableBody");
    document.getElementById("countBadge").textContent = "कुल: " + data.length;
    if (!data.length) { body.innerHTML = "<tr><td colspan='7' class='loading'>कोई रिकॉर्ड नहीं मिला।</td></tr>"; return; }
    body.innerHTML = "";
    data.forEach(x => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${esc(x.name)}</td>
            <td>${esc(x.designation)}</td>
            <td>${esc(x.mobile)}</td>
            <td style="font-size:0.75rem">${esc(x.email)}</td>
            <td>${esc(x.fee)}</td>
            <td>${statusBadge(x.status)}</td>
            <td>
                <button class="btn approve" data-id="${x.id}" data-name="${esc(x.name)}" data-email="${esc(x.email)}" data-action="Approved">✅</button>
                <button class="btn reject"  data-id="${x.id}" data-action="Rejected">❌</button>
            </td>`;
        body.appendChild(row);
    });
}

// फ़िल्टर
function applyFilter() {
    const status = document.getElementById("statusFilter").value;
    const search = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allData.filter(x => {
        const matchStatus = !status || (x.status || "Pending") === status;
        const matchSearch = !search || (x.name||"").toLowerCase().includes(search) || (x.mobile||"").includes(search);
        return matchStatus && matchSearch;
    });
    renderTable(filtered);
}
document.getElementById("statusFilter").addEventListener("change", applyFilter);
document.getElementById("searchInput").addEventListener("input", applyFilter);

// Action
document.getElementById("tableBody").addEventListener("click", async e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const { id, name, email, action } = btn.dataset;
    if (!confirm(`"${name || id}" को ${action} करें?`)) return;
    btn.disabled = true;
    try {
        await updateDoc(doc(db, "Appointments", id), { status: action });
        if (action === "Approved" && email && typeof emailjs !== "undefined") {
            await emailjs.send("service_63pefgf", "template_wvzbj7p", {
                user_name: name, user_email: email, name, email,
                designation: "नियुक्ति Approved", doc_id: id, type: "Appointments"
            });
        }
        alert("✅ " + action);
        loadData();
    } catch(err) { alert("❌ " + err.message); btn.disabled = false; }
});
</script>
</body>
</html>
