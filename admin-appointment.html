<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Appointment Panel | उन्नति स्वयं सहायता समिति</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #001a33; padding: 20px; font-family: Arial; color: white; }
        h1 { color: #d4af37; text-align: center; margin-bottom: 20px; }
        .back-btn { display:inline-block; margin-bottom:15px; padding:10px 20px; background:#d4af37; color:#1b2430; border-radius:8px; text-decoration:none; font-weight:bold; }
        .card { background: white; color: black; padding: 20px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card h3 { color: #1b2430; margin-bottom: 8px; font-size: 16px; }
        .card p { font-size: 13px; margin: 3px 0; color: #444; }
        .btn-row { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 14px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .pdf { background: #28a745; color: white; }
        .pdf-gray { background: gray; color: white; cursor: not-allowed; }
        .ss-btn { background: #3395ff; color: white; }
        #loading { text-align: center; color: #ffd700; padding: 30px; }
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
        .b-pending { background:#ff8b00; color:white; }
        .b-verified { background:#00a651; color:white; }
        .b-rejected { background:#ff4d4d; color:white; }
        /* Modal */
        #ssModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); z-index:9999; align-items:center; justify-content:center; }
        #ssModal.open { display:flex; }
        #ssModal img { max-width:90vw; max-height:88vh; border:3px solid #d4af37; border-radius:10px; }
        #ssClose { position:absolute; top:15px; right:20px; color:white; font-size:32px; cursor:pointer; background:rgba(0,0,0,0.6); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; line-height:1; }
    </style>
</head>
<body>
    <a href="admin-dashboard.html" class="back-btn">⬅ Dashboard</a>
    <h1>📄 नियुक्ति आवेदन सूची</h1>
    <div id="loading">⏳ लोड हो रहा है...</div>
    <div id="list"></div>

    <!-- Screenshot Modal -->
    <div id="ssModal">
        <div id="ssClose" onclick="document.getElementById('ssModal').className=''; document.getElementById('ssImg').src='';">✕</div>
        <img id="ssImg" src="" alt="Payment Screenshot">
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "admin-login.html"; }
        });

        const recordsById = new Map();

        window.showSS = function(src) {
            document.getElementById("ssImg").src = src;
            document.getElementById("ssModal").className = "open";
        };

        async function init() {
            try {
                const snap = await getDocs(collection(db, "Appointments"));
                document.getElementById("loading").style.display = "none";
                const list = document.getElementById("list");
                list.innerHTML = "";
                recordsById.clear();

                if (snap.empty) {
                    list.innerHTML = "<p style='color:#ffd700;text-align:center;padding:20px;'>कोई आवेदन नहीं है।</p>";
                    return;
                }

                const docs = [];
                snap.forEach(d => docs.push({ id: d.id, ...d.data() }));
                docs.sort((a,b) => (b.submittedAt||"") > (a.submittedAt||"") ? 1 : -1);

                docs.forEach(d => {
                    recordsById.set(d.id, d);
                    const isVerified = (d.status||"").toLowerCase() === "verified";
                    const proofSrc = d.paymentScreenshotBase64 || d.paymentScreenshotURL || "";
                    const sc = (d.status||"pending").toLowerCase();
                    const bClass = sc==="verified"?"b-verified":sc==="rejected"?"b-rejected":"b-pending";

                    const card = document.createElement("div");
                    card.className = "card";

                    // Name + Designation
                    const h3 = document.createElement("h3");
                    h3.textContent = (d.name||"नाम उपलब्ध नहीं") + " — " + (d.designation||"-");
                    card.appendChild(h3);

                    // Info rows
                    [
                        ["पिता/पति", d.father_name],
                        ["मोबाइल", d.mobile],
                        ["ईमेल", d.email],
                        ["पता", d.address],
                        ["सहयोग राशि", d.fee],
                        ["दिनांक", d.submittedAt ? d.submittedAt.slice(0,10) : null]
                    ].forEach(([lbl, val]) => {
                        if (val) {
                            const p = document.createElement("p");
                            const b = document.createElement("b");
                            b.textContent = lbl + ": ";
                            p.appendChild(b);
                            p.appendChild(document.createTextNode(val));
                            card.appendChild(p);
                        }
                    });

                    // Status badge
                    const sp = document.createElement("p");
                    sp.innerHTML = `<b>स्थिति:</b> <span class="badge ${bClass}">${d.status||"Pending"}</span>`;
                    card.appendChild(sp);

                    // Buttons
                    const btnRow = document.createElement("div");
                    btnRow.className = "btn-row";

                    if (isVerified) {
                        const pdfBtn = document.createElement("button");
                        pdfBtn.className = "pdf";
                        pdfBtn.textContent = "📄 PDF डाउनलोड";
                        pdfBtn.onclick = () => { const r = recordsById.get(d.id); if(r) window.generateAppointmentPDF(r); };
                        btnRow.appendChild(pdfBtn);
                    } else {
                        const gBtn = document.createElement("button");
                        gBtn.className = "pdf-gray"; gBtn.disabled = true;
                        gBtn.textContent = "⏳ Verify होने पर PDF";
                        btnRow.appendChild(gBtn);
                    }

                    if (proofSrc) {
                        const ssBtn = document.createElement("button");
                        ssBtn.className = "ss-btn";
                        ssBtn.textContent = "📸 Payment Screenshot";
                        ssBtn.onclick = () => window.showSS(proofSrc);
                        btnRow.appendChild(ssBtn);
                    }

                    card.appendChild(btnRow);
                    list.appendChild(card);
                });
            } catch(e) {
                document.getElementById("loading").textContent = "❌ त्रुटि: " + e.message;
            }
        }
        init();
    </script>
    <script src="appointment-pdf.js"></script>
</body>
</html>
