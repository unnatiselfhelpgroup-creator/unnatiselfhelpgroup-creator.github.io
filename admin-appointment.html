<!DOCTYPE html><html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Appointment Admin | Unnati Swayam Sahayata Samiti</title><script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>

body{
font-family:Poppins,sans-serif;
background:#071b34;
color:#fff;
padding:20px;
margin:0;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:30px;
}

.search-box{
text-align:center;
margin-bottom:25px;
}

.search-box input{
width:300px;
max-width:95%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.card{
background:#fff;
color:#000;
padding:20px;
margin:20px auto;
border-radius:20px;
max-width:800px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.card h3{
margin-top:0;
color:#071b34;
}

.status{
font-weight:bold;
}

.pending{
color:orange;
}

.approved{
color:green;
}

.rejected{
color:red;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.verify{
background:#28a745;
color:#fff;
}

.reject{
background:#dc3545;
color:#fff;
}

.delete{
background:#000;
color:#fff;
}

.pdf{
background:#d4af37;
color:#000;
}

.print{
background:#007bff;
color:#fff;
}

.back{
display:inline-block;
margin-top:30px;
padding:12px 25px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

</style></head><body><h1>📄 Appointment Applications</h1><div class="search-box">
<input
type="text"
id="searchInput"
placeholder="नाम या मोबाइल खोजें..."
onkeyup="searchCards()">
</div><div id="list">
Loading...
</div><center>
<a
href="admin-dashboard.html"
class="back">
⬅ Dashboard
</a>
</center><script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNEZ03VUTOD-eJjPsMP4b0Ykh4eiigqPQ",
authDomain: "ngo-certificate-system.firebaseapp.com",
projectId: "ngo-certificate-system",
storageBucket: "ngo-certificate-system.firebasestorage.app",
messagingSenderId: "664351169113",
appId: "1:664351169113:web:3c476e199d369615c6ef48",
measurementId: "G-9R3TGZ7R8S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snap =
await getDocs(
collection(db,"Appointments")
);

let html = "";

snap.forEach(docItem=>{

const d = docItem.data();

let statusClass = "pending";
let statusText = "Pending";

if(d.status==="verified"){
statusClass = "approved";
statusText = "Verified";
}

if(d.status==="rejected"){
statusClass = "rejected";
statusText = "Rejected";
}

const jsonData =
JSON.stringify(d)
.replace(/"/g,'&quot;');

html += `

<div class="card appointment-card">

<h3>${d.name || ""}</h3>

<p><b>Father :</b> ${d.father_name || ""}</p>

<p><b>Mobile :</b> ${d.mobile || ""}</p>

<p><b>Email :</b> ${d.email || ""}</p>

<p><b>Address :</b> ${d.address || ""}</p>

<p><b>District :</b> ${d.district || ""}</p>

<p><b>State :</b> ${d.state || ""}</p>

<p class="status ${statusClass}">
Status : ${statusText}
</p>

<button
class="verify"
onclick="
verifyApplication(
'Appointments',
'${docItem.id}',
'${d.name || ""}',
'${d.email || ""}',
${jsonData}
)
">
Approve
</button>

<button
class="reject"
onclick="
rejectApplication(
'Appointments',
'${docItem.id}',
'${d.name || ""}',
'${d.email || ""}'
)
">
Reject
</button>

<button
class="delete"
onclick="
deleteApplication(
'Appointments',
'${docItem.id}'
)
">
Delete
</button>

<button
class="pdf"
onclick="
generateAppointmentPDF(
${jsonData}
)
">
PDF
</button>

<button
class="print"
onclick="window.print()">
Print
</button>

</div>

`;

});

document.getElementById("list").innerHTML = html;

</script><script>

function searchCards(){

let input =
document.getElementById(
"searchInput"
)
.value
.toLowerCase();

let cards =
document.querySelectorAll(
".appointment-card"
);

cards.forEach(card=>{

let text =
card.innerText.toLowerCase();

card.style.display =
text.includes(input)
? "block"
: "none";

});

}

</script><script src="appointment-pdf.js"></script><script
type="module"
src="firebase-script.js">
</script></body>
</html>
