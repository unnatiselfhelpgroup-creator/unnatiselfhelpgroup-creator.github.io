<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Appointments Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{
font-family:Poppins,sans-serif;
background:#4a0404;
color:#fff;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
margin:20px 0;
border-radius:15px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}
</style>

</head>
<body>

<h1>Appointment Applications</h1>

<div id="list"></div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNEZ03VUTOD-eJjPsMP4b0Ykh4eiigqPQ",
  authDomain: "ngo-certificate-system.firebaseapp.com",
  projectId: "ngo-certificate-system",
  storageBucket: "ngo-certificate-system.firebasestorage.app",
  messagingSenderId: "664351169113",
  appId: "1:664351169113:web:3c476e199d369615c6ef48"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const snap=
await getDocs(
collection(db,"Appointments")
);

let html="";

snap.forEach(docItem=>{

const d=docItem.data();

html+=`

<div class="card">

<h3>${d.name}</h3>

<p>
Father :
${d.father_name}
</p>

<p>
Mobile :
${d.mobile}
</p>

<p>
Email :
${d.email}
</p>

<p>
Status :
${d.status}
</p>

<button onclick="
verifyApplication(
'Appointments',
'${docItem.id}',
'${d.name}',
'${d.email}',
{
name:'${d.name}',
father_name:'${d.father_name}',
address:'${d.address}',
mobile:'${d.mobile}',
email:'${d.email}'
}
)
">
Verify
</button>

<button onclick="
rejectApplication(
'Appointments',
'${docItem.id}',
'${d.name}',
'${d.email}'
)
">
Reject
</button>

<button onclick="
deleteApplication(
'Appointments',
'${docItem.id}'
)
">
Delete
</button>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=html;

</script>
<script src="appointment-pdf.js"></script>
<script type="module" src="firebase-script.js"></script>

</body>
</html>
