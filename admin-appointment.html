<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Appointment Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #001a33; margin: 0; padding: 20px; }
        h1 { text-align: center; color: white; }
        #list { max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card button { border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin: 5px; cursor: pointer; }
        .approve { background: #28a745; color: white; }
        .reject { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Appointment Applications</h1>
    <div id="list"></div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        // doc id -> data, ताकि PDF बटन में JSON को सीधे HTML attribute में न डालना पड़े
        // (नाम/पिता आदि में अपॉस्ट्रॉफी ' होने पर वह तरीका टूट जाता था)
        const recordsById = new Map();

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "admin-login.html";
            else loadData();
        });

        async function loadData() {
            const snap = await getDocs(collection(db, "Appointments"));
            const list = document.getElementById("list");
            list.innerHTML = "";
            recordsById.clear();

            snap.forEach(docItem => {
                const d = docItem.data();
                recordsById.set(docItem.id, d);

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<p><b>नाम:</b> ${d.name || "-"}</p><p><b>पद:</b> ${d.designation || "-"}</p><p><b>स्थिति:</b> ${d.status || "Pending"}</p>
                    <button class="approve" data-action="approve" data-id="${docItem.id}">Approve</button>
                    <button class="reject" data-action="reject" data-id="${docItem.id}">Reject</button>
                    <button data-action="pdf" data-id="${docItem.id}">PDF</button>`;
                list.appendChild(card);
            });
        }

        document.getElementById("list").addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-action]");
            if (!btn) return;
            const id = btn.dataset.id;

            if (btn.dataset.action === "approve") updateStatus(id, "Verified");
            else if (btn.dataset.action === "reject") updateStatus(id, "Rejected");
            else if (btn.dataset.action === "pdf") {
                const data = recordsById.get(id);
                if (data) window.generateAppointmentPDF(data);
            }
        });

        async function updateStatus(id, status) {
            await updateDoc(doc(db, "Appointments", id), { status: status });
            location.reload();
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="appointment-pdf.js"></script>
</body>
</html>
