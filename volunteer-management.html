<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Management | उन्नति स्वयं सहायता समिति</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4a0404,#6e0505,#2f0303);
color:#fff;
min-height:100vh;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header img{
width:100px;
height:100px;
border-radius:50%;
border:4px solid gold;
padding:5px;
background:#fff;
box-shadow:0 0 25px gold;
}

.header h1{
margin-top:20px;
color:#ffd700;
font-size:35px;
text-shadow:0 0 20px gold;
}

.header p{
margin-top:10px;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
border:1px solid rgba(255,255,255,.15);
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px gold;
}

.card h2{
font-size:45px;
color:#ffd700;
margin-bottom:10px;
}

.card p{
font-size:18px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
background:linear-gradient(145deg,#ffd700,#cfa300);
color:#550000;
font-weight:bold;
text-decoration:none;
border-radius:15px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.action{
margin-top:50px;
text-align:center;
}

.action a{
margin:10px;
}

.footer{
text-align:center;
margin-top:50px;
color:#ffd700;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="ngologo.png">

<h1>Volunteer Management</h1>

<p>
उन्नति स्वयं सहायता समिति
<br>
NITI Aayog ID : US-2016/0108273
</p>

</div>

<div class="grid">

<div class="card">
<h2 id="totalVolunteer">0</h2>
<p>कुल स्वयंसेवक</p>
</div>

<div class="card">
<h2 id="activeVolunteer">0</h2>
<p>सक्रिय सदस्य</p>
</div>

<div class="card">
<h2 id="pendingVolunteer">0</h2>
<p>Pending आवेदन</p>
</div>

</div>

<div class="action">

<a href="volunteer-list.html" class="btn">
👥 Volunteer List
</a>

<a href="appointments-admin.html" class="btn">
📄 Appointment Applications
</a>

<a href="admin-dashboard.html" class="btn">
🛠 Admin Dashboard
</a>

<a href="index.html" class="btn">
🏠 Home
</a>

</div>

<div class="footer">
© 2026 उन्नति स्वयं सहायता समिति
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNEZ03VUTOD-eJjPsMP4b0Ykh4eiigqPQ",
authDomain: "ngo-certificate-system.firebaseapp.com",
projectId: "ngo-certificate-system",
storageBucket: "ngo-certificate-system.firebasestorage.app",
messagingSenderId: "664351169113",
appId: "1:664351169113:web:3c476e199d369615c6ef48"
};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let total = 0;
let active = 0;
let pending = 0;

try{

const snap =
await getDocs(
collection(db,"Volunteers")
);

total = snap.size;

snap.forEach((doc)=>{

const d = doc.data();

if(d.status==="Approved"){
active++;
}
else{
pending++;
}

});

document.getElementById(
"totalVolunteer"
).innerText = total;

document.getElementById(
"activeVolunteer"
).innerText = active;

document.getElementById(
"pendingVolunteer"
).innerText = pending;

}
catch(error){

console.log(error);

}

</script>

</body>
</html>
