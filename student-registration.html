<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>छात्र पंजीकरण | उन्नति स्वयं सहायता समिति</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fa; padding: 20px; line-height: 1.6; }
        .student-reg { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #1b2430; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff8b00; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .success-box { display: none; padding: 20px; text-align: center; border: 2px solid #00a651; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="student-reg">
    <h2>युवा सामाजिक सारथी - इंटर्नशिप</h2>
    <p style="text-align:center;">राष्ट्र सेवा, आपका अनुभव, हमारा प्रमाण पत्र।</p>

    <form id="studentRegForm">
        <input type="text" name="name" placeholder="पूरा नाम" required>
        <input type="text" name="father_name" placeholder="पिता/पति का नाम" required>
        <input type="email" name="email" placeholder="ईमेल आईडी" required>
        <input type="tel" name="mobile" placeholder="मोबाइल नंबर (10 अंक)" pattern="[0-9]{10}" maxlength="10" required>
        <input type="text" name="college" placeholder="कॉलेज / विश्वविद्यालय का नाम" required>
        <input type="text" name="course" placeholder="कोर्स / कक्षा" required>
        <textarea name="address" rows="3" placeholder="पूरा पता" required></textarea>

        <h3>सामाजिक कार्य का क्षेत्र</h3>
        <select name="social_work" required>
            <option value="">कार्य चुनें</option>
            <option value="गौ सेवा">गौ सेवा</option>
            <option value="वृक्षारोपण">वृक्षारोपण</option>
            <option value="स्वच्छ भारत अभियान">स्वच्छ भारत अभियान</option>
        </select>

        <h3>इंटर्नशिप अवधि</h3>
        <select name="duration" required>
            <option value="">अवधि चुनें</option>
            <option value="15 दिन">15 दिन</option>
            <option value="30 दिन">30 दिन</option>
        </select>

        <label style="display:flex; align-items:center; gap:10px;">
            <input type="checkbox" name="agree" required>
            मैं संस्था के नियमों से सहमत हूँ।
        </label>
        
        <button type="submit" id="submitBtn">पंजीकरण करें</button>
    </form>

    <div id="studentSuccess" class="success-box">
        <h3>✅ पंजीकरण सफल!</h3>
        <p>Admin Approval के बाद Dashboard Access मिलेगा।</p>
    </div>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const form = document.getElementById("studentRegForm");
    form.onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerText = "सबमिट हो रहा है...";

        try {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.status = "pending";
            data.type = "internship";
            data.createdAt = serverTimestamp();
            data.refId = crypto.randomUUID();

            await addDoc(collection(db, "StudentRegistrations"), data);

            form.style.display = "none";
            document.getElementById("studentSuccess").style.display = "block";
            
            // रसीद प्रिंट
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`<html><body><h2>पंजीकरण सफल</h2><p>Ref: ${data.refId}</p><p>नाम: ${data.name}</p></body></html>`);
            printWindow.document.close();
            printWindow.print();
        } catch (error) {
            console.error("Error:", error);
            alert("सबमिशन फेल हो गया, कृपया इंटरनेट चेक करें।");
            submitBtn.disabled = false;
            submitBtn.innerText = "पंजीकरण करें";
        }
    };
</script>
</body>
</html>
