<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NGO Internship Certificate Programme for School & College Students. BSW, MSW, Social Work internship. ₹300–₹700. Apply online. Haldwani, Uttarakhand. उन्नति स्वयं सहायता समिति.">
<meta name="keywords" content="NGO internship certificate online India, internship certificate school students, BSW MSW social work internship NGO, college volunteer certificate, NGO Haldwani internship 2025 2026, इंटर्नशिप कार्यक्रम NGO, volunteer certificate programme Uttarakhand">
<meta name="robots" content="index, follow">
<title>NGO Internship Certificate Online | इंटर्नशिप कार्यक्रम | उन्नति NGO</title>
<link rel="stylesheet" href="common.css">
</head>
<body>

<div class="page-header">
  <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="Logo">
  <h1>🎓 युवा सामाजिक सारथी — इंटर्नशिप</h1>
  <p>NGO Internship Certificate | BSW | MSW | College Volunteer</p>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">📋 इंटर्नशिप पंजीकरण फॉर्म</div>

    <form id="studentForm" novalidate>

      <div class="form-group">
        <label>पूरा नाम <span class="required-star">*</span></label>
        <input type="text" id="name" placeholder="अपना पूरा नाम लिखें" required>
      </div>

      <div class="form-group">
        <label>पिता/पति का नाम <span class="required-star">*</span></label>
        <input type="text" id="fatherName" placeholder="पिता/पति का नाम" required>
      </div>

      <div class="form-group">
        <label>ईमेल आईडी <span class="required-star">*</span></label>
        <input type="email" id="email" placeholder="yourname@email.com" required>
      </div>

      <div class="form-group">
        <label>मोबाइल नंबर <span class="required-star">*</span></label>
        <input type="tel" id="mobile" placeholder="10 अंकों का मोबाइल नंबर" maxlength="10" required>
      </div>

      <div class="form-group">
        <label>कॉलेज / संस्था का नाम <span class="required-star">*</span></label>
        <input type="text" id="college" placeholder="जैसे: Kumaun University, Nainital" required>
      </div>

      <div class="form-group">
        <label>कोर्स / कक्षा <span class="required-star">*</span></label>
        <input type="text" id="course" placeholder="जैसे: BSW Final Year, 12th, B.A." required>
      </div>

      <div class="form-group">
        <label>पूरा पता <span class="required-star">*</span></label>
        <textarea id="address" placeholder="गाँव, तहसील, जिला, राज्य" required></textarea>
      </div>

      <div class="form-group">
        <label>सामाजिक कार्य का क्षेत्र <span class="required-star">*</span></label>
        <select id="area" required>
          <option value="">कार्य चुनें</option>
          <option value="गौ सेवा">गौ सेवा</option>
          <option value="वृक्षारोपण">वृक्षारोपण</option>
          <option value="स्वच्छ भारत अभियान">स्वच्छ भारत अभियान</option>
          <option value="रक्तदान">रक्तदान</option>
          <option value="आपदा राहत">आपदा राहत</option>
          <option value="शिक्षा एवं साक्षरता">शिक्षा एवं साक्षरता</option>
          <option value="पर्यावरण संरक्षण">पर्यावरण संरक्षण</option>
          <option value="महिला सशक्तिकरण">महिला सशक्तिकरण</option>
        </select>
      </div>

      <div class="form-group">
        <label>इंटर्नशिप अवधि <span class="required-star">*</span></label>
        <select id="duration" required onchange="updateFee()">
          <option value="">अवधि चुनें</option>
          <option value="15 दिन" data-fee="300">15 दिन — ₹300</option>
          <option value="30 दिन" data-fee="500">30 दिन — ₹500</option>
          <option value="60 दिन" data-fee="600">60 दिन — ₹600</option>
          <option value="90 दिन" data-fee="700">90 दिन — ₹700</option>
        </select>
      </div>

      <!-- Fee Box -->
      <div id="feeBox" style="display:none;background:#fff3cd;border-radius:10px;padding:14px;margin:12px 0;border-left:4px solid var(--gold);">
        <div style="font-size:0.8rem;font-weight:600;color:#7a5500;margin-bottom:6px;">💰 प्रशासनिक शुल्क</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:0.75rem;color:#555;">✅ ID Card &nbsp;✅ Certificate &nbsp;✅ Digital Dashboard</div>
          <div style="font-size:1.3rem;font-weight:900;color:var(--maroon);" id="feeAmt">—</div>
        </div>
        <div style="font-size:0.68rem;color:#888;margin-top:4px;">Non-Refundable</div>
      </div>

      <div class="check-wrap">
        <input type="checkbox" id="agree" required>
        <label for="agree">मैं संस्था के नियमों, शर्तों एवं Refund Policy से सहमत हूँ।</label>
      </div>

      <div class="msg-box msg-error" id="errorMsg"></div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top:14px;">
        भुगतान के लिए आगे बढ़ें →
      </button>
    </form>
  </div>
</div>

<div class="back-link">
  <a href="https://unnatiselfhelpgroup-creator.github.io/">⬅ मुख्य पृष्ठ पर जाएँ</a>
</div>

<script>
const FORMSPREE = "https://formspree.io/f/xdkgnpqv";
const WHATSAPP  = "919410332400";

function updateFee() {
  const sel = document.getElementById('duration');
  const opt = sel.options[sel.selectedIndex];
  const fee = opt.dataset && opt.dataset.fee;
  if (fee) {
    document.getElementById('feeBox').style.display = 'block';
    document.getElementById('feeAmt').textContent = '₹' + fee;
  } else {
    document.getElementById('feeBox').style.display = 'none';
  }
}

document.getElementById('studentForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const name       = document.getElementById('name').value.trim();
  const fatherName = document.getElementById('fatherName').value.trim();
  const email      = document.getElementById('email').value.trim();
  const mobile     = document.getElementById('mobile').value.trim();
  const college    = document.getElementById('college').value.trim();
  const course     = document.getElementById('course').value.trim();
  const address    = document.getElementById('address').value.trim();
  const area       = document.getElementById('area').value;
  const duration   = document.getElementById('duration').value;
  const agree      = document.getElementById('agree').checked;

  const sel = document.getElementById('duration');
  const fee = sel.options[sel.selectedIndex].dataset && sel.options[sel.selectedIndex].dataset.fee || '';

  if (!name||!fatherName||!email||!mobile||!college||!course||!address||!area||!duration) {
    showError('❌ कृपया सभी आवश्यक फ़ील्ड भरें।'); return;
  }
  if (!/^[0-9]{10}$/.test(mobile)) {
    showError('❌ मोबाइल नंबर 10 अंकों का होना चाहिए।'); return;
  }
  if (!agree) { showError('❌ कृपया नियम एवं शर्तें स्वीकार करें।'); return; }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span> जमा हो रहा है...';
  btn.disabled = true;

  const data = {
    form_type: 'Student Internship Registration',
    नाम: name, 'पिता/पति': fatherName, ईमेल: email,
    मोबाइल: mobile, कॉलेज: college, कोर्स: course,
    पता: address, 'कार्य क्षेत्र': area, अवधि: duration,
    शुल्क: fee ? `₹${fee}` : 'N/A',
    समय: new Date().toLocaleString('hi-IN')
  };

  try {
    const res = await fetch(FORMSPREE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });
    // Redirect to payment regardless
  } catch(e) {}

  sessionStorage.setItem('student', JSON.stringify({ name, mobile, email, college, duration, fee }));
  btn.innerHTML = 'भुगतान के लिए आगे बढ़ें →';
  btn.disabled = false;

  window.location.href = `appointment-payment.html?name=${encodeURIComponent(name)}&fee=${encodeURIComponent(fee)}&cat=${encodeURIComponent('Internship '+duration)}`;
});

function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg; e.style.display = 'block';
  e.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
