<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>नियुक्ति भुगतान करें</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>(function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();</script>
    <style>
        body { font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; background: #f4f7fa; }
        .box { max-width: 420px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pay-link { background: #3395ff; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; display: block; margin: 20px 0; font-weight: bold; }
        input[type="file"] { margin: 10px 0; display: block; width: 100%; padding: 8px; border: 2px dashed #d4af37; border-radius: 8px; background: #fffde7; }
        #paidBtn { background: #00a651; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 20px; display: none; width: 100%; font-weight: bold; }
        #paidBtn:disabled { background: #aaa; cursor: not-allowed; }
        #feeLine { font-weight: bold; color: #1b2430; margin-top: 10px; }
        #uploadProgress { display: none; margin-top: 12px; }
        #progressBar { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        #progressFill { height: 100%; width: 0%; background: #00a651; transition: width 0.3s; border-radius: 10px; }
        #progressText { font-size: 13px; color: #555; margin-top: 5px; }
        #previewImg { display: none; max-width: 100%; max-height: 180px; border: 2px solid #d4af37; border-radius: 10px; margin-top: 10px; object-fit: contain; }
        .step { background: #f8f9fa; border-left: 4px solid #d4af37; padding: 8px 12px; margin: 8px 0; border-radius: 5px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
<div class="box">
    <h3>🧾 नियुक्ति हेतु भुगतान</h3>
    <p id="feeLine">लोड हो रहा है...</p>
    <img src="Qrcode.png" width="180" alt="QR Code" style="border-radius:10px;margin:10px 0;"><br>
    <div class="step">1️⃣ पहले नीचे दिए लिंक से भुगतान करें:</div>
    <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" target="_blank" class="pay-link"
       onclick="document.getElementById('paidBtn').style.display='block'">
       💳 Razorpay से भुगतान करें
    </a>
    <div class="step">2️⃣ भुगतान का स्क्रीनशॉट अपलोड करें (अनिवार्य):</div>
    <input type="file" id="paymentProof" accept="image/*">
    <img id="previewImg" alt="Preview">
    <div class="step">3️⃣ भुगतान पूर्ण होने के बाद यह बटन दबाएं:</div>
    <button id="paidBtn">✅ मैंने भुगतान कर दिया है</button>
    <div id="uploadProgress">
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="progressText">प्रक्रिया जारी है...</p>
    </div>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    // Data check
    const storedData = sessionStorage.getItem("pendingAppointmentData");
    if (!storedData) {
        alert("डेटा नहीं मिला। कृपया पहले आवेदन फॉर्म भरें।");
        window.location.href = "appointment-application.html";
    } else {
        try {
            const preview = JSON.parse(storedData);
            document.getElementById("feeLine").innerText =
                "पद: " + (preview.designation || "-") + " | सहयोग राशि: " + (preview.fee || "-");
        } catch(e) {
            alert("डेटा त्रुटि। कृपया फॉर्म फिर से भरें।");
            window.location.href = "appointment-application.html";
        }
    }

    function imageToBase64(file, maxWidth=800, quality=0.70) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                    let b64 = canvas.toDataURL("image/jpeg", quality);
                    if (b64.length * 0.75 > 900*1024) b64 = canvas.toDataURL("image/jpeg", 0.45);
                    if (b64.length * 0.75 > 900*1024) reject(new Error("Image बहुत बड़ी है।"));
                    else resolve(b64);
                };
                img.onerror = () => reject(new Error("Image load नहीं हुई।"));
            };
            reader.onerror = () => reject(new Error("File read त्रुटि।"));
        });
    }

    document.getElementById("paymentProof").addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById("previewImg");
                img.src = e.target.result;
                img.style.display = "block";
            };
            reader.readAsDataURL(file);
            document.getElementById("paidBtn").style.display = "block";
        }
    });

    document.getElementById("paidBtn").onclick = async () => {
        const fileInput = document.getElementById("paymentProof");
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("⚠️ कृपया भुगतान का स्क्रीनशॉट अपलोड करें!");
            return;
        }
        const btn = document.getElementById("paidBtn");
        btn.innerText = "प्रक्रिया जारी है...";
        btn.disabled = true;
        document.getElementById("uploadProgress").style.display = "block";
        document.getElementById("progressFill").style.width = "25%";
        document.getElementById("progressText").innerText = "Image compress हो रही है...";

        try {
            const stored = sessionStorage.getItem("pendingAppointmentData");
            if (!stored) throw new Error("आवेदन डेटा नहीं मिला। कृपया फॉर्म फिर से भरें।");
            const data = JSON.parse(stored);

            const base64Image = await imageToBase64(fileInput.files[0]);
            document.getElementById("progressFill").style.width = "55%";
            document.getElementById("progressText").innerText = "Firestore में save हो रहा है...";

            data.paymentStatus = "Paid (Screenshot Uploaded)";
            data.paymentScreenshotBase64 = base64Image;
            data.status = "Pending";
            data.createdAt = serverTimestamp();
            data.submittedAt = new Date().toISOString();

            const docRef = await addDoc(collection(db, "Appointments"), data);
            document.getElementById("progressFill").style.width = "80%";
            document.getElementById("progressText").innerText = "Email भेजी जा रही है...";

            try {
                await emailjs.send("service_63pefgf", "template_wvzbj7p", {
                    user_name: data.name||"", user_email: data.email||"",
                    name: data.name||"", mobile: data.mobile||"", email: data.email||"",
                    designation: (data.designation||"") + " (राशि: " + (data.fee||"") + ")",
                    doc_id: docRef.id, type: "Appointments"
                });
            } catch(emailErr) {
                console.warn("Email त्रुटि:", emailErr);
            }

            document.getElementById("progressFill").style.width = "100%";
            sessionStorage.removeItem("pendingAppointmentData");

            document.body.innerHTML = `<div style="max-width:420px;margin:50px auto;padding:40px;text-align:center;border:2px solid #00a651;border-radius:20px;background:white;">
                <div style="font-size:60px;">✅</div>
                <h3 style="color:#00a651;">आवेदन सफलतापूर्वक जमा हो गया!</h3>
                <p style="color:#555;margin-top:10px;">एडमिन द्वारा जांच के बाद ईमेल पर सूचित किया जाएगा।</p>
                <p style="color:#888;font-size:13px;margin-top:10px;">Application ID: ${docRef.id}</p>
                <a href="index.html" style="display:inline-block;margin-top:20px;background:#d4af37;color:#1b2430;padding:12px 25px;border-radius:10px;text-decoration:none;font-weight:bold;">🏠 होम पेज</a>
            </div>`;

        } catch(err) {
            const msg = (err && err.message) ? err.message : "अज्ञात त्रुटि। कृपया पुनः प्रयास करें।";
            alert("❌ त्रुटि: " + msg);
            btn.disabled = false;
            btn.innerText = "✅ मैंने भुगतान कर दिया है";
            document.getElementById("uploadProgress").style.display = "none";
            document.getElementById("progressFill").style.width = "0%";
        }
    };
</script>
</body>
</html>
