<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>भुगतान | उन्नति स्वयं सहायता समिति</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">(function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();</script>
<style>
  :root{ --saffron:#FF6B00; --gold:#C8960C; --green:#138808; --maroon:#4a0404; --maroon2:#8B0000; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#FFF3E0 0%,#F1F8E9 100%); min-height:100vh; color:#222; }
  .tricolor-top{height:5px;background:linear-gradient(90deg,var(--saffron) 33.3%,#fff 33.3%,#fff 66.6%,var(--green) 66.6%);}
  header { background: linear-gradient(135deg,var(--maroon) 0%,var(--maroon2) 50%,var(--maroon) 100%); color:#fff;
    text-align:center; padding:16px 12px 14px; position:relative; box-shadow:0 3px 12px rgba(0,0,0,0.3); }
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--saffron),var(--gold),var(--green));}
  header img{height:52px;border-radius:50%;border:2px solid var(--gold);margin-bottom:6px;}
  header h1{font-family:'Tiro Devanagari Hindi',serif;font-size:1.1rem;}
  main{max-width:460px;margin:0 auto;padding:28px 16px 48px;}
  .pay-card { background: #fff; padding: 26px 22px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.10); position:relative; overflow:hidden; }
  .pay-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--saffron),var(--gold),var(--green));}
  .pay-card h3 { font-family:'Tiro Devanagari Hindi',serif; color:var(--maroon); font-size:1.1rem; text-align:center; margin-bottom:16px; }
  .info-box { background:#fff8e7; border:1.5px solid var(--gold); border-radius:10px; padding:14px 16px; margin-top:6px; }
  .info-row { display:flex; justify-content:space-between; gap:10px; font-size:0.85rem; padding:5px 0; border-bottom:1px dashed #e8d8ad; }
  .info-row:last-child { border-bottom:none; }
  .info-row .lbl { color:#888; }
  .info-row .val { color:var(--maroon); font-weight:600; text-align:right; }
  .pay-amount-wrap { text-align:center; margin:20px 0 6px; }
  .pay-amount-wrap .lbl { font-size:0.78rem; color:#888; text-transform:uppercase; letter-spacing:0.5px; }
  .pay-amount { font-size: 2.1rem; font-weight: 900; color: var(--maroon); margin-top:4px; }
  .btn { display:block; width:100%; padding:15px; background:linear-gradient(135deg,var(--green),#1a9e0a); color:#fff;
    text-decoration:none; text-align:center; border-radius:10px; font-weight:700; margin-top:14px; box-shadow:0 4px 14px rgba(19,136,8,0.35); border:none; cursor:pointer; font-size:1rem; }
  .btn:disabled{ background:#aaa; box-shadow:none; cursor:not-allowed; }
  .step { background: #f8f9fa; border-left: 4px solid var(--saffron); padding: 9px 12px; margin: 14px 0 6px; border-radius: 6px; text-align: left; font-size: 0.85rem; color:#555; }
  input[type="file"] { margin: 8px 0 0; display: block; width: 100%; padding: 10px; border: 2px dashed var(--gold); border-radius: 8px; background: #fffde7; font-size:0.85rem; }
  #previewImg { display:none; max-width:100%; max-height:160px; border:2px solid var(--gold); border-radius:10px; margin-top:10px; object-fit:contain; }
  #progressWrap { display:none; margin-top:14px; }
  #progressBar { width:100%; height:10px; background:#eee; border-radius:10px; overflow:hidden; }
  #progressFill { height:100%; width:0%; background:var(--green); transition:width 0.3s; border-radius:10px; }
  #progressText { font-size:0.78rem; color:#666; margin-top:5px; text-align:center; }
  .note { font-size:0.75rem; color:#999; text-align:center; margin-top:14px; line-height:1.6; }
  .empty-msg { text-align:center; color:#c0392b; font-size:0.9rem; padding:20px 0; }
  .back-link { display:block; text-align:center; margin-top:20px; color:var(--maroon); text-decoration:none; font-size:0.85rem; font-weight:600; }
  footer{background:var(--maroon);color:rgba(255,255,255,0.75);text-align:center;padding:16px;font-size:0.72rem;line-height:1.8;}
  footer strong{color:#FFD700;}
</style>
</head>
<body>
<div class="tricolor-top"></div>
<header>
  <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="NGO Logo">
  <h1>उन्नति स्वयं सहायता समिति</h1>
</header>

<main>
  <div class="pay-card">
    <h3>💳 सदस्यता शुल्क भुगतान</h3>
    <div id="applicantInfo"></div>
  </div>
  <a href="https://unnatiselfhelpgroup-creator.github.io/appointment-application.html" class="back-link">⬅ फॉर्म पर वापस जाएँ</a>
</main>

<footer>
  <strong>उन्नति स्वयं सहायता समिति</strong><br>
  Lalkuan, Nainital, Uttarakhand — 263139<br>
  NGO Darpan: UA/2016/0108273 | PAN: AAATU7133Q
</footer>

<script>
  function escapeHtml(str){
    if(str===null||str===undefined)return "";
    return String(str).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function imageToBase64(file, maxWidth = 800, quality = 0.70) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement("canvas");
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          let b64 = canvas.toDataURL("image/jpeg", quality);
          if (b64.length * 0.75 > 900 * 1024) b64 = canvas.toDataURL("image/jpeg", 0.45);
          if (b64.length * 0.75 > 900 * 1024) reject(new Error("Image बहुत बड़ी है।"));
          else resolve(b64);
        };
        img.onerror = reject;
      };
      reader.onerror = reject;
    });
  }

  const stored = JSON.parse(sessionStorage.getItem('applicant') || '{}');
  const infoDiv = document.getElementById('applicantInfo');

  if (stored.name) {
    infoDiv.innerHTML = `
      <div class="info-box">
        <div class="info-row"><span class="lbl">आवेदक</span><span class="val">${escapeHtml(stored.name)}</span></div>
        ${stored.father_name ? `<div class="info-row"><span class="lbl">पिता/पति</span><span class="val">${escapeHtml(stored.father_name)}</span></div>` : ''}
        ${stored.mobile ? `<div class="info-row"><span class="lbl">मोबाइल</span><span class="val">${escapeHtml(stored.mobile)}</span></div>` : ''}
        ${(stored.village || stored.district) ? `<div class="info-row"><span class="lbl">पता</span><span class="val">${escapeHtml([stored.village, stored.district, stored.state].filter(Boolean).join(', '))}</span></div>` : ''}
        <div class="info-row"><span class="lbl">पद</span><span class="val">${escapeHtml(stored.designation || stored.cat || '-')}</span></div>
      </div>
      <div class="pay-amount-wrap">
        <div class="lbl">कुल देय राशि</div>
        <div class="pay-amount">₹${escapeHtml(stored.fee || '—')}</div>
      </div>
      <div class="step">1️⃣ पहले भुगतान करें:</div>
      <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" target="_blank" class="btn" id="payLink">💳 Razorpay से भुगतान करें</a>
      <div class="step">2️⃣ भुगतान का स्क्रीनशॉट अपलोड करें (अनिवार्य):</div>
      <input type="file" id="paymentProof" accept="image/*" required>
      <img id="previewImg" alt="Screenshot Preview">
      <div class="step">3️⃣ भुगतान पूर्ण होने के बाद यह बटन दबाएं:</div>
      <button class="btn" id="paidBtn" style="display:none;">✅ मैंने भुगतान कर दिया है</button>
      <div id="progressWrap">
        <div id="progressBar"><div id="progressFill"></div></div>
        <p id="progressText">प्रक्रिया जारी है...</p>
      </div>
      <p class="note">भुगतान के बाद आपका नियुक्ति पत्र एवं ID Card संस्था द्वारा सत्यापन के पश्चात जारी किया जाएगा।</p>
    `;

    document.getElementById('payLink').addEventListener('click', () => {
      const btn = document.getElementById('paidBtn');
      if (document.getElementById('paymentProof').files.length > 0) btn.style.display = 'block';
    });

    document.getElementById('paymentProof').addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.getElementById('previewImg');
          img.src = e.target.result; img.style.display = 'block';
        };
        reader.readAsDataURL(file);
        document.getElementById('paidBtn').style.display = 'block';
      }
    });

    document.getElementById('paidBtn').onclick = async () => {
      const fileInput = document.getElementById('paymentProof');
      if (fileInput.files.length === 0) { alert('⚠️ कृपया स्क्रीनशॉट अपलोड करें!'); return; }

      const btn = document.getElementById('paidBtn');
      btn.disabled = true; btn.innerText = 'प्रक्रिया जारी है...';
      document.getElementById('progressWrap').style.display = 'block';
      document.getElementById('progressText').innerText = 'Image compress हो रही है...';
      document.getElementById('progressFill').style.width = '25%';

      try {
        const [{ db }, { collection, addDoc, serverTimestamp }] = await Promise.all([
          import('./firebase-config.js'),
          import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js')
        ]);

        const base64Image = await imageToBase64(fileInput.files[0]);
        document.getElementById('progressFill').style.width = '55%';
        document.getElementById('progressText').innerText = 'Firestore में save हो रहा है...';

        const data = { ...stored };
        data.paymentStatus = 'Paid (Screenshot Uploaded)';
        data.paymentScreenshotBase64 = base64Image;
        data.status = 'Pending';
        data.createdAt = serverTimestamp();
        data.submittedAt = new Date().toISOString();

        const docRef = await addDoc(collection(db, 'AppointmentApplications'), data);
        document.getElementById('progressFill').style.width = '80%';
        document.getElementById('progressText').innerText = 'Email भेजी जा रही है...';

        if (stored.email) {
          await emailjs.send('service_63pefgf', 'template_xq7uilj', {
            to_name: stored.name,
            to_email: stored.email,
            name: stored.name,
            email: stored.email,
            doc_type: 'नियुक्ति आवेदन',
            status: 'सबमिट हो गया, सत्यापन हेतु लंबित',
            post: stored.designation || stored.cat || '-',
            district: stored.district || '-',
            message: 'भुगतान प्राप्त हो गया है। संस्था द्वारा सत्यापन के पश्चात नियुक्ति पत्र एवं ID Card जारी किया जाएगा।'
          });
        }

        document.getElementById('progressFill').style.width = '100%';
        sessionStorage.removeItem('applicant');

        document.body.innerHTML = `
          <div class="tricolor-top"></div>
          <main style="padding-top:60px;">
            <div class="pay-card" style="text-align:center;">
              <div style="font-size:60px;">✅</div>
              <h3 style="color:var(--green);font-family:'Tiro Devanagari Hindi',serif;">आवेदन सफलतापूर्वक जमा हो गया!</h3>
              <p style="color:#555;margin-top:10px;font-size:0.9rem;">भुगतान स्क्रीनशॉट सुरक्षित रूप से सेव हुआ।<br>एडमिन जांच के बाद ईमेल पर सूचित किया जाएगा।</p>
              <p style="color:#888;font-size:0.75rem;margin-top:10px;">ID: ${docRef.id}</p>
              <a href="index.html" class="btn" style="margin-top:20px;">🏠 होम पेज</a>
            </div>
          </main>`;
      } catch (err) {
        console.error(err);
        alert('❌ त्रुटि: ' + err.message);
        btn.disabled = false; btn.innerText = '✅ मैंने भुगतान कर दिया है';
        document.getElementById('progressWrap').style.display = 'none';
      }
    };
  } else {
    infoDiv.innerHTML = '<p class="empty-msg">⚠️ जानकारी नहीं मिल रही है। कृपया पहले आवेदन फॉर्म भरें।</p>';
  }
</script>
</body>
</html>
