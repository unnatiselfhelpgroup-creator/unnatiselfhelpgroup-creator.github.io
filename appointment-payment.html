<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नियुक्ति भुगतान | उन्नति स्वयं सहायता समिति</title>
    <meta name="robots" content="noindex, nofollow">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>(function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();</script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', Arial, sans-serif; text-align: center; padding: 30px 20px; background: #f4f7fa; }
        .box { max-width: 420px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 12px; font-size: 1.3rem; color: #1b2430; }
        #feeLine { font-weight: bold; color: #1b2430; margin: 10px 0 18px; font-size: 1rem; }
        .qr-img { border-radius: 10px; border: 2px solid #d4af37; }
        .pay-link {
            background: #3395ff; color: white; padding: 14px 20px;
            border-radius: 10px; text-decoration: none; display: block;
            margin: 16px 0; font-weight: bold; font-size: 1rem;
            transition: background 0.3s;
        }
        .pay-link:hover { background: #1a7ae0; }
        label { font-weight: 600; display: block; text-align: left; margin: 12px 0 6px; font-size: 0.9rem; }
        input[type="file"] { display: block; width: 100%; margin-bottom: 8px; }
        #paidBtn {
            background: #00a651; color: white; padding: 15px;
            border: none; border-radius: 10px; cursor: pointer;
            font-size: 1rem; font-weight: bold; width: 100%; margin-top: 16px;
            display: none; transition: background 0.3s;
        }
        #paidBtn:hover { background: #008a43; }
        #paidBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .step { color: #555; font-size: 0.9rem; margin: 10px 0 4px; text-align: left; }
    </style>
</head>
<body>
<div class="box" role="main">
    <h2>💳 नियुक्ति हेतु भुगतान</h2>
    <p id="feeLine"></p>
    <img src="Qrcode.png" width="180" class="qr-img" alt="Payment QR Code"><br>

    <p class="step"><b>चरण 1:</b> नीचे दिए लिंक से भुगतान करें:</p>
    <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" target="_blank" rel="noopener noreferrer"
       class="pay-link" id="razorpayLink">💳 Razorpay से भुगतान करें</a>

    <p class="step"><b>चरण 2:</b> भुगतान का स्क्रीनशॉट अपलोड करें:</p>
    <label for="paymentProof">स्क्रीनशॉट चुनें (JPG/PNG):</label>
    <input type="file" id="paymentProof" accept="image/*" required>

    <p class="step"><b>चरण 3:</b> भुगतान के बाद यह बटन दबाएं:</p>
    <button id="paidBtn" type="button">✅ मैंने भुगतान कर दिया है</button>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const storedData = sessionStorage.getItem("pendingAppointmentData");
    if (!storedData) {
        alert("डेटा नहीं मिला, कृपया फिर से आवेदन भरें।");
        window.location.href = "appointment-application.html";
    } else {
        const preview = JSON.parse(storedData);
        document.getElementById("feeLine").innerText =
            "पद: " + (preview.designation || "—") + " | सहयोग राशि: " + (preview.fee || "—");
    }

    document.getElementById("razorpayLink").addEventListener("click", () => {
        document.getElementById("paidBtn").style.display = "block";
    });

    document.getElementById("paidBtn").addEventListener("click", async () => {
        const fileInput = document.getElementById("paymentProof");
        if (!fileInput.files.length) { alert("कृपया भुगतान का स्क्रीनशॉट अपलोड करें!"); return; }

        const btn = document.getElementById("paidBtn");
        btn.innerText = "प्रोसेसिंग...";
        btn.disabled = true;

        try {
            const data = JSON.parse(sessionStorage.getItem("pendingAppointmentData"));
            data.paymentStatus = "Paid (Proof Uploaded)";
            data.status = "Pending";
            data.createdAt = serverTimestamp();

            const docRef = await addDoc(collection(db, "Appointments"), data);

            await emailjs.send("service_63pefgf", "template_wvzbj7p", {
                user_name: data.name, user_email: data.email,
                name: data.name, mobile: data.mobile, email: data.email,
                designation: data.designation + " (सहयोग राशि: " + data.fee + ")",
                doc_id: docRef.id, type: "Appointments"
            });

            sessionStorage.removeItem("pendingAppointmentData");
            document.body.innerHTML = `
                <div style="max-width:420px;margin:60px auto;padding:40px;text-align:center;border:2px solid #00a651;border-radius:20px;background:white;font-family:Arial,sans-serif;">
                    <h2 style="color:#00a651;">✅ आवेदन सफलतापूर्वक जमा हो गया!</h2>
                    <p style="margin-top:12px;color:#333;">एडमिन द्वारा भुगतान की जांच होने के बाद आपको ईमेल पर सूचित किया जाएगा।</p>
                </div>`;
        } catch(err) {
            console.error(err);
            alert("सबमिशन विफल: " + err.message);
            btn.disabled = false;
            btn.innerText = "✅ मैंने भुगतान कर दिया है";
        }
    });
</script>
</body>
</html>
