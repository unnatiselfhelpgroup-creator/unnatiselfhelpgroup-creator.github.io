<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | उन्नति स्वयं सहायता समिति</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#071b34,#1a3a6b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(0,0,0,0.3);text-align:center}
        .card img{width:70px;height:70px;border-radius:50%;border:3px solid #d4af37;margin-bottom:14px}
        .card h1{font-size:1.15rem;color:#4a0404;margin-bottom:4px}
        .card p{font-size:0.8rem;color:#777;margin-bottom:24px}
        .form-group{margin-bottom:16px;text-align:left}
        .form-group label{display:block;font-size:0.83rem;font-weight:600;color:#4a0404;margin-bottom:6px}
        .form-group input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;background:#fafafa;color:#333;transition:border-color 0.2s}
        .form-group input:focus{outline:none;border-color:#4a0404;box-shadow:0 0 0 3px rgba(74,4,4,0.08);background:#fff}
        .btn{width:100%;background:linear-gradient(135deg,#4a0404,#8b1a1a);color:#fff;border:none;padding:13px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(74,4,4,0.35)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .error{background:#fdecea;border:1px solid #c0392b;border-radius:8px;padding:10px 12px;font-size:0.83rem;color:#c0392b;margin-bottom:12px;display:none}
        .loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="Logo">
    <h1>Admin Login</h1>
    <p>उन्नति स्वयं सहायता समिति — Admin Panel</p>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="admin@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="loginBtn">🔐 Login करें</button>
    </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCNEZ03VUTOD-eJjPsMP4b0Ykh4eiigqPQ",
    authDomain: "ngo-certificate-system.firebaseapp.com",
    projectId: "ngo-certificate-system",
    storageBucket: "ngo-certificate-system.firebasestorage.app",
    messagingSenderId: "664351169113",
    appId: "1:664351169113:web:3c476e199d369615c6ef48"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
    if (user) window.location.href = "admin-dashboard.html";
});

document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const errorMsg = document.getElementById("errorMsg");
    const btn      = document.getElementById("loginBtn");
    errorMsg.style.display = "none";
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>लॉगिन हो रहा है...';

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "admin-dashboard.html";
    } catch(err) {
        const msgs = {
            "auth/invalid-credential":    "❌ गलत Email या Password।",
            "auth/user-not-found":        "❌ यह Email पंजीकृत नहीं है।",
            "auth/wrong-password":        "❌ गलत Password।",
            "auth/too-many-requests":     "❌ बहुत अधिक प्रयास। कुछ देर बाद कोशिश करें।",
            "auth/network-request-failed":"❌ Internet connection जांचें।"
        };
        errorMsg.textContent = msgs[err.code] || "❌ Login विफल: " + err.message;
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "🔐 Login करें";
    }
});
</script>
</body>
</html>
