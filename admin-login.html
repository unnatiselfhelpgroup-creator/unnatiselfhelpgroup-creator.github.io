<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | उन्नति स्वयं सहायता समिति</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#071b34,#1a3a6b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(0,0,0,0.3);text-align:center}
        .card img{width:70px;height:70px;border-radius:50%;border:3px solid #d4af37;margin-bottom:14px}
        .card h1{font-size:1.15rem;color:#4a0404;margin-bottom:4px}
        .card p{font-size:0.8rem;color:#777;margin-bottom:24px}
        .form-group{margin-bottom:16px;text-align:left}
        .form-group label{display:block;font-size:0.83rem;font-weight:600;color:#4a0404;margin-bottom:6px}
        .form-group input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;background:#fafafa;color:#333;transition:border-color 0.2s}
        .form-group input:focus{outline:none;border-color:#4a0404;box-shadow:0 0 0 3px rgba(74,4,4,0.08);background:#fff}
        .btn{width:100%;background:linear-gradient(135deg,#4a0404,#8b1a1a);color:#fff;border:none;padding:13px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(74,4,4,0.35)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .error{background:#fdecea;border:1px solid #c0392b;border-radius:8px;padding:10px 12px;font-size:0.83rem;color:#c0392b;margin-bottom:12px;display:none}
        .loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Checking-existing-session overlay (avoids flashing the form if already logged in) */
        #checkingOverlay{position:fixed;inset:0;background:#071b34;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
        #checkingOverlay .spin2{width:34px;height:34px;border:4px solid rgba(212,175,55,0.25);border-top-color:#d4af37;border-radius:50%;animation:spin 0.8s linear infinite}
        #checkingOverlay p{color:#d4af37;font-size:0.85rem}

    /* ══ 3D BUTTONS ══ */
    .btn,button[type="submit"],.btn-submit,.pay-link,.tab,.logout-btn,.modal-close{
        position:relative;cursor:pointer;border:none;font-weight:700;letter-spacing:0.3px;
        transition:all 0.08s ease!important;user-select:none;-webkit-user-select:none;
        transform:translateY(-3px);
        box-shadow:0 6px 0 rgba(0,0,0,0.35),0 8px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.25)!important;
    }
    .btn:active,button[type="submit"]:active,.btn-submit:active,.pay-link:active{
        box-shadow:0 1px 0 rgba(0,0,0,0.35),inset 0 2px 4px rgba(0,0,0,0.2)!important;
        transform:translateY(4px)!important;
    }
    .btn:hover,button[type="submit"]:hover,.btn-submit:hover,.pay-link:hover{
        transform:translateY(-5px)!important;filter:brightness(1.08);
        box-shadow:0 9px 0 rgba(0,0,0,0.35),0 14px 22px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.3)!important;
    }
    .btn:disabled,button:disabled{transform:translateY(0)!important;box-shadow:0 2px 0 rgba(0,0,0,0.2)!important;filter:grayscale(0.5);cursor:not-allowed!important}
    .btn-submit,button[type="submit"]{
        background:linear-gradient(145deg,#8b1a1a,#4a0404)!important;color:#fff!important;
        box-shadow:0 7px 0 #2a0000,0 10px 16px rgba(74,4,4,0.45),inset 0 1px 0 rgba(255,255,255,0.15)!important;
    }
    .btn-submit:active,button[type="submit"]:active{box-shadow:0 2px 0 #2a0000,inset 0 3px 6px rgba(0,0,0,0.3)!important;transform:translateY(5px)!important}
    /* ══ END 3D BUTTONS ══ */

</style>
</head>
<body>

<div id="checkingOverlay">
  <div class="spin2"></div>
  <p>🔒 जाँच की जा रही है...</p>
</div>

<div class="card" id="loginCard" style="display:none">
    <img src="https://unnatiselfhelpgroup-creator.github.io/ngologo.png" alt="Logo">
    <h1>Admin Login</h1>
    <p>उन्नति स्वयं सहायता समिति — Admin Panel</p>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="admin@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="loginBtn">🔐 Login करें</button>
    </form>
</div>

<script type="module">
import { auth } from "./firebase-config.js";
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Safety net: if Firebase check hangs (network issue), still show the form
// after 5s instead of leaving the user stuck on a blank "checking" screen.
const safetyTimer = setTimeout(() => {
    document.getElementById("checkingOverlay").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
}, 5000);

onAuthStateChanged(auth, user => {
    clearTimeout(safetyTimer);
    if (user) {
        // Already logged in — go straight to dashboard, no flash of login form
        window.location.replace("admin-dashboard.html");
    } else {
        // Not logged in — reveal the login form
        document.getElementById("checkingOverlay").style.display = "none";
        document.getElementById("loginCard").style.display = "block";
    }
});

document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const errorMsg = document.getElementById("errorMsg");
    const btn      = document.getElementById("loginBtn");
    errorMsg.style.display = "none";
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>लॉगिन हो रहा है...';

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        // replace() instead of href — prevents the back button from
        // returning to the login form after a successful login
        window.location.replace("admin-dashboard.html");
    } catch(err) {
        const msgs = {
            "auth/invalid-credential":    "❌ गलत Email या Password।",
            "auth/user-not-found":        "❌ यह Email पंजीकृत नहीं है।",
            "auth/wrong-password":        "❌ गलत Password।",
            "auth/too-many-requests":     "❌ बहुत अधिक प्रयास। कुछ देर बाद कोशिश करें।",
            "auth/network-request-failed":"❌ Internet connection जांचें।"
        };
        errorMsg.textContent = msgs[err.code] || "❌ Login विफल: " + err.message;
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "🔐 Login करें";
    }
});
</script>
</body>
</html>
