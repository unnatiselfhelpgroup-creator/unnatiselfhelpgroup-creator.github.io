<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | उन्नति स्वयं सहायता समिति</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #4a0404;
            font-family: 'Poppins', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 35px 30px;
            border-radius: 20px;
            width: 90%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
        }
        h1 { color: gold; margin-bottom: 24px; font-size: 1.4rem; }
        label { display: block; text-align: left; color: #f0c040; font-size: 0.85rem; margin-bottom: 4px; }
        input {
            width: 100%; padding: 14px 15px; margin-bottom: 16px;
            border: none; border-radius: 10px;
            font-size: 1rem; background: rgba(255,255,255,0.95);
        }
        input:focus { outline: 2px solid gold; }
        button {
            background: gold; padding: 15px; width: 100%;
            border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background: #ffd700; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        #errMsg { color: #ffaaaa; margin-top: 12px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>
<div class="box" role="main">
    <h1>🔐 Admin Login</h1>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="admin@email.com" autocomplete="email" required>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    <button id="loginBtn" onclick="login()">Login</button>
    <p id="errMsg" role="alert" aria-live="polite"></p>
</div>

<script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "admin-dashboard.html";
    });
</script>
<script type="module" src="auth.js"></script>
</body>
</html>
