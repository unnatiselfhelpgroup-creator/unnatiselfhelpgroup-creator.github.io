<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Button Demo | उन्नति स्वयं सहायता समिति</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#071b34,#0f2d54);min-height:100vh;padding:30px 20px;color:#fff}
h1{text-align:center;color:#d4af37;margin-bottom:8px;font-size:1.4rem}
p{text-align:center;color:#aaa;font-size:0.85rem;margin-bottom:30px}
.section{background:rgba(255,255,255,0.06);border:1px solid rgba(212,175,55,0.3);border-radius:16px;padding:24px;margin-bottom:24px;max-width:500px;margin-left:auto;margin-right:auto}
.section h2{color:#d4af37;font-size:1rem;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid rgba(212,175,55,0.3)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:14px}

/* ════════════ 3D BUTTON STYLES ════════════ */
.btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    font-weight:700;
    font-size:0.88rem;
    padding:10px 18px;
    letter-spacing:0.3px;
    transition:all 0.08s ease;
    user-select:none;
    transform:translateY(-3px);
    box-shadow:0 6px 0 rgba(0,0,0,0.35),0 8px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn:hover{transform:translateY(-5px);filter:brightness(1.08)}
.btn:active{transform:translateY(3px)!important;box-shadow:0 1px 0 rgba(0,0,0,0.35),inset 0 2px 4px rgba(0,0,0,0.2)!important}
.btn:disabled{transform:translateY(0);box-shadow:0 2px 0 rgba(0,0,0,0.2);filter:grayscale(0.5)opacity(0.6);cursor:not-allowed}

/* Colors */
.btn-approve{
    background:linear-gradient(145deg,#2ecc71,#27ae60);color:#fff;
    box-shadow:0 6px 0 #1a7a43,0 8px 12px rgba(39,174,96,0.4),inset 0 1px 0 rgba(255,255,255,0.3);
}
.btn-approve:hover{box-shadow:0 8px 0 #1a7a43,0 12px 20px rgba(39,174,96,0.5),inset 0 1px 0 rgba(255,255,255,0.35)}
.btn-approve:active{box-shadow:0 1px 0 #1a7a43,inset 0 2px 4px rgba(0,0,0,0.2)!important}

.btn-reject{
    background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;
    box-shadow:0 6px 0 #8c1a12,0 8px 12px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-reject:hover{box-shadow:0 8px 0 #8c1a12,0 12px 20px rgba(192,57,43,0.5),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn-reject:active{box-shadow:0 1px 0 #8c1a12,inset 0 2px 4px rgba(0,0,0,0.2)!important}

.btn-gold{
    background:linear-gradient(145deg,#f4d03f,#d4af37);color:#071b34;
    box-shadow:0 6px 0 #9a7d1a,0 8px 12px rgba(212,175,55,0.4),inset 0 1px 0 rgba(255,255,255,0.4);
}
.btn-gold:hover{box-shadow:0 8px 0 #9a7d1a,0 12px 20px rgba(212,175,55,0.5),inset 0 1px 0 rgba(255,255,255,0.45)}
.btn-gold:active{box-shadow:0 1px 0 #9a7d1a,inset 0 2px 4px rgba(0,0,0,0.15)!important}

.btn-blue{
    background:linear-gradient(145deg,#2980b9,#1565c0);color:#fff;
    box-shadow:0 6px 0 #0a3d6b,0 8px 12px rgba(21,101,192,0.4),inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-blue:hover{box-shadow:0 8px 0 #0a3d6b,0 12px 20px rgba(21,101,192,0.5)}
.btn-blue:active{box-shadow:0 1px 0 #0a3d6b,inset 0 2px 4px rgba(0,0,0,0.2)!important}

.btn-red-big{
    background:linear-gradient(145deg,#8b1a1a,#4a0404);color:#fff;
    width:100%;padding:14px 20px;font-size:1rem;border-radius:12px;
    box-shadow:0 7px 0 #2a0000,0 10px 16px rgba(74,4,4,0.45),inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-red-big:hover{box-shadow:0 10px 0 #2a0000,0 14px 24px rgba(74,4,4,0.55),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-red-big:active{box-shadow:0 2px 0 #2a0000,inset 0 3px 6px rgba(0,0,0,0.3)!important;transform:translateY(5px)!important}

.btn-logout{
    background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;
    box-shadow:0 5px 0 #7a0000,0 8px 14px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-logout:active{box-shadow:0 1px 0 #7a0000!important}

.tab-btn{
    padding:9px 18px;border:1.5px solid #d4af37;border-radius:20px;cursor:pointer;
    font-size:0.85rem;font-weight:700;background:rgba(255,255,255,0.1);color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,0.3),0 6px 10px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.15);
    transform:translateY(-2px);transition:all 0.08s ease;
}
.tab-btn:active{box-shadow:0 1px 0 rgba(0,0,0,0.3)!important;transform:translateY(3px)!important}
.tab-btn.active{background:#d4af37;color:#071b34;box-shadow:0 5px 0 #9a7d1a,0 8px 14px rgba(212,175,55,0.4)}

.note{font-size:0.78rem;color:#aaa;text-align:center;margin-top:8px;font-style:italic}
.divider{border:none;border-top:1px solid rgba(212,175,55,0.2);margin:14px 0}
</style>
</head>
<body>
<h1>🎨 3D Button Preview</h1>
<p>उन्नति स्वयं सहायता समिति — Button Style Demo<br>बटन पर क्लिक करके देखें — नीचे दबेगा!</p>

<!-- Admin Action Buttons -->
<div class="section">
  <h2>📋 Admin Action Buttons</h2>
  <div class="btn-row">
    <button class="btn btn-approve">✅ Approve करें</button>
    <button class="btn btn-reject">❌ Reject करें</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-gold">👁️ देखें / View</button>
    <button class="btn btn-blue">🪪 ID Card PDF</button>
    <button class="btn btn-gold">📄 नियुक्ति पत्र</button>
  </div>
  <p class="note">👆 बटन पर क्लिक करें — दबाने का effect देखें</p>
</div>

<!-- Tab Buttons -->
<div class="section">
  <h2>📑 Tab Buttons</h2>
  <div class="btn-row">
    <button class="tab-btn active">📋 Appointments</button>
    <button class="tab-btn">🪪 ID Cards</button>
    <button class="tab-btn">🎓 Students</button>
  </div>
</div>

<!-- Form Submit Button -->
<div class="section">
  <h2>📤 Form Submit Button</h2>
  <button class="btn btn-red-big">📤 आवेदन जमा करें एवं भुगतान हेतु आगे बढ़ें</button>
  <hr class="divider">
  <button class="btn btn-red-big" style="background:linear-gradient(145deg,#1976d2,#0d47a1);box-shadow:0 7px 0 #062d6e,0 10px 16px rgba(13,71,161,0.45),inset 0 1px 0 rgba(255,255,255,0.2)">💳 Razorpay से भुगतान करें</button>
</div>

<!-- Logout -->
<div class="section">
  <h2>🚪 Logout Button</h2>
  <div class="btn-row">
    <button class="btn btn-logout">🚪 Logout</button>
    <button class="btn btn-gold">⬅ वापस जाएं</button>
  </div>
</div>

<!-- Disabled State -->
<div class="section">
  <h2>⏳ Loading / Disabled State</h2>
  <div class="btn-row">
    <button class="btn btn-red-big" disabled style="width:auto;padding:10px 20px">⏳ जमा हो रहा है...</button>
    <button class="btn btn-approve" disabled>✅ Processing...</button>
  </div>
</div>

<script>
// Tab button demo
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click",function(){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
  });
});
</script>
</body>
</html>
