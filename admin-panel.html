<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#071b34;--navy2:#0d2545;--navy3:#122e55;
  --gold:#d4af37;--gold2:#f2ce63;--gold3:#9a7d1a;
  --green:#27ae60;--red:#c0392b;--blue:#1565c0;
  --text:#e8e0cc;--text2:#b8a87a;--white:#fff;
  --card:#0d2545;--border:rgba(212,175,55,0.2);
  --radius:14px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);color:var(--text);min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--navy2);border-bottom:2px solid var(--gold3);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar .logo{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.topbar .logo span{display:block;font-size:0.75rem;color:var(--text2);font-weight:400}
.logout-btn{background:linear-gradient(145deg,#c0392b,#8b1a1a);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 0 #7a0000,0 8px 14px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.2);transform:translateY(-2px);transition:all 0.08s}
.logout-btn:active{box-shadow:0 1px 0 #7a0000!important;transform:translateY(3px)!important}

/* ── TABS ── */
.tabs{display:flex;gap:8px;padding:20px 24px 0;flex-wrap:wrap;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;border:none;border-radius:10px 10px 0 0;font-size:0.9rem;font-weight:700;cursor:pointer;color:var(--text2);background:var(--navy3);transition:all 0.08s;
  box-shadow:0 5px 0 rgba(0,0,0,0.3),0 6px 10px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.1);transform:translateY(-2px)}
.tab:active{box-shadow:0 1px 0 rgba(0,0,0,0.3)!important;transform:translateY(3px)!important}
.tab.active{color:var(--navy);background:linear-gradient(145deg,var(--gold2),var(--gold));
  box-shadow:0 5px 0 var(--gold3),0 8px 14px rgba(212,175,55,0.35),inset 0 1px 0 rgba(255,255,255,0.4)}
.tab-badge{display:inline-block;background:#e74c3c;color:#fff;border-radius:20px;font-size:0.7rem;padding:1px 7px;margin-left:6px;font-weight:700}

/* ── CONTENT ── */
.content{padding:24px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── STATS ROW ── */
.stats{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;min-width:120px;text-align:center}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--gold)}
.stat .lbl{font-size:0.78rem;color:var(--text2);margin-top:2px}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{background:var(--navy3);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-size:0.88rem;outline:none}
.filter-row select:focus,.filter-row input:focus{border-color:var(--gold)}
.search-box{flex:1;min-width:180px}

/* ── TABLE / CARDS ── */
.records-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.88rem}
th{background:var(--navy3);color:var(--gold2);padding:12px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--gold3);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:hover td{background:rgba(212,175,55,0.05)}
.status-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.78rem;font-weight:700}
.status-badge.Pending{background:#2c1810;color:#f39c12;border:1px solid #f39c12}
.status-badge.Approved{background:#0d2b1a;color:#2ecc71;border:1px solid #27ae60}
.status-badge.Rejected{background:#2b0d0d;color:#e74c3c;border:1px solid #c0392b}
.status-badge.Verified{background:#0d1e2b;color:#3498db;border:1px solid #1565c0}
.no-records{text-align:center;padding:48px;color:var(--text2);font-size:1rem}
.no-records .icon{font-size:2.5rem;margin-bottom:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;
  position:relative;transition:all 0.08s;transform:translateY(-2px);
  box-shadow:0 5px 0 rgba(0,0,0,0.35),0 7px 10px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn:active{box-shadow:0 1px 0 rgba(0,0,0,0.35)!important;transform:translateY(3px)!important}
.btn:hover{transform:translateY(-4px)!important;filter:brightness(1.1);
  box-shadow:0 8px 0 rgba(0,0,0,0.35),0 12px 18px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.25)!important}
.btn:disabled{transform:translateY(0)!important;box-shadow:0 2px 0 rgba(0,0,0,0.2)!important;opacity:0.5;cursor:not-allowed}
.btn.approve{background:linear-gradient(145deg,#2ecc71,#27ae60);color:#fff;
  box-shadow:0 5px 0 #1a7a43,0 7px 12px rgba(39,174,96,0.4),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn.approve:active{box-shadow:0 1px 0 #1a7a43!important}
.btn.reject{background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;
  box-shadow:0 5px 0 #8c1a12,0 7px 12px rgba(192,57,43,0.4),inset 0 1px 0 rgba(255,255,255,0.25)}
.btn.reject:active{box-shadow:0 1px 0 #8c1a12!important}
.btn.pdf{background:linear-gradient(145deg,#f4d03f,#d4af37);color:#071b34;
  box-shadow:0 5px 0 #9a7d1a,0 7px 12px rgba(212,175,55,0.4),inset 0 1px 0 rgba(255,255,255,0.4)}
.btn.pdf:active{box-shadow:0 1px 0 #9a7d1a!important}
.btn.email{background:linear-gradient(145deg,#2980b9,#1565c0);color:#fff;
  box-shadow:0 5px 0 #0a3d6b,0 7px 12px rgba(21,101,192,0.4),inset 0 1px 0 rgba(255,255,255,0.25)}
.btn.email:active{box-shadow:0 1px 0 #0a3d6b!important}
.btn.view{background:linear-gradient(145deg,#7f8c8d,#5d6d7e);color:#fff;
  box-shadow:0 5px 0 #2c3e50,0 7px 12px rgba(92,107,125,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--navy2);border:2px solid var(--gold3);border-radius:var(--radius);max-width:620px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-header h3{color:var(--gold);font-size:1.05rem}
.modal-close{background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;border:none;width:32px;height:32px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 #8c1a12,0 6px 10px rgba(192,57,43,0.35),inset 0 1px 0 rgba(255,255,255,0.2);transform:translateY(-2px);transition:all 0.08s}
.modal-close:active{box-shadow:0 1px 0 #8c1a12!important;transform:translateY(2px)!important}
.modal-body{padding:22px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item label{font-size:0.75rem;color:var(--text2);display:block;margin-bottom:3px}
.detail-item .val{font-size:0.92rem;color:var(--text);font-weight:600;word-break:break-word}
.detail-item.full{grid-column:1/-1}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy3);border:1px solid var(--gold3);color:var(--text);padding:13px 20px;border-radius:10px;font-size:0.9rem;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:2000;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:#27ae60;background:#0d2b1a}
.toast.error{border-color:#c0392b;background:#2b0d0d}

/* ── LOADING ── */
.loading{text-align:center;padding:48px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PDF PREVIEW (hidden, for generation) ── */
#pdf-template{position:absolute;left:-9999px;top:0;width:794px;background:#fff;font-family:Arial,sans-serif;padding:48px;color:#000}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .detail-grid{grid-template-columns:1fr}
  .detail-item.full{grid-column:1}
  th:nth-child(n+4),td:nth-child(n+4){display:none}
  .tabs{gap:6px}
  .tab{padding:8px 12px;font-size:0.82rem}
}

<script>
// ── Image Loader for PDF ──
const BASE_URL = "https://unnatiselfhelpgroup-creator.github.io/";
let LOGO_B64 = null, SIGN_B64 = null;
async function imgToBase64(url){
  return new Promise(resolve=>{
    const img = new Image(); img.crossOrigin="anonymous";
    img.onload = function(){
      try{
        const c=document.createElement("canvas");
        c.width=img.naturalWidth; c.height=img.naturalHeight;
        c.getContext("2d").drawImage(img,0,0);
        resolve(c.toDataURL("image/png"));
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=url+"?v="+Date.now();
  });
}
async function loadPDFImages(){
  const [l,s]=await Promise.all([imgToBase64(BASE_URL+"ngologo.png"),imgToBase64(BASE_URL+"signature.png")]);
  LOGO_B64=l; SIGN_B64=s;
  console.log("PDF Images:", l?"Logo✅":"Logo❌", s?"Sign✅":"Sign❌");
}
function safeAddImage(doc,b64,fmt,x,y,w,h){
  if(!b64)return false;
  try{doc.addImage(b64,fmt||"PNG",x,y,w,h,undefined,"FAST");return true;}catch(e){return false;}
}
window.addEventListener("load", loadPDFImages);
</script>

<!-- ══ AUTH GATE — blocks ALL page content until login is verified ══ -->
<style>
  body.auth-pending #appContent{display:none!important}
  #authGateOverlay{
    position:fixed;inset:0;background:#071b34;z-index:99999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  }
  #authGateOverlay .spin{width:38px;height:38px;border:4px solid rgba(212,175,55,0.25);border-top-color:#d4af37;border-radius:50%;animation:authspin 0.8s linear infinite}
  @keyframes authspin{to{transform:rotate(360deg)}}
  #authGateOverlay p{color:#d4af37;font-size:0.9rem;font-family:Arial,sans-serif}
</style>
<script>
  // Mark body as locked BEFORE anything renders
  document.documentElement.classList.add("auth-pending");
  // Safety net: if Firebase/auth module fails to load within 8s (network issue,
  // ad-blocker, etc.), don't leave the gate stuck — send to login instead of
  // ever exposing dashboard content.
  window._authGateTimeout = setTimeout(function(){
    if(document.documentElement.classList.contains("auth-pending")){
      window.location.replace("admin-login.html");
    }
  }, 8000);
</script>

<script type="module">
import { db, auth } from "./firebase-config.js";
import {
  collection, getDocs, doc, updateDoc, addDoc, serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ── EmailJS CONFIG (अपना publicKey डालें) ──
emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";

// ── COLLECTION MAP ──
const COLLECTIONS = {
  idcard      : "IDcard",
  appointment : "Appointments",
  certificate : "Certificates",
  daily       : "DailyReports"
};

// ── DATA CACHE ──
window._data = { idcard:[], appointment:[], certificate:[], daily:[] };
window._currentRecord = null;
window._currentType   = null;

// ── AUTH GUARD — runs before content is revealed ──
onAuthStateChanged(auth, user => {
  if(!user){
    // Not logged in — redirect immediately, content stays hidden the whole time
    window.location.replace("admin-login.html");
    return;
  }
  // Logged in — verified, now reveal the dashboard
  if(window._authGateTimeout) clearTimeout(window._authGateTimeout);
  document.documentElement.classList.remove("auth-pending");
  document.body.classList.remove("auth-pending");
  const overlay = document.getElementById("authGateOverlay");
  if(overlay) overlay.remove();
  document.getElementById("adminEmail").textContent = "👤 " + user.email;
  loadAll();
});

// ── LOAD ALL COLLECTIONS ──
async function loadAll(){
  for(const [key, colName] of Object.entries(COLLECTIONS)){
    try {
      const q    = query(collection(db, colName), orderBy("createdAt","desc"));
      const snap = await getDocs(q);
      window._data[key] = snap.docs.map(d => ({id:d.id, ...d.data()}));
    } catch(e) {
      // fallback without ordering if createdAt not present
      try {
        const snap = await getDocs(collection(db, colName));
        window._data[key] = snap.docs.map(d => ({id:d.id, ...d.data()}));
      } catch(e2){ window._data[key] = []; }
    }
    renderStats(key);
    renderTable(key);
  }
}

// ── STATS ──
function renderStats(type){
  const data = window._data[type];
  const total    = data.length;
  const pending  = data.filter(r=>!r.status||r.status==="Pending").length;
  const approved = data.filter(r=>r.status==="Approved"||r.status==="Verified").length;
  const rejected = data.filter(r=>r.status==="Rejected").length;

  // badge
  document.getElementById("badge-"+type).textContent = pending;

  document.getElementById("stats-"+type).innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">कुल आवेदन</div></div>
    <div class="stat"><div class="num" style="color:#f39c12">${pending}</div><div class="lbl">Pending</div></div>
    <div class="stat"><div class="num" style="color:#2ecc71">${approved}</div><div class="lbl">Approved</div></div>
    <div class="stat"><div class="num" style="color:#e74c3c">${rejected}</div><div class="lbl">Rejected</div></div>
  `;
}

// ── RENDER TABLE ──
window.renderTable = function(type){
  const filterStatus = document.getElementById("filter-status-"+type)?.value || "";
  const search       = (document.getElementById("search-"+type)?.value || "").toLowerCase();
  let data = window._data[type];

  if(filterStatus) data = data.filter(r=>(r.status||"Pending")===filterStatus);
  if(search)       data = data.filter(r=>JSON.stringify(r).toLowerCase().includes(search));

  const wrap = document.getElementById("table-"+type);

  if(!data.length){
    wrap.innerHTML = `<div class="no-records"><div class="icon">📭</div>कोई रिकॉर्ड नहीं मिला</div>`;
    return;
  }

  const cols = getColumns(type);
  wrap.innerHTML = `
    <table>
      <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join("")}<th>Action</th></tr></thead>
      <tbody>
        ${data.map(row => `
          <tr>
            ${cols.map(c=>`<td>${renderCell(c,row)}</td>`).join("")}
            <td><div class="btn-group">${actionButtons(row, type)}</div></td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function getColumns(type){
  const map = {
    idcard:[
      {key:"name",label:"नाम"},{key:"post",label:"पद"},{key:"mobile",label:"मोबाइल"},
      {key:"createdAt",label:"दिनांक"},{key:"status",label:"Status"}
    ],
    appointment:[
      {key:"name",label:"नाम"},{key:"post",label:"पद"},{key:"mobile",label:"मोबाइल"},
      {key:"createdAt",label:"दिनांक"},{key:"status",label:"Status"}
    ],
    certificate:[
      {key:"name",label:"नाम"},{key:"certificateType",label:"Certificate"},{key:"mobile",label:"मोबाइल"},
      {key:"createdAt",label:"दिनांक"},{key:"status",label:"Status"}
    ],
    daily:[
      {key:"reporterName",label:"नाम"},{key:"reportDate",label:"दिनांक"},{key:"district",label:"जिला"},
      {key:"createdAt",label:"Submit"},{key:"status",label:"Status"}
    ]
  };
  return map[type]||[];
}

function renderCell(col, row){
  if(col.key==="status"){
    const s = row.status||"Pending";
    return `<span class="status-badge ${s}">${s}</span>`;
  }
  if(col.key==="createdAt"){
    if(!row.createdAt) return "-";
    const d = row.createdAt.seconds ? new Date(row.createdAt.seconds*1000) : new Date(row.createdAt);
    return isNaN(d) ? "-" : d.toLocaleDateString("hi-IN");
  }
  return row[col.key] || "-";
}

function actionButtons(row, type){
  const status = row.status || "Pending";
  const id     = row.id;
  let btns = `<button class="btn view" onclick="openModal('${id}','${type}')">👁 View</button>`;

  if(status === "Pending"){
    btns += `<button class="btn approve" onclick="doAction('${id}','${type}','Approved')">✅ Approve</button>`;
    btns += `<button class="btn reject"  onclick="doAction('${id}','${type}','Rejected')">❌ Reject</button>`;
  } else if(status === "Approved" || status === "Verified"){
    btns += `<button class="btn pdf"   onclick="generatePDF('${id}','${type}')">📄 PDF</button>`;
    btns += `<button class="btn email" onclick="sendEmail('${id}','${type}')">📧 Email</button>`;
  }
  if(type==="daily" && status==="Pending"){
    btns += `<button class="btn approve" onclick="doAction('${id}','${type}','Verified')">✔ Verify</button>`;
  }
  return btns;
}

// ── APPROVE / REJECT ──
window.doAction = async function(id, type, status){
  const colName = COLLECTIONS[type];
  const row     = window._data[type].find(r=>r.id===id);
  if(!confirm(`क्या आप "${row?.name||id}" को ${status} करना चाहते हैं?`)) return;
  try {
    await updateDoc(doc(db, colName, id), {
      status,
      actionType : colName,
      actionAt   : serverTimestamp()
    });
    // update local cache
    const idx = window._data[type].findIndex(r=>r.id===id);
    if(idx>=0) window._data[type][idx].status = status;
    renderStats(type);
    renderTable(type);
    showToast("✅ " + status + " सफलतापूर्वक!", "success");
    // auto PDF on approve
    if(status==="Approved") setTimeout(()=>generatePDF(id, type), 600);
    closeModal();
  } catch(e){
    showToast("❌ त्रुटि: "+e.message, "error");
  }
}

// ── OPEN MODAL ──
window.openModal = function(id, type){
  const row = window._data[type].find(r=>r.id===id);
  if(!row) return;
  window._currentRecord = row;
  window._currentType   = type;

  document.getElementById("modal-title").textContent = getTypeLabel(type) + " — विवरण";
  document.getElementById("modal-body").innerHTML    = buildDetailHTML(row, type);

  const footer = document.getElementById("modal-footer");
  const status = row.status || "Pending";
  let fbtns = `<button class="btn view" onclick="generatePDF('${id}','${type}')">📄 PDF Download</button>`;
  if(status==="Pending"){
    fbtns = `
      <button class="btn approve" onclick="doAction('${id}','${type}','Approved')">✅ Approve</button>
      <button class="btn reject"  onclick="doAction('${id}','${type}','Rejected')">❌ Reject</button>
    ` + fbtns;
  } else if(status==="Approved"||status==="Verified"){
    fbtns += `<button class="btn email" onclick="sendEmail('${id}','${type}')">📧 Email भेजें</button>`;
  }
  footer.innerHTML = fbtns;

  document.getElementById("detailModal").classList.add("open");
}

window.closeModal = function(){
  document.getElementById("detailModal").classList.remove("open");
}

function buildDetailHTML(row, type){
  const fields = getDetailFields(row, type);
  return `<div class="detail-grid">
    ${fields.map(f=>`
      <div class="detail-item ${f.full?'full':''}">
        <label>${f.label}</label>
        <div class="val">${f.value||"-"}</div>
      </div>
    `).join("")}
  </div>`;
}

function getDetailFields(row, type){
  const base = [
    {label:"नाम", value:row.name||row.reporterName},
    {label:"मोबाइल", value:row.mobile},
    {label:"Email", value:row.email},
    {label:"Status", value:`<span class="status-badge ${row.status||'Pending'}">${row.status||'Pending'}</span>`},
  ];
  if(type==="idcard") base.splice(1,0,{label:"पद",value:row.post},{label:"अध्यक्ष/प्रभारी",value:row.president});
  if(type==="appointment") base.splice(1,0,{label:"पद",value:row.post},{label:"जिला",value:row.district});
  if(type==="certificate") base.splice(1,0,{label:"Certificate Type",value:row.certificateType},{label:"कार्यकाल",value:row.duration});
  if(type==="daily"){
    base.splice(0,0,{label:"रिपोर्ट दिनांक",value:row.reportDate},{label:"जिला",value:row.district});
    if(row.activities) base.push({label:"गतिविधियाँ",value:row.activities,full:true});
  }
  const dt = row.createdAt?.seconds ? new Date(row.createdAt.seconds*1000) : row.createdAt ? new Date(row.createdAt) : null;
  base.push({label:"आवेदन दिनांक", value:dt?dt.toLocaleString("hi-IN"):"-"});
  if(row.address) base.push({label:"पता", value:row.address, full:true});
  return base;
}

function getTypeLabel(type){
  return {idcard:"ID Card",appointment:"नियुक्ति पत्र",certificate:"Certificate",daily:"Daily Report"}[type]||type;
}

// ── PDF GENERATION ──
window.generatePDF = function(id, type){
  const { jsPDF } = window.jspdf;
  const row = window._data[type].find(r=>r.id===id);
  if(!row){ showToast("रिकॉर्ड नहीं मिला","error"); return; }

  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});

  // ── Common Header ──
  doc.setFillColor(7, 27, 52);
  doc.rect(0, 0, 210, 40, "F");
  doc.setFontSize(16);
  doc.setTextColor(212, 175, 55);
  doc.setFont("helvetica","bold");
  doc.text("Unnati Swayam Sahayata Samiti", 105, 16, {align:"center"});
  doc.setFontSize(11);
  doc.setTextColor(232, 224, 204);
  doc.text("उन्नति स्वयं सहायता समिति", 105, 24, {align:"center"});
  doc.setFontSize(9);
  doc.setTextColor(184, 168, 122);
  doc.text("Regd. No. : xxxxxxxxxx", 105, 31, {align:"center"});

  // ── Title Band ──
  doc.setFillColor(212, 175, 55);
  doc.rect(0, 40, 210, 12, "F");
  doc.setFontSize(13);
  doc.setTextColor(7, 27, 52);
  doc.setFont("helvetica","bold");
  doc.text(getDocTitle(type), 105, 49, {align:"center"});

  // ── Body ──
  const fields = getPDFFields(row, type);
  doc.autoTable({
    startY     : 58,
    margin     : {left:20,right:20},
    styles     : {font:"helvetica",fontSize:10,cellPadding:4,textColor:[30,30,30]},
    headStyles : {fillColor:[7,27,52],textColor:[212,175,55],fontStyle:"bold"},
    alternateRowStyles:{fillColor:[245,242,235]},
    head       : [["विवरण","जानकारी"]],
    body       : fields.map(f=>[f.label, f.value||"-"]),
  });

  const finalY = doc.lastAutoTable.finalY || 120;

  // ── Approval Status ──
  doc.setFillColor(13, 43, 26);
  doc.roundedRect(20, finalY+8, 170, 16, 4, 4, "F");
  doc.setFontSize(11);
  doc.setTextColor(46, 204, 113);
  doc.setFont("helvetica","bold");
  doc.text("✓ STATUS : " + (row.status||"Pending"), 105, finalY+19, {align:"center"});

  // ── Footer ──
  const pageH = doc.internal.pageSize.height;
  doc.setFillColor(7, 27, 52);
  doc.rect(0, pageH-22, 210, 22, "F");
  doc.setFontSize(8);
  doc.setTextColor(184,168,122);
  doc.text("यह एक Computer Generated Document है।  |  उन्नति स्वयं सहायता समिति", 105, pageH-13, {align:"center"});
  doc.text("Date: " + new Date().toLocaleDateString("en-IN") + "  |  ID: " + id.substring(0,10), 105, pageH-7, {align:"center"});

  // ── Signature Area ──
  doc.setDrawColor(100,100,100);
  doc.line(30, pageH-34, 85, pageH-34);
  doc.line(125, pageH-34, 180, pageH-34);
  doc.setFontSize(8);
  doc.setTextColor(100,100,100);
  doc.text("आवेदक हस्ताक्षर", 57, pageH-29, {align:"center"});
  doc.text("अधिकृत हस्ताक्षर", 152, pageH-29, {align:"center"});

  const fileName = `${getTypeLabel(type)}_${(row.name||row.reporterName||"doc").replace(/\s+/g,"_")}_${id.substring(0,6)}.pdf`;
  doc.save(fileName);
  showToast("📄 PDF Download शुरू हो गया!", "success");

  // Save to Firebase
  savePDFRecord(row, type, id, fileName);
}

function getDocTitle(type){
  return {
    idcard      : "IDENTITY CARD / पहचान पत्र",
    appointment : "APPOINTMENT LETTER / नियुक्ति पत्र",
    certificate : "CERTIFICATE / प्रमाण पत्र",
    daily       : "DAILY REPORT / दैनिक रिपोर्ट"
  }[type]||"Document";
}

function getPDFFields(row, type){
  const base = [];
  if(type==="idcard"){
    base.push(
      {label:"नाम (Name)",    value:row.name},
      {label:"पद (Post)",     value:row.post},
      {label:"मोबाइल",        value:row.mobile},
      {label:"Email",         value:row.email},
      {label:"अध्यक्ष/प्रभारी",value:row.president},
      {label:"पता (Address)", value:row.address},
    );
  } else if(type==="appointment"){
    base.push(
      {label:"नाम (Name)", value:row.name},
      {label:"पद (Post)",  value:row.post},
      {label:"जिला",       value:row.district},
      {label:"मोबाइल",     value:row.mobile},
      {label:"Email",      value:row.email},
      {label:"पता",        value:row.address},
    );
  } else if(type==="certificate"){
    base.push(
      {label:"नाम (Name)",   value:row.name},
      {label:"Certificate",  value:row.certificateType},
      {label:"कार्यकाल",    value:row.duration},
      {label:"मोबाइल",      value:row.mobile},
      {label:"Email",        value:row.email},
    );
  } else {
    base.push(
      {label:"रिपोर्टर",    value:row.reporterName},
      {label:"दिनांक",      value:row.reportDate},
      {label:"जिला",        value:row.district},
      {label:"गतिविधियाँ", value:row.activities},
    );
  }
  return base;
}

async function savePDFRecord(row, type, id, fileName){
  try {
    await addDoc(collection(db, "GeneratedDocs"), {
      originalId : id,
      type       : COLLECTIONS[type],
      name       : row.name||row.reporterName,
      email      : row.email||"",
      fileName,
      generatedAt: serverTimestamp()
    });
  } catch(e){ console.warn("PDF record save failed:", e); }
}

// ── EMAIL SEND ──
window.sendEmail = async function(id, type){
  const row = window._data[type].find(r=>r.id===id);
  if(!row){ showToast("रिकॉर्ड नहीं मिला","error"); return; }
  if(!row.email){ showToast("⚠️ इस record में Email नहीं है।","error"); return; }

  if(!confirm(`क्या आप "${row.email}" पर Email भेजना चाहते हैं?`)) return;
  showToast("📧 Email भेजा जा रहा है...","");

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name   : row.name || row.reporterName || "आवेदक",
      to_email  : row.email,
      doc_type  : getTypeLabel(type),
      status    : row.status || "Approved",
      post      : row.post || row.certificateType || "",
      district  : row.district || "",
      org_name  : "उन्नति स्वयं सहायता समिति",
      admin_url : window.location.origin
    });
    showToast("✅ Email सफलतापूर्वक भेज दी गई!", "success");
  } catch(e){
    showToast("❌ Email भेजने में त्रुटि: "+e.message, "error");
  }
}

// ── LOGOUT ──
window.doLogout = async function(){
  await signOut(auth);
  window.location.href = "admin-login.html";
}

// ── TAB SWITCH ──
window.switchTab = function(type, btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("pane-"+type).classList.add("active");
}

// ── TOAST ──
window.showToast = function(msg, type){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type||"");
  setTimeout(()=>t.classList.remove("show"), 3500);
}

// Close modal on overlay click
document.getElementById("detailModal").addEventListener("click", e=>{
  if(e.target===e.currentTarget) closeModal();
});
</script>
</div><!-- /#appContent -->
