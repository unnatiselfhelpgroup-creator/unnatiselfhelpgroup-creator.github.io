<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राष्ट्रीय गौ रक्षक अभियान</title>
    <style>
        body { background: #0b0f14; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .top-bar { background: #111827; padding: 10px; text-align: center; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 999; }
        .main-container { max-width: 900px; margin: auto; padding: 10px; }
        .title { color: gold; text-align: center; margin: 20px 0; font-size: 24px; }
        .btn-gold { 
            display: block; background: linear-gradient(to bottom, #ffd700, #b8860b); 
            color: black; padding: 18px; margin-bottom: 12px; text-align: center; 
            text-decoration: none; font-weight: bold; border-radius: 12px; 
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-btn { background: #1a2234; padding: 15px; text-align: center; text-decoration: none; color: white; border-radius: 10px; }
        iframe { width: 100%; height: 600px; border-radius: 10px; }
        .footer { text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="google_translate_element"></div>
    </div>

    <div class="main-container">
        <h1 class="title">🐄 राष्ट्रीय गौ रक्षक अभियान</h1>

        <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" class="btn-gold">💛 गोसेवा हेतु दान करें</a>
        <a href="https://wa.me/message/DXARYWGMEIGCC1" class="btn-gold">🚩 अभियान से जुड़ें</a>
        <a href="#register" class="btn-gold">🪪 सदस्यता पंजीकरण</a>

        <h2 class="title">🚩 गतिविधियाँ</h2>
        <div class="grid">
            <a href="https://youtube.com/channel/UCewSoqv-2aCyxVU_3xQt_Dg" class="card-btn">▶ वीडियो संग्रह</a>
            <a href="https://photos.app.goo.gl/F5UqkZQhQzNUJNEB8" class="card-btn">📸 दंडवत यात्रा</a>
        </div>

        <h2 class="title">🪪 सदस्यता पंजीकरण</h2>
        <iframe src="https://docs.google.com/forms/d/1WySZVCnLZkRCR5CaIFVDU-xpXvKDBTBKzgfaBYI85so/viewform?embedded=true"></iframe>

        <div class="footer">
            <p>© 2026 उन्नति स्वयं सहायता समिति</p>
        </div>
    </div>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'hi'}, 'google_translate_element');
        }
    </script>
</body>
</html>
