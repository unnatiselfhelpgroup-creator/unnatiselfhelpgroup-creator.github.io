        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 18px; max-width: 500px; margin: 0 auto; }

            font-weight: bold;
            font-size: 1.1em;
            border-radius: 12px;
            box-shadow: 0 8px #996515;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn:active { box-shadow: 0 4px #996515; transform: translateY(4px); }
        .btn:hover { background: #ffdf00; }

        .footer { margin-top: 50px; padding: 30px; border-top: 1px solid #444; }
        .signature { width: 200px; margin: 20px 0; }
        .social-links a { margin: 0 10px; color: #ffd700; text-decoration: none; font-size: 1.2em; }
