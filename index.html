<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>उन्नति स्वयं सहायता समिति</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #030712; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; padding: 15px; }
        .logo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); }
        
        /* 3D प्रीमियम बॉक्स स्टाइल */
        .gold-box { 
            background: linear-gradient(180deg, #1f1f1f, #000); 
            border: 1px solid var(--gold); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.1); 
            text-align: center; 
        }
        
        .btn-main { 
            background: linear-gradient(135deg, #ffd700, #d4af37); 
            color: #000; padding: 15px; border-radius: 12px; font-weight: bold; 
            text-decoration: none; display: block; text-align: center;
            box-shadow: 0 5px 0 #b8860b; /* 3D इफेक्ट */
            transition: 0.1s;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }

        .btn-80g { background: linear-gradient(135deg, #d4af37, #b8860b); color: #000; padding: 18px; margin: 15px 0; border-radius: 12px; font-weight: 800; text-align: center; display: block; text-decoration: none; border: 1px solid #ffd700; box-shadow: 0 5px 0 #8b6508; }
        .btn-80g:active { transform: translateY(4px); box-shadow: none; }

        .grid-6 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* 3D एक्टिव बटन्स */
        .box-btn { 
            background: #222; padding: 15px; border-radius: 15px; 
            border: 1px solid var(--gold); color: #fff; text-decoration: none; font-size: 13px; 
            box-shadow: 0 4px 0 #444; transition: 0.1s;
        }
        .box-btn:active { transform: translateY(4px); box-shadow: none; }

        .social-btn { background: #111; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); color: var(--gold); display: inline-block; width: 40px; box-shadow: 0 3px 0 #333; }
        .social-btn:active { transform: translateY(3px); box-shadow: none; }

        .travel-link { color: var(--gold); text-decoration: underline; display: block; margin: 8px 0; font-size: 14px; font-weight: bold; }
        .membership-text { color: #fff; font-size: 14px; font-weight: bold; line-height: 1.3; }
    </style>
</head>
<body>

    <!-- [यहाँ वही कोड है जो मैंने पहले दिया था, बस ये नई 3D स्टाइल जोड़ दी गई हैं] -->
    <!-- (आप इस पूरे कोड को अपनी फाइल में पेस्ट करें) -->

</body>
</html>
