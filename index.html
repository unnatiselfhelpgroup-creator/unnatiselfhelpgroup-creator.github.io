<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>उन्नति स्वयं सहायता समिति</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #030712; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; padding: 15px; }
        
        /* 3D गोल्ड बॉक्स स्टाइल */
        .gold-box { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--gold);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5), inset 2px 2px 5px rgba(212,175,55,0.2);
            text-align: center;
        }

        .title-gold { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; }

        .btn-donate { background: linear-gradient(to right, #ffd700, #d4af37); color: #000; padding: 15px; border-radius: 12px; font-weight: bold; text-decoration: none; display: block; box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        
        .grid-6 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box-btn { background: #222; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); color: #fff; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        .social-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .social-btn { background: #111; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <!-- टॉप बार -->
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div id="google_translate_element"></div>
        <a href="#" class="btn-donate">💰 दान (Donate)</a>
    </div>

    <div style="text-align:center; margin-bottom:20px;">
        <h1>उन्नति स्वयं सहायता समिति</h1>
        <p>🐄 गौ माता – राष्ट्रमाता सेवा में समर्पित</p>
    </div>

    <!-- गौ माता सहयोग बटन -->
    <a href="#" class="btn-donate" style="background:linear-gradient(to right, #ff4500, #d4af37);">🙏 गौ माता के लिए अपना सहयोग दें</a>

    <!-- सेवा गतिविधियाँ -->
    <div class="gold-box">
        <span class="title-gold">📂 हमारी सेवा गतिविधियाँ</span>
        <div class="grid-6">
            <a href="#" class="box-btn">🐄 गौ सेवा</a>
            <a href="#" class="box-btn">🙏 दंडवत यात्रा</a>
            <a href="#" class="box-btn">😷 कोविड सेवा</a>
            <a href="#" class="box-btn">🤝 जन सहायता</a>
            <a href="#" class="box-btn">🐦 जीव सेवा</a>
            <a href="#" class="box-btn">🧹 स्वच्छता</a>
        </div>
    </div>

    <!-- सोशल मीडिया -->
    <div class="gold-box">
        <span class="title-gold">🌐 सोशल मीडिया नेटवर्क</span>
        <div class="social-row">
            <a href="#" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-facebook"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
            <a href="#" class="social-btn"><i class="fas fa-id-card"></i></a>
        </div>
    </div>

    <!-- सिग्नेचर -->
    <div class="gold-box">
        <span class="title-gold">✍️ अधिकृत हस्ताक्षर</span>
        <img src="signature.png" alt="Signature" style="width:150px; filter:invert(1);">
    </div>

    <div style="text-align:center; font-size:12px; color:#666;">🔒 Privacy Policy</div>

    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>function googleTranslateElementInit(){ new google.translate.TranslateElement({pageLanguage:'hi'}, 'google_translate_element'); }</script>
</body>
</html>
