<!-- आईडी कार्ड -->
<div class="id-card-form">
    <h2>आधिकारिक सदस्यता पहचान पत्र (ID Card)</h2>
    <form id="idCardForm">
        <input type="file" accept="image/*" required>
        <input type="text" placeholder="सदस्य का नाम" required>
        <input type="text" placeholder="पद (Designation)" required>
        <input type="text" placeholder="मोबाइल नंबर" required>
        <button type="submit">आईडी कार्ड हेतु सबमिट करें</button>
    </form>
</div>
