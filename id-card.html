<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <title>ID Card आवेदन | उन्नति स्वयं सहायता समिति</title>
  <style>
    body { font-family: sans-serif; background: #f8f4ef; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .btn { width: 100%; padding: 15px; background: #4a0404; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .photo-box { border: 2px dashed #bbb; padding: 20px; text-align: center; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <h2>🪪 ID कार्ड आवेदन</h2>
  <label>नाम</label> <input type="text" id="fullname">
  <label>पिता का नाम</label> <input type="text" id="father">
  <label>मोबाइल</label> <input type="tel" id="mobile">
  <label>फोटो</label>
  <div class="photo-box" onclick="document.getElementById('photoInput').click()">
    <div id="photoPlaceholder">📷 फोटो चुनें</div>
    <img id="photoPreview" style="display:none; max-width:100%;">
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
  </div>
  <button class="btn" onclick="submitForm()">आवेदन करें</button>
</div>

<script>
  async function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const bitmap = await createImageBitmap(file);
    const canvas = document.createElement("canvas");
    canvas.width = 400; canvas.height = bitmap.height * (400 / bitmap.width);
    canvas.getContext("2d").drawImage(bitmap, 0, 0, canvas.width, canvas.height);
    window.photoDataURL = canvas.toDataURL("image/jpeg", 0.7);
    document.getElementById("photoPreview").src = window.photoDataURL;
    document.getElementById("photoPreview").style.display = "block";
    document.getElementById("photoPlaceholder").style.display = "none";
  }

  function submitForm() {
    const data = { name: document.getElementById('fullname').value, father_name: document.getElementById('father').value, mobile: document.getElementById('mobile').value };
    if (!window.photoDataURL || !data.name) { alert("सभी जानकारी भरें!"); return; }
    sessionStorage.setItem('idCardApplicant', JSON.stringify(data));
    sessionStorage.setItem('idCardPhoto', window.photoDataURL);
    window.location.href = 'id-card-payment.html';
  }
</script>
</body>
</html>
