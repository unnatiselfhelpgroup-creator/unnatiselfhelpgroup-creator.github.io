<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID Card आवेदन | उन्नति स्वयं सहायता समिति</title>
  <style>
    /* अपनी पुरानी स्टाइलिंग यहाँ रखें */
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f4ef; padding: 20px; }
    .container { max-width: 560px; margin: auto; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #4a0404; }
    label { display: block; margin-top: 15px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 7px; }
    .btn { width: 100%; padding: 14px; background: #4a0404; color: #fff; border: none; border-radius: 9px; cursor: pointer; margin-top: 20px; font-weight: 700; }
    .photo-box { border: 2px dashed #bbb; padding: 20px; text-align: center; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🪪 आधिकारिक सदस्यता पहचान पत्र (ID Card) आवेदन</h2>
  
  <label>पूरा नाम *</label>
  <input type="text" id="fullname" placeholder="नाम लिखें" />
  
  <label>पिता / पति का नाम *</label>
  <input type="text" id="father" />
  
  <label>मोबाइल नंबर *</label>
  <input type="tel" id="mobile" />

  <label>पासपोर्ट साइज फोटो *</label>
  <div class="photo-box" id="photoBox" onclick="document.getElementById('photoInput').click()">
    <div id="photoPlaceholder">📷 फोटो अपलोड करने के लिए यहाँ क्लिक करें</div>
    <img id="photoPreview" style="display:none; max-height:150px; margin-top:10px;">
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)" />
  </div>

  <button class="btn" onclick="submitForm()">आईडी कार्ड हेतु आवेदन करें →</button>
</div>

<script>
  // सुरक्षित फोटो प्रोसेसिंग लॉजिक (जो अब मोबाइल ब्राउज़र में एरर नहीं देगा)
  async function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const photoPlaceholder = document.getElementById("photoPlaceholder");
    photoPlaceholder.innerHTML = "⏳ प्रोसेसिंग...";

    try {
        const bitmap = await createImageBitmap(file);
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 500;
        const scale = MAX_WIDTH / bitmap.width;
        canvas.width = MAX_WIDTH;
        canvas.height = bitmap.height * scale;
        
        const ctx = canvas.getContext("2d");
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        
        // फोटो को कंप्रेस करके सेव करें
        window.photoDataURL = canvas.toDataURL("image/jpeg", 0.7);
        
        document.getElementById("photoPreview").src = window.photoDataURL;
        document.getElementById("photoPreview").style.display = "block";
        photoPlaceholder.style.display = "none";
        bitmap.close();
    } catch (err) {
        console.error(err);
        alert("फोटो लोड करने में समस्या: कृपया दूसरी फोटो चुनें।");
        photoPlaceholder.innerHTML = "📷 फोटो अपलोड करने के लिए यहाँ क्लिक करें";
    }
  }

  function submitForm() {
    if (!window.photoDataURL) { alert("कृपया फोटो अपलोड करें!"); return; }
    sessionStorage.setItem('idCardPhoto', window.photoDataURL);
    // यहाँ आपकी पुरानी सबमिट लॉजिक है जो window.location.href को id-card-payment.html पर ले जाती है
    window.location.href = 'id-card-payment.html';
  }
</script>
</body>
</html>
