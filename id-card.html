<div class="id-card-form">
  <h2>आधिकारिक सदस्यता पहचान पत्र (ID Card)</h2>

  <form id="idCardForm">

    <input type="file"
           name="photo"
           accept="image/*"
           required>

    <input type="text"
           name="name"
           placeholder="सदस्य का नाम"
           required>

    <input type="text"
           name="designation"
           placeholder="पद (Designation)"
           required>

    <input type="tel"
           name="mobile"
           placeholder="मोबाइल नंबर"
           required>

    <input type="email"
           name="email"
           placeholder="ईमेल (यदि हो)">

    <input type="text"
           name="address"
           placeholder="पूरा पता">

    <input type="text"
           name="volunteer_id"
           placeholder="वॉलंटियर आईडी (खाली छोड़ सकते हैं)">

    <button type="submit">
      आईडी कार्ड हेतु सबमिट करें
    </button>

  </form>
</div>

<script type="module" src="firebase-script.js"></script>
