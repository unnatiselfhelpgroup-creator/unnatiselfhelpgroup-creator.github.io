<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card आवेदन | उन्नति स्वयं सहायता समिति</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; padding: 20px; line-height: 1.6; background: #f4f4f4; }
        .id-card-form { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; border: 1px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #1b2430; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>

<div class="id-card-form">
  <h2>आधिकारिक सदस्यता पहचान पत्र (ID Card) आवेदन</h2>
  <p style="text-align:center;"><strong>उन्नति स्वयं सहायता समिति</strong><br>नीति आयोग यूनिक आईडी : US-2016/0108273</p>
  
  <form id="idCardForm" data-collection="IDcard" data-form-label="ID कार्ड आवेदन">
    <label>पासपोर्ट साइज फोटो</label>
    <input type="file" name="photo" accept="image/*" required>

    <input type="text" name="name" placeholder="सदस्य का पूरा नाम" required>
    <input type="text" name="father_name" placeholder="पिता/पति का नाम" required>
    <input type="tel" name="mobile" placeholder="मोबाइल नंबर" required>
    <input type="email" name="email" placeholder="ईमेल आईडी">
    <input type="text" name="address" placeholder="पूरा पता" required>

    <label>सदस्य श्रेणी</label>
    <select name="member_type" required>
      <option value="">सदस्य श्रेणी चुनें</option>
      <option value="Volunteer">Volunteer (स्वयंसेवक)</option>
      <option value="Office Bearer">पदाधिकारी</option>
    </select>

    <label>पद (Designation)</label>
    <select name="designation" required>
      <option value="">पद चुनें</option>
      <option value="ग्राम गौ-संयोजक">ग्राम गौ-संयोजक</option>
      <option value="ब्लॉक गौ-प्रभारी">ब्लॉक गौ-प्रभारी</option>
      <option value="जिला गौ-समन्वयक">जिला गौ-समन्वयक</option>
      <option value="प्रदेश कार्यकारिणी सदस्य">प्रदेश कार्यकारिणी सदस्य</option>
      <option value="राष्ट्रीय गौ-पदाधिकारी">राष्ट्रीय गौ-पदाधिकारी</option>
      <option value="Volunteer">Volunteer (स्वयंसेवक)</option>
    </select>

    <input type="text" name="volunteer_id" placeholder="वॉलंटियर आईडी (खाली छोड़ सकते हैं)">

    <label>
      <input type="checkbox" name="agree" required>
      मैं संस्था की नियम एवं शर्तों, शुल्क नीति तथा सदस्यता नियमों से सहमत हूँ।
    </label>

    <br><br>
    <button type="submit">आईडी कार्ड हेतु आवेदन करें</button>
  </form>
</div>

<script type="module" src="firebase-script.js"></script>
</body>
</html>
