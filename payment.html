<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>भुगतान करें</title>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("AvD_f76bB4qJYnGb0"); })();
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; background: #f4f7fa; }
        .box { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pay-link { background: #3395ff; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; display: block; margin: 20px 0; font-weight: bold; }
        input[type="file"] { margin: 10px 0; display: block; width: 100%; }
        button { background: #00a651; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 20px; display: none; width: 100%; }
    </style>
</head>
<body>
<div class="box">
    <h3>भुगतान: ₹700</h3>
    <img src="Qrcode.png" width="200"><br>
    <p>1. पहले भुगतान करें:</p>
    <a href="https://razorpay.me/@wwwunnatiselfhelpgroupcom" target="_blank" class="pay-link" onclick="document.getElementById('paidBtn').style.display='block'">Razorpay से भुगतान करें</a>
    
    <p>2. भुगतान का स्क्रीनशॉट अपलोड करें:</p>
    <input type="file" id="paymentProof" accept="image/*" required>
    
    <p>3. भुगतान के बाद यह बटन दबाएं:</p>
    <button id="paidBtn">मैंने भुगतान कर दिया है</button>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    document.getElementById("paidBtn").onclick = async () => {
        const fileInput = document.getElementById("paymentProof");
        if (fileInput.files.length === 0) {
            alert("कृपया भुगतान का स्क्रीनशॉट अपलोड करें!");
            return;
        }

        const btn = document.getElementById("paidBtn");
        btn.innerText = "प्रोसेसिंग...";
        btn.disabled = true;

        try {
            const storedData = sessionStorage.getItem("pendingStudentData");
            if (!storedData) {
                alert("डेटा नहीं मिला, कृपया फिर से भरें।");
                window.location.href = "student-registration.html";
                return;
            }
            const data = JSON.parse(storedData);
            data.paymentStatus = "Paid (Proof Uploaded)";
            data.status = "Pending";
            data.createdAt = serverTimestamp();
            
            // 1. Firebase में डेटा सेव करें
            const docRef = await addDoc(collection(db, "StudentRegistrations"), data);

            // 2. EmailJS के जरिए एडमिन को अलर्ट भेजें (Approve/Reject बटन सहित)
            await emailjs.send("service_63pefgf", "template_wvzbj7p", {
                user_name: data.name,
                user_email: data.email,
                name: data.name,
                mobile: data.mobile,
                email: data.email,
                designation: "छात्र पंजीकरण (भुगतान पूर्ण)",
                doc_id: docRef.id,
                type: "StudentRegistrations"
            });
            
            // 3. सफलता संदेश
            document.body.innerHTML = `
                <div style="max-width:400px; margin:50px auto; padding:40px; text-align:center; border:2px solid #00a651; border-radius:20px; background:white;">
                    <h3 style="color:#00a651;">✅ पंजीकरण सफलतापूर्वक जमा हो गया!</h3>
                    <p>एडमिन द्वारा भुगतान की जांच होने के बाद आपको ईमेल पर सूचित किया जाएगा।</p>
                </div>`;
        } catch (err) {
            console.error(err);
            alert("सबमिशन फेल: " + err.message);
            btn.disabled = false;
            btn.innerText = "मैंने भुगतान कर दिया है";
        }
    };
</script>
</body>
</html>
