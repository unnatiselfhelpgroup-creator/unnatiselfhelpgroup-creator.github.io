<!-- नियुक्ति पत्र -->
<div class="appointment-card">
    <h2>उन्नति स्वयं सहायता समिति - नियुक्ति पत्र</h2>
    <p>पंजीकृत कार्यालय: हल्दुआ दीना, हल्द्वानी रोड, लालकुआं, जिला-नैनीताल (उत्तराखंड)</p>
    <hr>
    <form id="appointmentForm">
        <input type="text" placeholder="सदस्य का पूरा नाम" required>

        <textarea placeholder="स्थायी पता"></textarea>
        <input type="text" placeholder="मोबाइल नंबर" required>
        <button type="submit">नियुक्ति हेतु आवेदन करें</button>
    </form>
</div>
