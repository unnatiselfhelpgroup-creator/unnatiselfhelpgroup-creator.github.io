<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Appointment Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #001a33; padding: 20px; font-family: Arial; color: white; }
        .card { background: white; color: black; padding: 20px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { padding: 10px; margin-top: 5px; cursor: pointer; }
        .pdf { background: #28a745; color: white; border: none; }
        .print { background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h1>आवेदन सूची</h1>
    <div id="list">लोड हो रहा है...</div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // सुरक्षा: बिना लॉगिन कोई न देख सके
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "admin-login.html"; }
        });

        // doc id -> data, ताकि PDF बटन में JSON को सीधे HTML attribute में न डालना पड़े
        const recordsById = new Map();

        async function init() {
            const snap = await getDocs(collection(db, "Appointments"));
            const list = document.getElementById("list");
            list.innerHTML = "";
            recordsById.clear();

            if (snap.empty) {
                list.innerHTML = "कोई आवेदन नहीं है।";
                return;
            }

            snap.forEach((docItem) => {
                const d = docItem.data();
                recordsById.set(docItem.id, { ...d, doc_id: docItem.id });

                const isVerified = (d.status || "").toLowerCase() === "verified";

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <h3>${d.name || "नाम अनुपलब्ध"}</h3>
                    <p><b>Status:</b> ${d.status || "Pending"}</p>
                    ${isVerified
                        ? `<button class="pdf" data-action="pdf" data-id="${docItem.id}">📄 PDF डाउनलोड करें</button>`
                        : `<button class="pdf" style="background:gray" data-action="pending">Pending (Approve की प्रतीक्षा)</button>`
                    }
                    <button class="print" data-action="print">🖨️ नॉर्मल प्रिंट</button>`;
                list.appendChild(card);
            });
        }

        document.getElementById("list").addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-action]");
            if (!btn) return;

            if (btn.dataset.action === "pdf") {
                const data = recordsById.get(btn.dataset.id);
                if (data) window.generateAppointmentPDF(data);
            } else if (btn.dataset.action === "pending") {
                alert("कृपया पहले ईमेल से Approve करें!");
            } else if (btn.dataset.action === "print") {
                window.print();
            }
        });

        init();
    </script>

    <script src="appointment-pdf.js"></script>
</body>
</html>
